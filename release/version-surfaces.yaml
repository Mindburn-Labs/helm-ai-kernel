      "kind": "regex",
      "pattern": "(<artifactId>helm-sdk</artifactId>\\n    <version>)(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)(</version>)",
      "replacement": "\\g<1>{version}\\g<3>"
