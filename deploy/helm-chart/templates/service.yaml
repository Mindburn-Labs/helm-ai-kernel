apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm-firewall.fullname" . }}
  labels:
    {{- include "helm-firewall.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
      name: health
    {{- if .Values.helm.metrics.enabled }}
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "helm-firewall.selectorLabels" . | nindent 4 }}
