    - kernel_verdict
    - sandbox_grant
    - launch_receipt
    - install_receipt
    - healthcheck_receipt
    - teardown_receipt
    - evidence_pack
    - evidence_graph
    - mcp_quarantine
    - mcp_manifest
    - model_gateway_broker
    - artifact_digest
    - cosign_signature
    - syft_sbom
    - grype_vulnerability_scan
supply_chain_evidence:
    artifact_digest: sha256:b970c2308182384377670704f6769e200eef89e18cc1a1102de9cba0d2437527
    signature_tool: cosign
