name: npm Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish. Must match VERSION.
        required: true
        type: string
      release_tag:
        description: Optional release tag to publish from. Must match v<version>.
        required: false
        default: ""
        type: string
      dist_tag:
        description: npm dist-tag to assign after publish.
        required: false
        default: latest
        type: string
      dry_run:
        description: Build and pack without publishing.
        required: false
        default: false
        type: boolean

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - path: sdk/ts
            name: "@mindburn/helm-ai-kernel"
            version_policy: root
            test_command: "npm test -- --run"
            smoke_command: ""
    steps:
      - name: Check out workflow validation ref
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Validate dispatch inputs
        run: |
          python3 scripts/ci/validate_workflow_dispatch_inputs.py publish \
            --version "${{ inputs.version }}" \
            --dry-run "${{ inputs.dry_run }}" \
            --release-tag "${{ inputs.release_tag }}" \
            --dist-tag "${{ inputs.dist_tag }}"
      - name: Check out package ref
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - name: Version checks
        working-directory: ${{ matrix.package.path }}
        run: |
          FILE_VERSION=$(cat ../../VERSION 2>/dev/null || cat ../VERSION)
          REQUESTED="${{ github.event.inputs.version }}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ matrix.package.version_policy }}" = "root" ]; then
            test "$REQUESTED" = "$FILE_VERSION"
            test "$PACKAGE_VERSION" = "$REQUESTED"
          else
            test -n "$PACKAGE_VERSION"
          fi
      - name: Install, test, and build
        working-directory: ${{ matrix.package.path }}
        run: |
          npm ci
          if npm run | grep -q ' typecheck'; then npm run typecheck; fi
          TEST_COMMAND='${{ matrix.package.test_command }}'
          if [ -n "$TEST_COMMAND" ]; then eval "$TEST_COMMAND"; fi
          if npm run | grep -q ' build'; then npm run build; fi
          SMOKE_COMMAND='${{ matrix.package.smoke_command }}'
          if [ -n "$SMOKE_COMMAND" ]; then eval "$SMOKE_COMMAND"; fi
          npm pack --dry-run
      - name: Check existing package version
        id: package
        working-directory: ${{ matrix.package.path }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: github.event.inputs.dry_run != 'true' && steps.package.outputs.published != 'true'
        working-directory: ${{ matrix.package.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --tag "${{ inputs.dist_tag }}"
      - name: Ensure npm dist-tag
        if: github.event.inputs.dry_run != 'true'
        working-directory: ${{ matrix.package.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm dist-tag add "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" "${{ inputs.dist_tag }}"
      - name: Skip already published package
        if: github.event.inputs.dry_run != 'true' && steps.package.outputs.published == 'true'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published"
