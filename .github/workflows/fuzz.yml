name: Fuzz

on:
  pull_request:
    paths:
      - 'core/pkg/canonicalize/**'
      - 'core/pkg/contracts/**'
      - 'core/pkg/crypto/**'
      - 'core/pkg/guardian/**'
      - 'core/pkg/kernel/**'
      - 'core/pkg/proofgraph/**'
      - 'core/pkg/threatscan/**'
      - 'core/pkg/a2a/**'
      - 'core/pkg/saga/**'
      - 'core/pkg/compliance/**'
      - '.github/workflows/fuzz.yml'
  schedule:
    # Nightly deep fuzz run — 10 minutes per target
    - cron: '37 2 * * *'
  workflow_dispatch:

# Matrix targets reflect actual fuzz functions in the tree. The list is
# discovered by:
#   rg "^func Fuzz[A-Z]" core/pkg/ --type go
# and copied here. Each entry is one package + one fuzz function name.
# A PR changing fuzz function names must update this workflow in the same PR.
# The "Check fuzz target exists" step below guards against drift.

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target.pkg }} :: ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          # Canonicalization (JCS / RFC 8785)
          - { pkg: './pkg/canonicalize',            name: 'FuzzJCS' }
          - { pkg: './pkg/canonicalize',            name: 'FuzzJCSString' }
          # Contracts / receipts
          - { pkg: './pkg/contracts',               name: 'FuzzReceiptCanonicalization' }
          # Crypto / signing
          - { pkg: './pkg/crypto',                  name: 'FuzzKeyRingSignVerify' }
          # Guardian decision evaluation
          - { pkg: './pkg/guardian',                name: 'FuzzEvaluateDecision' }
          # Kernel CSNF
          - { pkg: './pkg/kernel',                  name: 'FuzzCSNFTransform' }
          - { pkg: './pkg/kernel',                  name: 'FuzzCSNFNormalizeJSON' }
          - { pkg: './pkg/kernel',                  name: 'FuzzValidateCSNFCompliance' }
          # ProofGraph
          - { pkg: './pkg/proofgraph',              name: 'FuzzNodeComputeHash' }
          # Threat scanner
          - { pkg: './pkg/threatscan',              name: 'FuzzScanInput' }
          # A2A envelope
          - { pkg: './pkg/a2a',                     name: 'FuzzEnvelopeValidation' }
          # Saga orchestrator
          - { pkg: './pkg/saga',                    name: 'FuzzSagaExecution' }
          # Compliance / JKG + CEL
          - { pkg: './pkg/compliance/jkg',          name: 'FuzzJKGParse' }
          - { pkg: './pkg/compliance/jkg',          name: 'FuzzObligationOperations' }
          - { pkg: './pkg/compliance/jkg',          name: 'FuzzRegulatorLookup' }
          - { pkg: './pkg/compliance/jkg',          name: 'FuzzGraphOperations' }
          - { pkg: './pkg/compliance/compiler',     name: 'FuzzCELCompile' }
          - { pkg: './pkg/compliance/compiler',     name: 'FuzzCompileRoundtrip' }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set fuzz duration
        id: fuzz
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "dur=10m" >> "$GITHUB_OUTPUT"
          else
            echo "dur=90s" >> "$GITHUB_OUTPUT"
          fi

      - name: Check fuzz target exists
        working-directory: core
        id: exists
        run: |
          if grep -q "^func ${{ matrix.target.name }}(" ${{ matrix.target.pkg }}/*.go 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Fuzz target ${{ matrix.target.name }} not found in ${{ matrix.target.pkg }} — skipping"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run fuzz target
        if: steps.exists.outputs.exists == 'true'
        working-directory: core
        run: |
          go test \
            -run=^$ \
            -fuzz=^${{ matrix.target.name }}$ \
            -fuzztime=${{ steps.fuzz.outputs.dur }} \
            ${{ matrix.target.pkg }}

      - name: Upload fuzz corpus on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target.name }}
          path: core/${{ matrix.target.pkg }}/testdata/fuzz/
          if-no-files-found: ignore
