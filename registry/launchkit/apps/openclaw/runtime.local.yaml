mode: live
target: local-container
command:
  - openclaw
  - gateway
  - run
  - --port
  - "18789"
  - --allow-unconfigured
  - --auth
  - none
  - --bind
  - loopback
healthcheck: helm-launchpad-openrouter-check
mcp_registry_ref: mcp.registry.yaml
provider_host_groups:
  - model_gateway_byo
egress_proxy_required: true
timeout: 300s
detached: true
readiness_timeout: 8m
requires:
  - local.docker
  - scoped_secret_grant
teardown:
  cascade: true
