# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: helm-ai-kernel

before:
  hooks:
    - cd core && go mod tidy

builds:
  - id: helm-ai-kernel
    dir: core
    main: ./cmd/helm-ai-kernel/
    binary: helm-ai-kernel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "helm-ai-kernel-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - docs/QUICKSTART.md

checksum:
  name_template: "SHA256SUMS.txt"
  algorithm: sha256

sboms:
  - artifacts: archive
    cmd: syft
    args: ["scan", "${artifact}", "--output", "spdx-json=${document}"]

signs:
  - cmd: cosign
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum

docker_signs:
  - cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}"
    artifacts: manifests

brews:
  - name: helm-ai-kernel
    repository:
      owner: mindburnlabs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Mindburn-Labs/helm-ai-kernel"
    description: "Fail-closed execution authority for AI agents"
    license: "Apache-2.0"
    install: |
      bin.install "helm-ai-kernel"
    test: |
      system "#{bin}/helm-ai-kernel", "--help"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: Mindburn-Labs
    name: helm-ai-kernel
  prerelease: auto
  draft: false
  extra_files:
    - glob: "dist/release-assets/helm-ai-kernel.mcpb"
    - glob: "dist/release-assets/evidence-pack.tar"
    - glob: "dist/release-assets/release-attestation.json"
    - glob: "dist/release-assets/sample-policy-material.tar"
    - glob: "dist/release-assets/release.high_risk.v3.toml"
