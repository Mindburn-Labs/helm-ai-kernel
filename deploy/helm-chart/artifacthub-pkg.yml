  artifacthub.io/changes: |
    - kind: security
      description: Close the default boundary policy fail-open path where a version-mismatch silently disabled enforcement.
      links:
        - name: GitHub PR
          url: https://github.com/Mindburn-Labs/helm-ai-kernel/pull/158
    - kind: fixed
      description: Anchor the KMS keystore on the runtime data directory so it survives readOnlyRootFilesystem pods.
    - kind: fixed
      description: Disable the phantom Prometheus metrics port by default until the backend handler ships.
    - kind: added
      description: Launchpad and Skill Packs production candidate with signed OCI artifact workflow support and live conformance promotion evidence.
    - kind: added
      description: Inject release image build metadata (version, commit, build_time) into the kernel binary via ldflags.
    - kind: changed
      description: Refresh ArtifactHub registration metadata and expose release asset export/verify logs.
