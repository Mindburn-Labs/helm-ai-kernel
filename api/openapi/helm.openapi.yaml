components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HELM_ADMIN_API_KEY
      description: |
        Self-hosted OSS admin bearer key. Set HELM_ADMIN_API_KEY on the server
        and send Authorization: Bearer <key> for protected runtime APIs.

    ServiceBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HELM_SERVICE_API_KEY
      description: |
        Self-hosted OSS service bearer key. Set HELM_SERVICE_API_KEY on the server
        and send Authorization: Bearer <key> for protected service-to-kernel APIs.

  parameters:
    HelmTenantIDHeader:
      name: X-Helm-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: |
        Tenant binding required by tenant-scoped runtime routes. The value must
        match HELM_RUNTIME_TENANT_ID, or the route fails closed with 403.
    HelmPrincipalIDHeader:
      name: X-Helm-Principal-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: |
        Principal binding required by tenant-scoped runtime routes. The value must
        match HELM_RUNTIME_PRINCIPAL_ID, or the authenticated admin principal when
        HELM_RUNTIME_PRINCIPAL_ID is unset.
    HelmWorkspaceIDHeader:
      name: X-Helm-Workspace-ID
      in: header
      required: false
      schema:
        type: string
        minLength: 1
      description: |
        Workspace binding required to evaluate a governed intent only while
        scoped emergency-stop fencing is enabled. The value must match
        HELM_RUNTIME_WORKSPACE_ID, or the route fails closed with 403.
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 1
      description: |
        Optional key for mutating requests. Replays return the original
        status/body and X-Helm-Idempotency-Replayed: true. Reusing the same key
        with a different method, path, query, or body returns 409.

  # ── Schemas ─────────────────────────────────────────
  schemas:
    HelmError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type, code, reason_code]
          properties:
            message:
              type: string
              description: Human-readable error message
            type:
              type: string
              enum: [invalid_request, authentication_error, permission_denied, not_found, internal_error]
            code:
              type: string
              description: Machine-readable error code
            reason_code:
              type: string
              description: HELM-specific reason code
              enum:
                - DENY_TOOL_NOT_FOUND
                - DENY_SCHEMA_MISMATCH
                - DENY_OUTPUT_DRIFT
                - DENY_BUDGET_EXCEEDED
                - DENY_APPROVAL_REQUIRED
                - DENY_APPROVAL_TIMEOUT
                - DENY_SANDBOX_TRAP
                - DENY_GAS_EXHAUSTION
                - DENY_TIME_LIMIT
                - DENY_MEMORY_LIMIT
                - DENY_POLICY_VIOLATION
                - DENY_TRUST_KEY_REVOKED
                - DENY_IDEMPOTENCY_DUPLICATE
                - ERROR_INTERNAL
            details:
              type: object
              description: Additional error context
              additionalProperties: true

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant, tool]
              content:
                type: string
              tool_call_id:
                type: string
        tools:
          type: array
          items:
            type: object
            properties:
              type: { type: string, enum: [function] }
              function:
                type: object
                properties:
                  name: { type: string }
                  description: { type: string }
                  parameters: { type: object }
        temperature:
          type: number
        max_tokens:
          type: integer
        stream:
          type: boolean
          default: false

    ChatCompletionResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string, default: "chat.completion" }
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              message:
                type: object
                properties:
                  role: { type: string }
                  content:
                    type: ['string', 'null']
                  tool_calls:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        type: { type: string }
                        function:
                          type: object
                          properties:
                            name: { type: string }
                            arguments: { type: string }
              finish_reason: { type: string }
        usage:
          type: object
          properties:
            prompt_tokens: { type: integer }
            completion_tokens: { type: integer }
            total_tokens: { type: integer }

    ApprovalRequest:
      type: object
      required: [intent_hash, signature_b64, public_key_b64]
      properties:
        intent_hash:
          type: string
          description: SHA-256 hash of the intent to approve
        signature_b64:
          type: string
          description: Base64-encoded Ed25519 signature
        public_key_b64:
          type: string
          description: Base64-encoded Ed25519 public key
        challenge_response:
          type: string
          description: Optional challenge/response for ceremony

    AddTrustKeyRequest:
      type: object
      required: [tenant_id, key_id, public_key]
      properties:
        tenant_id: { type: string }
        key_id: { type: string }
        public_key:
          type: string
          description: Hex-encoded Ed25519 public key

    RevokeTrustKeyRequest:
      type: object
      required: [tenant_id, key_id]
      properties:
        tenant_id: { type: string }
        key_id: { type: string }

    Receipt:
      type: object
      properties:
        receipt_id: { type: string }
        decision_id: { type: string }
        effect_id: { type: string }
        status: { type: string }
        reason_code: { type: string }
        output_hash: { type: string }
        blob_hash: { type: string }
        prev_hash: { type: string }
        lamport_clock: { type: integer }
        signature: { type: string }
        signature_profile:
          type: string
          enum: [classical, hybrid, pqc]
          description: Receipt signature profile emitted by the signer. Classical is Ed25519-only; hybrid is Ed25519 plus ML-DSA-65.
        signature_algorithm:
          type: string
          description: Signature algorithm or composite algorithm used for this receipt, such as ed25519, Hybrid-Ed25519-MLDSA65, or ml-dsa-65.
        key_id:
          type: string
          description: Active signer key identifier used for the receipt signature.
        public_key_set:
          type: object
          additionalProperties:
            type: string
          description: Public verification keys keyed by algorithm for the emitted receipt signature.
        timestamp: { type: string, format: date-time }
        principal: { type: string }
        executor_id: { type: string }
        args_hash: { type: string }
        metadata:
          type: object
          additionalProperties: true

    ReceiptListResponse:
      type: object
      properties:
        receipts:
          type: array
          items:
            $ref: '#/components/schemas/Receipt'
        count: { type: integer }
        next_cursor: { type: string }
        has_more: { type: boolean }

    LocalConsoleRuntimeConfig:
      type: object
      required: [api_base_url, local_mode, start_onboarding, tenant_id, principal_id, profile, entitlements]
      properties:
        api_base_url: { type: string, format: uri }
        local_mode: { type: boolean }
        start_onboarding: { type: boolean }
        tenant_id: { type: string }
        principal_id: { type: string }
        profile:
          type: string
          enum: [claude, codex, mcp, openai-compatible]
        entitlements:
          type: array
          items:
            type: string
            enum: [OSS_CORE]

    LocalSessionExchangeRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1

    LocalSessionExchangeResponse:
      type: object
      required: [session_token, tenant_id, principal_id, principal, expires_at, entitlements]
      properties:
        session_token: { type: string }
        tenant_id: { type: string }
        principal_id: { type: string }
        principal: { type: string }
        expires_at: { type: string, format: date-time }
        entitlements:
          type: array
          items:
            type: string
            enum: [OSS_CORE]

    OnboardingRunStepRequest:
      type: object
      required: [step_id]
      properties:
        step_id:
          type: string
          enum: [health, policy, allow, deny, mcp, verify]

    OnboardingState:
      type: object
      required: [mode, entitlements, profile, steps]
      properties:
        mode:
          type: string
          enum: [self-hosted-oss]
        entitlements:
          type: array
          items:
            type: string
            enum: [OSS_CORE]
        profile:
          type: string
        policy_path:
          type: string
        evidence_pack_ref:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/OnboardingStep'

    OnboardingStep:
      type: object
      required: [id, title, description, status, verdict, reason_code]
      properties:
        id:
          type: string
          enum: [health, policy, allow, deny, mcp, verify]
        title: { type: string }
        description: { type: string }
        status:
          type: string
          enum: [pending, pass]
        verdict:
          type: string
          enum: [ALLOW, DENY, ESCALATE]
        reason_code: { type: string }
        receipt_ref: { type: string }

    OnboardingEvidenceExport:
      type: object
      required: [evidence_pack_ref, sha256, receipt_refs, steps]
      properties:
        evidence_pack_ref: { type: string }
        sha256: { type: string }
        receipt_refs:
          type: object
          additionalProperties:
            type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/OnboardingStep'

    VerificationScope:
      type: object
      required: [verification_scope_id, subject_hash, checks_performed, verifier_hash, policy_hash, created_at]
      properties:
        verification_scope_id: { type: string }
        subject_hash: { type: string }
        risk_class:
          type: string
          enum: [T0, T1, T2, T3]
        checks_performed:
          type: array
          items: { type: string }
        assumptions:
          type: array
          items: { type: string }
        untested_regions:
          type: array
          items: { type: string }
        known_limits:
          type: array
          items: { type: string }
        remaining_risks:
          type: array
          items: { type: string }
        required_followup:
          type: array
          items: { type: string }
        verifier_hash: { type: string }
        policy_hash: { type: string }
        created_at: { type: string, format: date-time }
        scope_hash: { type: string }

    HarnessTrace:
      type: object
      required: [trace_id, plan_hash, policy_hash, receipt_refs, created_at]
      properties:
        trace_id: { type: string }
        plan_hash: { type: string }
        context_refs:
          type: array
          items: { type: string }
        memory_reads:
          type: array
          items: { type: string }
        memory_writes:
          type: array
          items: { type: string }
        tool_schema_hashes:
          type: array
          items: { type: string }
        permission_requests:
          type: array
          items: { type: string }
        sandbox_grant_hash: { type: string }
        mcp_approval_ref: { type: string }
        connector_contract_hash: { type: string }
        policy_hash: { type: string }
        cpi_output_hash: { type: string }
        verifier_outputs:
          type: array
          items: { type: string }
        human_interventions:
          type: array
          items: { type: string }
        state_updates:
          type: array
          items: { type: string }
        receipt_refs:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        trace_hash: { type: string }

    PlanTransaction:
      type: object
      required: [plan_transaction_id, plan_hash, read_set, write_set, assumption_set, verification_obligations, conflict_policy]
      properties:
        plan_transaction_id: { type: string }
        plan_hash: { type: string }
        read_set:
          type: array
          items: { type: string }
        write_set:
          type: array
          items: { type: string }
        assumption_set:
          type: array
          items: { type: string }
        version_dependencies:
          type: array
          items: { type: string }
        verification_obligations:
          type: array
          items: { type: string }
        conflict_policy:
          type: string
          enum: [deny, escalate, last_writer_forbidden]
        rollback_policy:
          type: object
          additionalProperties: true
        rollback_or_compensation_policy: { type: string }
        approval_state:
          type: string
          enum: [none, required, approved, denied, expired]
        human_review_state: { type: string }
        transaction_hash: { type: string }

    HarnessChangeContract:
      type: object
      required: [change_contract_id, component_modified, failure_mode_targeted, predicted_improvement, invariants_preserved, safety_properties, regression_suite_refs, rollback_plan, approval_required, created_at]
      properties:
        change_contract_id: { type: string }
        component_modified:
          type: string
          enum: [connector_contract, tool_schema, sandbox_grant, mcp_approval, policy_overlay, verifier, evidence_template, routing_rule]
        failure_mode_targeted: { type: string }
        predicted_improvement: { type: string }
        invariants_preserved:
          type: array
          items: { type: string }
        safety_properties:
          type: array
          items: { type: string }
        regression_suite_refs:
          type: array
          items: { type: string }
        simulation_evidence_refs:
          type: array
          items: { type: string }
        canary_scope:
          type: object
          additionalProperties: true
        rollback_plan:
          type: object
          additionalProperties: true
        approval_required: { type: boolean }
        activation_receipt_ref: { type: string }
        created_at: { type: string, format: date-time }
        contract_hash: { type: string }

    GroundedActionRef:
      type: object
      required: [grounded_action_id, screenshot_hash, dom_or_ax_snapshot_hash, target_ref, bbox_or_element_id, action_type, precondition, postcondition, postcondition_ref, verification_scope_ref, policy_hash, proof_graph_node_ref]
      properties:
        grounded_action_id: { type: string }
        screenshot_hash: { type: string }
        dom_or_ax_snapshot_hash: { type: string }
        target_ref: { type: string }
        bbox_or_element_id: { type: string }
        action_type:
          type: string
          enum: [click, type, select, submit, navigate]
