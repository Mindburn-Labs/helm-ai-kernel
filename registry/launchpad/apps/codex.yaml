id: codex
name: Codex
version: external-byo
license:
  status: official-tool-byo-account
  spdx: Apache-2.0
  url: https://github.com/openai/codex
redistribution: external_byo_account
availability: external_proprietary_adapter
install:
  strategy: byo_tool
runtime:
  command: ["codex"]
model_gateway_env: ["OPENAI_API_KEY"]
required_secrets: ["openai_account_or_api_key"]
filesystem_policy:
  mode: scoped_workspace
  mounts: ["workspace:rw", "app_state:rw"]
  policy_ref: policies/launchpad/apps/codex.external.toml
network_policy:
  default: deny
  allowlist: []
mcp_policy:
  unknown_server_policy: quarantine
  unknown_tool_policy: ESCALATE
  require_schema_pin: true
healthchecks:
  - type: command
    command: "codex --version"
risk_class: T1
budget_ceiling:
  usd_max: 0
  api_calls_max: 0
  time_ms_max: 0
evidence_requirements: ["cpi_output", "kernel_verdict", "sandbox_grant", "launch_receipt", "teardown_receipt", "evidence_pack"]
conformance:
  license_verified: true
  artifact_verified: false
  policy_pack_present: true
  sandbox_verified: false
  healthcheck_passing: false
  e2e_passing: false
  teardown_verified: false
  receipt_verified: false
  evidence_pack_verified: false
