id: openclaw
name: OpenClaw
version: v2026.5.12
license:
    status: verified
    spdx: MIT
    url: https://github.com/openclaw/openclaw/blob/v2026.5.12/LICENSE
redistribution: allowed_by_MIT_with_upstream_notice
availability: oss_supported
support_level: agent_live
install:
    strategy: signed_oci
    image: ghcr.io/mindburn-labs/helm-launchpad/openclaw@sha256:4da80a1e48b5603fd203b7d2b98539a01f796142b0ed9315e5ed86b25bf5d995
    digest: sha256:4da80a1e48b5603fd203b7d2b98539a01f796142b0ed9315e5ed86b25bf5d995
    source: https://github.com/openclaw/openclaw
    ref: v2026.5.12
runtime:
    # Headless launch: default `openclaw` invocation drops into the Crestodian
    # TUI and exits 1 without a TTY ("Crestodian needs an interactive TTY").
    # Use `gateway run` for a foreground HTTP gateway bound to container
    # loopback; the readiness/healthcheck reaches it via `docker exec`, not
    # via a published port, so loopback bind is safe here.
    command:
        - openclaw
        - gateway
        - run
        - --port
        - "18789"
        - --allow-unconfigured
        - --auth
        - none
        - --bind
        - loopback
    timeout: 300s
    detached: true
    readiness_timeout: 8m
model_gateway:
    logical_secret: model_gateway
    provider: byo
    provider_ids:
        - openrouter
    mode: logical_binding_env_projection
    raw_provider_key_projected: true
required_secrets:
    - model_gateway
filesystem_policy:
    mode: scoped_workspace
    mounts:
        - workspace:rw
        # openclaw hard-codes its writable state at /opt/openclaw/.openclaw
        # (plugins, browser auth, heartbeat all mkdir there). The rootfs is
        # read-only, so without this explicit target the plugin subsystem
        # crashes with ENOENT. Pin the mount target on the AppSpec side so
        # the kernel runtime materializer creates the path and the workload
        # finds a writable directory.
        - app_state:rw:/opt/openclaw/.openclaw
    policy_ref: policies/launchpad/apps/openclaw.safe.toml
network_policy:
    default: deny
mcp_policy:
    unknown_server_policy: quarantine
    unknown_tool_policy: ESCALATE
    require_schema_pin: true
mcp_manifests:
    - openclaw.default
healthchecks:
    - type: command
      command: helm-launchpad-openrouter-check
risk_class: T1
budget_ceiling:
    usd_max: 0
    api_calls_max: 0
    time_ms_max: 0
framework_contract:
    f2_contract_preflight: true
    claim_level: agent_live
    live_command_kind: agent_live
    runtime_install_policy: forbidden
    baked_dependencies:
        - openclaw-cli
        - gateway-runtime
        - launchpad-openrouter-check
    forbidden_runtime_install_patterns:
        - npm install
        - pnpm install
        - yarn install
        - pip install
        - uv pip install
        - playwright install
        - apt-get
        - apk add
        - curl | sh
        - curl -fsSL
    writable_paths:
        - path: /opt/openclaw/.openclaw
          purpose: app_cache_state
          required: true
    provider_host_groups:
        - openrouter
    egress_proxy:
        required: true
        image: ghcr.io/mindburn-labs/helm-launchpad/egress-proxy@sha256:395cd585d0e2345e649455953f0d7765b141440bfb2fc753a4ae944e2ba350f8
        digest: sha256:395cd585d0e2345e649455953f0d7765b141440bfb2fc753a4ae944e2ba350f8
        signature_ref: cosign://ghcr.io/mindburn-labs/helm-launchpad/egress-proxy@sha256:395cd585d0e2345e649455953f0d7765b141440bfb2fc753a4ae944e2ba350f8
        sbom_ref: artifact://sbom-egress-proxy.spdx.json
        vulnerability_scan_ref: artifact://grype-egress-proxy.json
        receipt_ref: receipts/launchpad-egress-proxy.json
    mcp_manifest_refs:
        - openclaw.default
    healthcheck: helm-launchpad-openrouter-check
    evidence_profile: f2.contract.v1
    images:
        - name: openclaw-production
          image: ghcr.io/mindburn-labs/helm-launchpad/openclaw@sha256:4da80a1e48b5603fd203b7d2b98539a01f796142b0ed9315e5ed86b25bf5d995
          digest: sha256:4da80a1e48b5603fd203b7d2b98539a01f796142b0ed9315e5ed86b25bf5d995
          purpose: production_proof
          baked_dependencies:
              - openclaw-cli
              - gateway-runtime
    evidence_refs:
        - contract_preflight.json
        - launch_plan.json
        - kernel_verdict.json
        - sandbox_grant.json
        - receipts/launchpad-egress-proxy.json
        - mcp_quarantine.json
        - receipts/launchpad-healthcheck.json
        - runtime_environment.json
        - 04_EXPORTS/launchpad_manifest.json
        - offline_verify.txt
evidence_requirements:
    - contract_preflight
    - cpi_output
    - kernel_verdict
    - sandbox_grant
    - egress_proxy_receipt
    - launch_receipt
    - install_receipt
    - healthcheck_receipt
    - teardown_receipt
    - evidence_pack
    - offline_verify
    - evidence_graph
    - mcp_quarantine
    - mcp_manifest
    - model_gateway_broker
    - artifact_digest
    - cosign_signature
    - syft_sbom
    - grype_vulnerability_scan
supply_chain_evidence:
    artifact_digest: sha256:4da80a1e48b5603fd203b7d2b98539a01f796142b0ed9315e5ed86b25bf5d995
    signature_tool: cosign
    signature_ref: cosign://ghcr.io/mindburn-labs/helm-launchpad/openclaw@sha256:4da80a1e48b5603fd203b7d2b98539a01f796142b0ed9315e5ed86b25bf5d995
    sbom_tool: syft
    sbom_ref: artifact://sbom-openclaw.spdx.json
    vulnerability_scan_tool: grype
    vulnerability_scan_ref: artifact://grype-openclaw.json
promotion_evidence:
    artifact_verification_ref: github-actions://26198407296/1/artifact-verification/openclaw
    live_e2e_run_id: github-actions://26198407296/1/live-e2e/openclaw
    evidence_pack_ref: github-actions://26198407296/1/evidencepack/openclaw
    teardown_receipt_ref: github-actions://26198407296/1/teardown/openclaw
conformance:
    license_verified: true
    artifact_verified: true
    policy_pack_present: true
    sandbox_verified: true
    healthcheck_passing: true
    e2e_passing: true
    teardown_verified: true
    receipt_verified: true
    evidence_pack_verified: true
metadata:
    artifact_workflow_run: github-actions://26198407296/1
    helm_oci_status: promoted_from_signed_ci_artifact_manifest
    helm_oci_target: ghcr.io/mindburn-labs/helm-launchpad/openclaw:v2026.5.12
    latest_release: v2026.5.12
    promotion_provenance_ref: github-actions://26198407296/1
    release_published_at: "2026-05-14T18:28:04Z"
    upstream_commit: f066dd2f31c231f38fbcaacd6f6dfce0801143b3
    upstream_repo: https://github.com/openclaw/openclaw

display:
  headline: "Run OpenClaw through HELM"
  short_description: "Launch OpenClaw behind HELM’s fail-closed execution boundary."
  primary_command: "helm up openclaw"
  proof_summary:
    - "signed OCI artifact"
    - "deny-by-default network policy"
    - "MCP quarantine"
    - "signed receipts"
    - "offline EvidencePack verification"
  docs_path: "docs/launchpad/apps/OPENCLAW.md"
  contribution_label: "framework-integration"
