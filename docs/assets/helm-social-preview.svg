<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">HELM AI Kernel social preview blueprint</title>
  <desc id="desc">A light blueprint-style social preview for HELM AI Kernel, an open-source execution firewall for MCP and AI agents.</desc>
  <defs>
    <pattern id="minorGrid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M14 0H0V14" fill="none" stroke="#eef1f3" stroke-width="1"/>
    </pattern>
    <pattern id="majorGrid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M70 0H0V70" fill="none" stroke="#dfe4e8" stroke-width="1.1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#9aa3ad" flood-opacity="0.17"/>
    </filter>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#77cfd0"/>
    </marker>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .ink { fill: #2f3540; }
      .muted { fill: #6f7782; }
      .layer { fill: #f7f8f9; stroke: #8e969f; stroke-width: 1.35; }
      .small { font-size: 13px; font-weight: 650; }
      .label { font-size: 17px; font-weight: 650; }
      .nodeHead { font-size: 22px; font-weight: 720; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#fbfaf8"/>
  <rect width="1280" height="640" fill="url(#minorGrid)" opacity="0.72"/>
  <rect width="1280" height="640" fill="url(#majorGrid)" opacity="0.9"/>

  <g opacity="0.15" fill="none" stroke="#cbd0d5" stroke-width="1.4">
    <path d="M-12 542C134 450 202 360 142 254C102 184 70 130 58 62C188 166 232 278 254 388C320 340 326 238 378 176C404 282 466 366 508 474C552 590 454 690 300 718"/>
    <path d="M-40 360C82 378 202 360 292 308C362 268 400 214 444 162"/>
  </g>

  <g transform="translate(690 88)" text-anchor="middle">
    <text class="sans ink" x="0" y="0" font-size="43" font-weight="730">HELM AI Kernel</text>
    <text class="sans muted" x="0" y="36" font-size="22">Execution firewall for MCP and AI agents</text>
  </g>

  <g transform="translate(540 178)" filter="url(#softShadow)">
    <g class="sans" text-anchor="middle">
      <path class="layer" d="M214 56L260 38C326 26 484 26 550 38L596 56L550 74C484 86 326 86 260 74Z"/>
      <text class="small ink" x="405" y="61">MCP / gateway surface</text>
      <path class="layer" d="M194 118L250 98C320 84 490 84 560 98L616 118L560 138C490 152 320 152 250 138Z"/>
      <path class="layer" d="M174 182L238 158C312 142 498 142 572 158L636 182L572 206C498 222 312 222 238 206Z"/>
      <path class="layer" d="M194 260L250 230C320 212 490 212 560 230L616 260L560 290C490 308 320 308 250 290Z"/>
      <path class="layer" d="M214 336L260 302C326 282 484 282 550 302L596 336L550 370C484 390 326 390 260 370Z"/>
    </g>

    <path d="M112 212H176C202 212 204 174 230 174H308" fill="none" stroke="#d7dde3" stroke-width="11" stroke-linecap="round"/>
    <path d="M112 212H176C202 212 204 174 230 174H308" fill="none" stroke="#77cfd0" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <path d="M392 174H548" fill="none" stroke="#d7dde3" stroke-width="11" stroke-linecap="round"/>
    <path d="M392 174H548" fill="none" stroke="#77cfd0" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
    <path d="M348 220V248C348 272 374 278 405 278" fill="none" stroke="#d9d6ef" stroke-width="11" stroke-linecap="round"/>
    <path d="M348 220V248C348 272 374 278 405 278" fill="none" stroke="#8f87d8" stroke-width="4" stroke-linecap="round"/>
    <path d="M470 220V248C470 272 444 278 408 278" fill="none" stroke="#d9d6ef" stroke-width="11" stroke-linecap="round"/>
    <path d="M470 220V248C470 272 444 278 408 278" fill="none" stroke="#8f87d8" stroke-width="4" stroke-linecap="round"/>

    <g class="sans" text-anchor="middle">
      <circle cx="112" cy="212" r="42" fill="#fbfcfc" stroke="#a2a9b1" stroke-width="1.4"/>
      <circle cx="112" cy="212" r="31" fill="none" stroke="#c6cbd0" stroke-width="1.1"/>
      <text class="label ink" x="112" y="218">Agent</text>

      <circle cx="348" cy="174" r="53" fill="#f8fbfb" stroke="#9fe3e2" stroke-width="6"/>
      <circle cx="348" cy="174" r="64" fill="none" stroke="#74cbcb" stroke-width="1.8"/>
      <text class="nodeHead ink" x="348" y="166">PEP</text>
      <text class="muted" x="348" y="190" font-size="13">fail closed</text>

      <circle cx="532" cy="174" r="53" fill="#f8fbfb" stroke="#9fe3e2" stroke-width="6"/>
      <circle cx="532" cy="174" r="64" fill="none" stroke="#74cbcb" stroke-width="1.8"/>
      <text class="nodeHead ink" x="532" y="166">CPI</text>
      <text class="muted" x="532" y="190" font-size="13">signed proof</text>

      <circle cx="405" cy="278" r="56" fill="#faf9ff" stroke="#aaa5e8" stroke-width="6"/>
      <circle cx="405" cy="278" r="66" fill="none" stroke="#8079cf" stroke-width="1.8"/>
      <text class="label ink" x="405" y="271">ProofGraph</text>
      <text class="muted" x="405" y="294" font-size="14">verify offline</text>
    </g>
  </g>

  <g class="sans muted" transform="translate(84 530)">
    <text x="0" y="0" font-size="19">DENY unknown tools before dispatch</text>
    <text x="0" y="30" font-size="19">ALLOW pinned schemas with receipts</text>
    <text x="0" y="60" font-size="19">FAIL tampered verdicts offline</text>
