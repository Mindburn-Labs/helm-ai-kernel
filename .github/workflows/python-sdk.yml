name: Python SDK CI

on:
  push:
    branches: [main]
    paths:
      - "sdk/python/**"
      - ".github/workflows/python-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/python/**"
      - ".github/workflows/python-sdk.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install dependencies
        run: |
          cd sdk/python
          pip install -e '.[dev]' --quiet
      - name: Ruff lint
        run: cd sdk/python && ruff check .
      - name: Ruff format check
        run: cd sdk/python && ruff format --check .
      - name: Mypy type check
        run: cd sdk/python && mypy .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install dependencies
        run: |
          cd sdk/python
          pip install -e '.[dev]' --quiet
      - name: Run tests with coverage
        run: |
          cd sdk/python
          pytest -v --tb=short --cov=helm_sdk --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-coverage
          path: sdk/python/coverage.xml

  adapters:
    name: Framework Adapters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install core SDK and pytest
        run: |
          cd sdk/python
          pip install -e '.[dev]' --quiet
      - name: OpenAI Agents adapter
        run: cd sdk/python/openai_agents && python -m pytest test_helm_openai_agents.py -v
      - name: MS Agent Framework adapter
        run: cd sdk/python/microsoft_agents && python -m pytest test_helm_ms_agent.py -v
      - name: LangChain adapter
        run: cd sdk/python/langchain && python -m pytest test_helm_langchain.py -v

  package:
    name: Package Validation
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml
      - name: Install build tools
        run: pip install build --quiet
      - name: Build sdist
        run: |
          cd sdk/python
          python -m build --sdist --no-isolation
      - name: Verify import
        run: |
          cd sdk/python
          pip install -e . --quiet
          python -c "from helm_sdk import HelmClient, HelmApiError; print('import ok')"
      - name: Dependency audit
        run: |
          pip install pip-audit --quiet
          cd sdk/python
          pip-audit --strict --desc || {
            echo "::error::pip-audit found vulnerabilities in Python SDK"
            exit 1
          }
