model_gateway_env:
    - OPENROUTER_API_KEY
required_secrets:
    - model_gateway
filesystem_policy:
    mode: scoped_workspace
    mounts:
        - workspace:rw
        - app_state:rw
    policy_ref: policies/launchpad/apps/hermes.safe.toml
network_policy:
    default: deny
    allowlist:
        - https://openrouter.ai/api/v1
mcp_policy:
    unknown_server_policy: quarantine
    unknown_tool_policy: ESCALATE
    require_schema_pin: true
mcp_manifests:
    - hermes.default
healthchecks:
    - type: command
      command: helm-launchpad-openrouter-check
risk_class: T1
budget_ceiling:
    usd_max: 0
    api_calls_max: 0
    time_ms_max: 0
evidence_requirements:
