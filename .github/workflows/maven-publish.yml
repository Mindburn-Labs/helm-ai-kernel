name: Maven Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish. Must match VERSION.
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Version checks
        working-directory: sdk/java
        run: |
          FILE_VERSION=$(cat ../../VERSION)
          REQUESTED="${{ github.event.inputs.version }}"
          POM_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\([^<]*\)<\/version>.*/\1/')
          test "$REQUESTED" = "$FILE_VERSION"
          test "$POM_VERSION" = "$FILE_VERSION"
      - name: Build
        working-directory: sdk/java
        run: mvn -q test package
      - name: Import GPG key
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        run: |
          key_file="$RUNNER_TEMP/maven-gpg-private-key"
          printf '%s' "$MAVEN_GPG_PRIVATE_KEY" > "$key_file"
          if gpg --batch --import "$key_file"; then
            exit 0
          fi
          if base64 --decode "$key_file" > "${key_file}.decoded" 2>/dev/null && gpg --batch --import "${key_file}.decoded"; then
            exit 0
          fi
          printf '%b' "$MAVEN_GPG_PRIVATE_KEY" > "${key_file}.escaped"
          gpg --batch --import "${key_file}.escaped"
      - name: Publish
        working-directory: sdk/java
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          OSSRH_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: >
          mvn --batch-mode deploy
          --settings ../../scripts/release/maven-settings.xml
          -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE"
