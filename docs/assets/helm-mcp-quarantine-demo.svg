<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">HELM AI Kernel execution firewall blueprint - Centered Symmetrical Flow</title>
  <desc id="desc">A centered, highly legible blueprint-style architecture diagram showing model proposals entering the HELM policy boundary. Unpinned/unknown tool proposals fail closed and trigger Coral-colored quarantine DENY states with signed ProofGraph receipts. Schema-pinned tool proposals transition to safe Teal ALLOW states, execute their side-effects, and record verifiable audit receipts.</desc>
  <defs>
    <pattern id="minorGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0H0V16" fill="none" stroke="#edf0f2" stroke-width="1"/>
    </pattern>
    <pattern id="majorGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#dfe4e8" stroke-width="1.15"/>
    </pattern>
    <filter id="paper" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="17" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.02"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#9aa3ad" flood-opacity="0.18"/>
    </filter>
    <filter id="glowTeal" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowRed" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowViolet" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#14b8a6"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap');
      
      .sans { font-family: 'Outfit', ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .ink { fill: #1e293b; }
      .muted { fill: #64748b; }
      .faint { fill: #94a3b8; }
      
      .layerCard { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: drop-shadow(0 4px 6px rgba(148, 163, 184, 0.08)); }
      .ring { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .pathBase { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      
      .nodeHead { font-size: 24px; font-weight: 800; letter-spacing: -0.3px; }
      .small { font-size: 15px; font-weight: 500; }
      .micro { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }
      
      /* Animation Timings */
      .packet-deny {
        animation: deny-packet-anim 12s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      .packet-allow {
        animation: allow-packet-anim 12s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      .packet-effect {
        animation: effect-packet-anim 12s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      .receipt-deny {
        animation: receipt-deny-anim 12s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      .receipt-allow {
        animation: receipt-allow-anim 12s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .node-pep {
        animation: pep-glow-anim 12s infinite ease-in-out;
      }
      .node-cpi {
        animation: cpi-glow-anim 12s infinite ease-in-out;
      }
      .node-pg {
        animation: pg-glow-anim 12s infinite ease-in-out;
      }
      .node-effects {
        animation: effects-glow-anim 12s infinite ease-in-out;
      }
      
      .barrier-deny {
        animation: barrier-deny-anim 12s infinite ease-in-out;
        transform-origin: 600px 450px;
      }
      .text-deny-state {
        animation: text-deny-anim 12s infinite ease-in-out;
      }
      .text-allow-state {
        animation: text-allow-anim 12s infinite ease-in-out;
      }
      
      .line-agent-pep {
        animation: line-agent-pep-anim 12s infinite ease-in-out;
      }
      .line-pep-cpi {
        animation: line-pep-cpi-anim 12s infinite ease-in-out;
      }
      .line-cpi-effects {
        animation: line-cpi-effects-anim 12s infinite ease-in-out;
      }
      .line-pep-pg {
        animation: line-pep-pg-anim 12s infinite ease-in-out;
      }
      .line-cpi-pg {
        animation: line-cpi-pg-anim 12s infinite ease-in-out;
      }
      
      .grid-scanner {
        animation: scan-anim 8s infinite linear;
      }
      
      /* Animation Keyframes */
      @keyframes scan-anim {
        0% { transform: translateY(-900px); }
        100% { transform: translateY(900px); }
      }
      
      @keyframes deny-packet-anim {
        0% { transform: translate(250px, 450px); opacity: 0; }
        2% { opacity: 1; }
        10% { transform: translate(600px, 450px); opacity: 1; }
        11%, 100% { opacity: 0; transform: translate(250px, 450px); }
      }
      
      @keyframes pep-glow-anim {
        0%, 8% { fill: #ffffff; stroke: #cbd5e1; filter: none; }
        10%, 28% { fill: #fff1f2; stroke: #f43f5e; filter: url(#glowRed); stroke-width: 3px; }
        30%, 70% { fill: #ffffff; stroke: #cbd5e1; filter: none; stroke-width: 1.5px; }
        72%, 84% { fill: #f0fdf4; stroke: #10b981; filter: url(#glowTeal); stroke-width: 3px; }
        86%, 100% { fill: #ffffff; stroke: #cbd5e1; filter: none; stroke-width: 1.5px; }
      }
      
      @keyframes barrier-deny-anim {
        0%, 8% { opacity: 0; transform: scale(0.8); }
        10%, 28% { opacity: 0.95; transform: scale(1.0); }
        30%, 100% { opacity: 0; transform: scale(0.8); }
      }
      
      @keyframes receipt-deny-anim {
        0%, 14% { transform: translate(600px, 450px); opacity: 0; }
        15% { opacity: 1; }
        17% { transform: translate(600px, 508px); opacity: 1; }
        20% { transform: translate(625px, 565px); opacity: 1; }
        23% { transform: translate(700px, 622px); opacity: 1; }
        26% { transform: translate(800px, 680px); opacity: 1; }
        28% { opacity: 0; }
        28.1%, 100% { opacity: 0; transform: translate(600px, 450px); }
      }
      
      @keyframes allow-packet-anim {
        0%, 50% { transform: translate(250px, 450px); opacity: 0; }
        51% { opacity: 1; }
        60% { transform: translate(600px, 450px); opacity: 1; }
        61%, 100% { opacity: 0; transform: translate(250px, 450px); }
      }
      
      @keyframes line-agent-pep-anim {
        0%, 8% { stroke: #cbd5e1; stroke-width: 4px; }
        10%, 28% { stroke: #fca5a5; stroke-width: 5px; }
        30%, 70% { stroke: #cbd5e1; stroke-width: 4px; }
        72%, 84% { stroke: #99f6e4; stroke-width: 5px; }
        86%, 100% { stroke: #cbd5e1; stroke-width: 4px; }
      }
      
      @keyframes line-pep-cpi-anim {
        0%, 70% { stroke: #cbd5e1; stroke-width: 4px; }
        72%, 84% { stroke: #99f6e4; stroke-width: 5px; }
        86%, 100% { stroke: #cbd5e1; stroke-width: 4px; }
      }
      
      @keyframes line-cpi-effects-anim {
        0%, 77% { stroke: #cbd5e1; stroke-width: 3px; }
        80%, 94% { stroke: #99f6e4; stroke-width: 4px; }
        96%, 100% { stroke: #cbd5e1; stroke-width: 3px; }
      }
      
      @keyframes line-pep-pg-anim {
        0%, 14% { stroke: #cbd5e1; stroke-width: 4px; }
        16%, 28% { stroke: #c7d2fe; stroke-width: 5px; }
        30%, 100% { stroke: #cbd5e1; stroke-width: 4px; }
      }
      
      @keyframes line-cpi-pg-anim {
        0%, 74% { stroke: #cbd5e1; stroke-width: 4px; }
        76%, 88% { stroke: #c7d2fe; stroke-width: 5px; }
        90%, 100% { stroke: #cbd5e1; stroke-width: 4px; }
      }
      
      @keyframes cpi-glow-anim {
        0%, 70% { fill: #ffffff; stroke: #cbd5e1; filter: none; }
        72%, 86% { fill: #f0fdf4; stroke: #10b981; filter: url(#glowTeal); stroke-width: 3px; }
        88%, 100% { fill: #ffffff; stroke: #cbd5e1; filter: none; stroke-width: 1.5px; }
      }
      
      @keyframes effect-packet-anim {
        0%, 72% { transform: translate(600px, 450px); opacity: 0; }
        73% { opacity: 1; }
        78% { transform: translate(800px, 450px); opacity: 1; }
        82% { transform: translate(1000px, 450px); opacity: 1; }
        84% { transform: translate(1100px, 450px); opacity: 1; }
        89% { transform: translate(1250px, 450px); opacity: 1; }
        93% { transform: translate(1350px, 450px); opacity: 1; }
        95%, 100% { opacity: 0; transform: translate(600px, 450px); }
      }
      
      @keyframes receipt-allow-anim {
        0%, 74% { transform: translate(1000px, 450px); opacity: 0; }
        76% { opacity: 1; }
        78% { transform: translate(1000px, 508px); opacity: 1; }
        81% { transform: translate(975px, 565px); opacity: 1; }
        84% { transform: translate(900px, 622px); opacity: 1; }
        87% { transform: translate(800px, 680px); opacity: 1; }
        89% { opacity: 0; }
        89.1%, 100% { opacity: 0; transform: translate(1000px, 450px); }
      }
      
      @keyframes pg-glow-anim {
        0%, 22% { fill: #ffffff; stroke: #cbd5e1; filter: none; }
        24%, 34% { fill: #e0e7ff; stroke: #6366f1; filter: url(#glowViolet); stroke-width: 3px; }
        36%, 82% { fill: #ffffff; stroke: #cbd5e1; filter: none; stroke-width: 1.5px; }
        84%, 94% { fill: #e0e7ff; stroke: #6366f1; filter: url(#glowViolet); stroke-width: 3px; }
        96%, 100% { fill: #ffffff; stroke: #cbd5e1; filter: none; stroke-width: 1.5px; }
      }
      
      @keyframes effects-glow-anim {
        0%, 88% { fill: #ffffff; stroke: #cbd5e1; filter: none; }
        90%, 98% { fill: #ecfeff; stroke: #06b6d4; filter: url(#glowTeal); stroke-width: 3px; }
        100% { fill: #ffffff; stroke: #cbd5e1; filter: none; stroke-width: 1.5px; }
      }
      
      @keyframes text-deny-anim {
        0%, 8% { opacity: 0; }
        10%, 28% { opacity: 1; }
        30%, 100% { opacity: 0; }
      }
      
      @keyframes text-allow-anim {
        0%, 70% { opacity: 0; }
        72%, 86% { opacity: 1; }
        88%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background Warm Canvas -->
  <rect width="1600" height="900" fill="#fafaf9"/>
  <rect width="1600" height="900" fill="url(#minorGrid)" opacity="0.6"/>
  <rect width="1600" height="900" fill="url(#majorGrid)" opacity="0.8"/>
  <rect width="1600" height="900" fill="#fafaf9" opacity="0.25" filter="url(#paper)"/>

  <!-- Scanning grid line for tech detail -->
  <line x1="0" y1="0" x2="1600" y2="0" stroke="#0ea5e9" stroke-width="0.7" opacity="0.12" class="grid-scanner"/>

  <!-- Decorative technical blueprint vectors -->
  <g opacity="0.08" fill="none" stroke="#94a3b8" stroke-width="1.5">
    <circle cx="800" cy="450" r="320"/>
    <circle cx="800" cy="450" r="440"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <path d="M 400,200 L 1200,200 L 1200,700 L 400,700 Z"/>
  </g>

  <!-- Header -->
  <g transform="translate(800 100)" text-anchor="middle">
    <text class="sans ink" x="0" y="0" font-size="46" font-weight="800" letter-spacing="-0.5px">HELM AI Kernel</text>
    <text class="sans muted" x="0" y="38" font-size="22" font-weight="500">Open-source execution firewall for MCP and AI agents</text>
  </g>

  <!-- Flowchart Connections (Centered Pipeline & V-shape Ledger) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 0)">
    <!-- Agent -> PEP -->
    <path d="M 250,450 H 600" stroke="#cbd5e1" stroke-width="12"/>
    <path d="M 250,450 H 600" class="pathBase line-agent-pep" stroke="#94a3b8" stroke-width="4"/>

    <!-- PEP -> CPI -->
    <path d="M 600,450 H 1000" stroke="#cbd5e1" stroke-width="12"/>
    <path d="M 600,450 H 1000" class="pathBase line-pep-cpi" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrowTeal)"/>

    <!-- CPI -> Effects -->
    <path d="M 1000,450 H 1350" stroke="#cbd5e1" stroke-width="12"/>
    <path d="M 1000,450 H 1350" class="pathBase line-cpi-effects" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrowGray)"/>

    <!-- PEP -> ProofGraph (curved audit receipt flow) -->
    <path d="M 600,450 Q 600,680 800,680" stroke="#cbd5e1" stroke-width="12"/>
    <path d="M 600,450 Q 600,680 800,680" class="pathBase line-pep-pg" stroke="#cbd5e1" stroke-width="4"/>

    <!-- CPI -> ProofGraph (curved audit receipt flow) -->
    <path d="M 1000,450 Q 1000,680 800,680" stroke="#cbd5e1" stroke-width="12"/>
    <path d="M 1000,450 Q 1000,680 800,680" class="pathBase line-cpi-pg" stroke="#cbd5e1" stroke-width="4"/>
  </g>

  <!-- Flowchart Nodes (Centered & Balanced) -->
  <g class="sans" text-anchor="middle" filter="url(#softShadow)">
    
    <!-- 1. AGENT NODE (cx=250, cy=450) -->
    <g transform="translate(250 450)">
      <circle class="ring" cx="0" cy="0" r="75" stroke-dasharray="4, 4"/>
      <circle class="ring" cx="0" cy="0" r="65"/>
      <circle fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" cx="0" cy="0" r="52"/>
      <text class="ink nodeHead" x="0" y="8">Agent</text>
      <!-- proposal label -->
      <text class="muted small" x="0" y="-88">proposals</text>
    </g>

    <!-- 2. POLICY ENFORCEMENT POINT (cx=600, cy=450) -->
    <g transform="translate(600 450)">
      <circle class="ring" cx="0" cy="0" r="95" stroke-dasharray="8, 6"/>
      <circle class="ring" cx="0" cy="0" r="82"/>
      <circle id="pep-node" class="ring node-pep" cx="0" cy="0" r="68"/>
      <text class="ink nodeHead" x="0" y="-8">PEP</text>
      <text class="ink small" x="0" y="16" font-size="14">Policy Enforcement</text>
      <text class="muted small" x="0" y="34" font-size="13">Point</text>
      
      <!-- State Badge -->
      <rect x="-65" y="110" width="130" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text class="muted micro" x="0" y="128">fail-closed</text>

      <!-- Warning Quarantine Shield (Flashes and glows red when Deny is active) -->
      <circle class="barrier-deny" fill="none" stroke="#f43f5e" stroke-width="6" stroke-dasharray="14, 10" cx="0" cy="0" r="75" opacity="0"/>
    </g>

    <!-- 3. CONSTRAINT + PROOF INTERFACE (cx=1000, cy=450) -->
    <g transform="translate(1000 450)">
      <circle class="ring" cx="0" cy="0" r="95" stroke-dasharray="8, 6"/>
      <circle class="ring" cx="0" cy="0" r="82"/>
      <circle id="cpi-node" class="ring node-cpi" cx="0" cy="0" r="68"/>
      <text class="ink nodeHead" x="0" y="-8">CPI</text>
      <text class="ink small" x="0" y="16" font-size="14">Constraint + Proof</text>
      <text class="muted small" x="0" y="34" font-size="13">Interface</text>
      
      <!-- State Badge -->
      <rect x="-65" y="110" width="130" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text class="muted micro" x="0" y="128">schema-pinned</text>
    </g>

    <!-- 4. EFFECTS NODE (cx=1350, cy=450) -->
    <g transform="translate(1350 450)">
      <circle class="ring" cx="0" cy="0" r="75" stroke-dasharray="4, 4"/>
      <circle class="ring" cx="0" cy="0" r="65"/>
      <circle id="effects-node" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" class="node-effects" cx="0" cy="0" r="52"/>
      <text class="ink nodeHead" x="0" y="0">Effects</text>
      <text class="muted small" x="0" y="20" font-size="13">Secure Dispatch</text>
    </g>

    <!-- 5. PROOFGRAPH LEDGER NODE (cx=800, cy=680) -->
    <g transform="translate(800 680)">
      <circle class="ring" cx="0" cy="0" r="88" stroke-dasharray="6, 6" stroke="#818cf8"/>
      <circle class="ring" cx="0" cy="0" r="78"/>
      <circle id="pg-node" class="ring node-pg" cx="0" cy="0" r="65"/>
      <text class="ink nodeHead" x="0" y="-4" fill="#6366f1">ProofGraph</text>
      <text class="muted small" x="0" y="18" font-size="14" font-weight="600">immutable ledger</text>
    </g>

  </g>

  <!-- Animated Floating Packets -->
  <g>
    <!-- DENY Packet (Coral/Red warning flow) -->
    <circle class="packet-deny" r="7" fill="#f43f5e" filter="url(#glowRed)" opacity="0"/>
    <!-- DENY Receipt (Purple audit flow) -->
    <circle class="receipt-deny" r="6" fill="#818cf8" filter="url(#glowViolet)" opacity="0"/>

    <!-- ALLOW Packet (Teal safe flow) -->
    <circle class="packet-allow" r="7" fill="#14b8a6" filter="url(#glowTeal)" opacity="0"/>
    <!-- ALLOW Side-Effect Trigger (Cyan flow) -->
    <circle class="packet-effect" r="7" fill="#06b6d4" filter="url(#glowTeal)" opacity="0"/>
    <!-- ALLOW Receipt (Purple audit flow) -->
    <circle class="receipt-allow" r="6" fill="#818cf8" filter="url(#glowViolet)" opacity="0"/>
  </g>

  <!-- Interactive/Timed Verdict Indicator Banners (Synced with keyframes) -->
  <g class="sans" text-anchor="middle" filter="url(#softShadow)">
    
    <!-- DENY State (Emphasized Coral Banner, Seconds 1.2 to 3.4) -->
    <g class="text-deny-state" opacity="0" transform="translate(600 280)">
      <rect x="-115" y="-20" width="230" height="40" rx="8" fill="#ffe4e6" stroke="#f43f5e" stroke-width="1.5"/>
      <text class="mono" x="0" y="5" fill="#be123c" font-size="14" font-weight="700">VERDICT: DENY (QUARANTINED)</text>
      <text class="muted small" x="0" y="38" font-size="13" font-weight="600">Unknown server and tool blocked</text>
    </g>

    <!-- ALLOW State (Emphasized Emerald/Teal Banner, Seconds 7.2 to 9.4) -->
    <g class="text-allow-state" opacity="0" transform="translate(1000 280)">
      <rect x="-115" y="-20" width="230" height="40" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
      <text class="mono" x="0" y="5" fill="#065f46" font-size="14" font-weight="700">VERDICT: ALLOW (PINNED)</text>
      <text class="muted small" x="0" y="38" font-size="13" font-weight="600">Schema-pinned fixture authorized</text>
    </g>

  </g>

  <!-- Horizontal Legend Frame Card centered at bottom -->
  <g class="sans" transform="translate(800 830)">
    <rect x="-560" y="-30" width="1120" height="60" rx="10" class="layerCard"/>
    
    <!-- Legend Items -->
    <g transform="translate(-510 0)">
      <!-- DENY -->
      <g transform="translate(0 5)">
        <circle cx="0" cy="0" r="7" fill="#f43f5e" filter="url(#glowRed)"/>
        <text class="ink" x="20" y="5" font-size="15" font-weight="600">FAIL-CLOSED QUARANTINE: Deny unknown servers &amp; tools before dispatch</text>
      </g>
      <!-- ALLOW -->
      <g transform="translate(420 5)">
        <circle cx="0" cy="0" r="7" fill="#14b8a6" filter="url(#glowTeal)"/>
        <text class="ink" x="20" y="5" font-size="15" font-weight="600">AUTHORIZED EXECUTION: Allow schema-pinned tool calls with evidence</text>
      </g>
      <!-- RECORD -->
      <g transform="translate(840 5)">
        <circle cx="0" cy="0" r="7" fill="#818cf8" filter="url(#glowViolet)"/>
        <text class="ink" x="20" y="5" font-size="15" font-weight="600">VERIFIABLE LEDGER: Record audit receipts in ProofGraph</text>
      </g>
    </g>
  </g>
</svg>
