id: opencode
name: OpenCode
version: v1.15.5
license:
    status: verified
    spdx: MIT
    url: https://github.com/anomalyco/opencode/blob/v1.15.5/LICENSE
redistribution: allowed_by_MIT_with_upstream_notice
availability: oss_candidate
support_level: verify_only
install:
    strategy: signed_oci
    image: ghcr.io/mindburn-labs/helm-launchpad/opencode@sha256:cdbeb88cfbd698809e673339d525083cdf1cdb3e91529e01c6834cd90b778550
    digest: sha256:cdbeb88cfbd698809e673339d525083cdf1cdb3e91529e01c6834cd90b778550
    source: https://github.com/anomalyco/opencode
    ref: v1.15.5
runtime:
    command:
        - opencode
required_secrets: []
filesystem_policy:
    mode: scoped_workspace
    mounts:
        - workspace:rw
        - app_state:rw
    policy_ref: policies/launchpad/apps/opencode.safe.toml
network_policy:
    default: deny
mcp_policy:
    unknown_server_policy: quarantine
    unknown_tool_policy: ESCALATE
    require_schema_pin: true
mcp_manifests:
    - opencode.default
healthchecks:
    - type: command
      command: opencode --version
risk_class: T1
budget_ceiling:
    usd_max: 0
    api_calls_max: 0
    time_ms_max: 0
framework_contract:
    f2_contract_preflight: true
    claim_level: verify_only
    live_command_kind: verify_only
    runtime_install_policy: forbidden
    baked_dependencies:
        - opencode-cli
    forbidden_runtime_install_patterns:
        - npm install
        - pnpm install
        - yarn install
        - pip install
        - uv pip install
        - playwright install
        - apt-get
        - apk add
        - curl | sh
        - curl -fsSL
    writable_paths:
        - path: /var/lib/opencode/app_state
          purpose: app_state
          required: true
    provider_host_groups: []
    egress_proxy:
        required: false
    mcp_manifest_refs:
        - opencode.default
    healthcheck: opencode --version
    evidence_profile: f2.contract.verify_only.v1
    images:
        - name: opencode-verify
          image: ghcr.io/mindburn-labs/helm-launchpad/opencode@sha256:cdbeb88cfbd698809e673339d525083cdf1cdb3e91529e01c6834cd90b778550
          digest: sha256:cdbeb88cfbd698809e673339d525083cdf1cdb3e91529e01c6834cd90b778550
          purpose: version_smoke_only
          baked_dependencies:
              - opencode-cli
    evidence_refs:
        - contract_preflight.json
        - launch_plan.json
        - kernel_verdict.json
        - sandbox_grant.json
        - mcp_quarantine.json
        - receipts/launchpad-healthcheck.json
        - runtime_environment.json
        - 04_EXPORTS/launchpad_manifest.json
        - offline_verify.txt
evidence_requirements:
    - contract_preflight
    - cpi_output
    - kernel_verdict
    - sandbox_grant
    - launch_receipt
    - install_receipt
    - healthcheck_receipt
    - teardown_receipt
    - evidence_pack
    - offline_verify
    - evidence_graph
    - mcp_quarantine
    - mcp_manifest
    - artifact_digest
    - cosign_signature
    - syft_sbom
    - grype_vulnerability_scan
supply_chain_evidence:
    artifact_digest: sha256:cdbeb88cfbd698809e673339d525083cdf1cdb3e91529e01c6834cd90b778550
    signature_tool: cosign
    signature_ref: cosign://ghcr.io/mindburn-labs/helm-launchpad/opencode@sha256:cdbeb88cfbd698809e673339d525083cdf1cdb3e91529e01c6834cd90b778550
    sbom_tool: syft
    sbom_ref: artifact://sbom-opencode.spdx.json
    vulnerability_scan_tool: grype
    vulnerability_scan_ref: artifact://grype-opencode.json
promotion_evidence:
    artifact_verification_ref: github-actions://26198407296/1/artifact-verification/opencode
    live_e2e_run_id: github-actions://26198407296/1/live-e2e/opencode
    evidence_pack_ref: github-actions://26198407296/1/evidencepack/opencode
    teardown_receipt_ref: github-actions://26198407296/1/teardown/opencode
conformance:
    license_verified: true
    artifact_verified: true
    policy_pack_present: true
    sandbox_verified: true
    healthcheck_passing: true
    e2e_passing: false
    teardown_verified: false
    receipt_verified: true
    evidence_pack_verified: false
metadata:
    artifact_workflow_run: github-actions://26198407296/1
    helm_oci_status: promoted_from_signed_ci_artifact_manifest
    promotion_provenance_ref: github-actions://26198407296/1
    upstream_commit: d7a6e1daaf2271bcd0b611fbb27d4956806e475a
    upstream_ref: v1.15.5
    upstream_repo: https://github.com/anomalyco/opencode
    verify_only_reason: healthcheck only proves --version smoke coverage; no live-agent command evidence is attached

display:
  headline: "Run OpenCode through HELM"
  short_description: "Launch OpenCode behind HELM’s fail-closed execution boundary."
  primary_command: "helm-ai-kernel launch opencode local-container --headless --output json"
  proof_summary:
    - "signed OCI artifact"
    - "deny-by-default network policy"
    - "MCP quarantine"
    - "signed receipts"
    - "offline EvidencePack verification"
  docs_path: "docs/launchpad/apps/OPENCODE.md"
  contribution_label: "framework-integration"
