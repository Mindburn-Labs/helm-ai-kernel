          type: object
          additionalProperties: true

    MCPCapabilityManifest:
      type: object
      properties:
        server_name: { type: string }
        version: { type: string }
        governance: { type: string }
        tools:
          type: array
          items:
            $ref: '#/components/schemas/MCPToolRef'

    MCPToolCallRequest:
      type: object
      required: [method]
      properties:
        method: { type: string }
        params:
          type: object
          additionalProperties: true

    MCPToolCallResponse:
      type: object
      properties:
        result:
          description: Tool output payload
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        error: { type: string }
        reason_code: { type: string }
        args_hash: { type: string }
        proofgraph_node: { type: string }
        receipt_id: { type: string }

    SandboxBackendProfile:
      type: object
      required: [name, kind, runtime, hosted, deny_network_by_default, native_isolation]
      properties:
        name: { type: string }
        kind:
          type: string
          enum: [wasi-wazero, wasi-wasmtime, native-nsjail, native-gvisor, native-firecracker, hosted-adapter]
        runtime: { type: string }
        hosted: { type: boolean }
        deny_network_by_default: { type: boolean }
        native_isolation: { type: boolean }
        experimental: { type: boolean }

    FilesystemPreopen:
      type: object
      required: [path, mode]
      properties:
        path: { type: string }
        mode:
          type: string
          enum: [ro, rw]
        content_hash: { type: string }

    EnvExposurePolicy:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [deny-all, allowlist, redacted]
        names:
          type: array
          items: { type: string }
        names_hash: { type: string }
        redacted: { type: boolean }

    NetworkGrant:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [deny-all, allowlist]
        destinations:
          type: array
          items: { type: string }
        cidrs:
          type: array
          items: { type: string }

    SandboxGrantLimits:
      type: object
      properties:
        memory_bytes: { type: integer, format: int64 }
        cpu_time:
          type: integer
          format: int64
          description: Go duration in nanoseconds.
        output_bytes: { type: integer, format: int64 }
        open_files: { type: integer }

    SandboxGrant:
      type: object
      required: [grant_id, runtime, profile, env, network, declared_at]
      properties:
        grant_id: { type: string }
        runtime: { type: string }
        runtime_version: { type: string }
        profile: { type: string }
        image_digest: { type: string }
        template_digest: { type: string }
        filesystem_preopens:
          type: array
          items:
            $ref: '#/components/schemas/FilesystemPreopen'
        env:
          $ref: '#/components/schemas/EnvExposurePolicy'
        network:
          $ref: '#/components/schemas/NetworkGrant'
        limits:
          $ref: '#/components/schemas/SandboxGrantLimits'
        declared_at: { type: string, format: date-time }
        policy_epoch: { type: string }
        grant_hash: { type: string }

    BoundaryStatus:
      type: object
      properties:
        version: { type: string }
        status: { type: string }
        receipt_store_ready: { type: boolean }
        signer_ready: { type: boolean }
        open_approvals: { type: integer }
        quarantined_mcp_servers: { type: integer }
        last_checkpoint_id: { type: string }
        checked_at: { type: string, format: date-time }

    BoundaryCapabilitySummary:
      type: object
      properties:
        capability_id: { type: string }
        category: { type: string }
        status: { type: string }
        authority: { type: string }
        public_routes:
          type: array
          items: { type: string }
        cli_commands:
          type: array
          items: { type: string }
        receipt_bindings:
          type: array
          items: { type: string }
        conformance_level: { type: string }

    ExecutionBoundaryRecord:
      type: object
      properties:
        record_id: { type: string }
        verdict:
          type: string
          enum: [ALLOW, DENY, ESCALATE]
        reason_code: { type: string }
        tool_name: { type: string }
        args_hash: { type: string }
        policy_epoch: { type: string }
        mcp_server_id: { type: string }
        oauth_resource: { type: string }
        oauth_scopes:
          type: array
          items: { type: string }
        sandbox_grant_hash: { type: string }
        authz_snapshot_hash: { type: string }
        approval_receipt_id: { type: string }
        receipt_id: { type: string }
        record_hash: { type: string }
        created_at: { type: string, format: date-time }

    BoundaryRecordVerification:
      type: object
      properties:
        record_id: { type: string }
        record_hash: { type: string }
        receipt_id: { type: string }
        verified: { type: boolean }
        errors:
          type: array
          items: { type: string }
        checked_at: { type: string, format: date-time }

    BoundaryCheckpoint:
      type: object
      properties:
        checkpoint_id: { type: string }
        sequence: { type: integer, format: int64 }
        previous_checkpoint_hash: { type: string }
        receipt_count: { type: integer }
        record_count: { type: integer }
        root_hash: { type: string }
        checkpoint_hash: { type: string }
        created_at: { type: string, format: date-time }

    EvidenceEnvelopeVerification:
      type: object
      properties:
        manifest_id: { type: string }
        manifest_hash: { type: string }
        native_evidence_hash: { type: string }
        verified: { type: boolean }
        authoritative: { type: boolean }
        errors:
          type: array
          items: { type: string }
        checked_at: { type: string, format: date-time }

    MCPScanRequest:
      type: object
      required: [server_id]
      properties:
        server_id: { type: string }
        name: { type: string }
        transport: { type: string }
        endpoint: { type: string }
        tool_names:
          type: array
          items: { type: string }
        manifest:
          type: object
          additionalProperties: true

    MCPScanResult:
      type: object
      properties:
        server_id: { type: string }
        risk: { type: string }
        state: { type: string }
        tool_count: { type: integer }
        findings:
          type: array
          items: { type: string }
        recommended_action: { type: string }
        quarantine_record_id: { type: string }
        requires_approval: { type: boolean }
        schema_pin_required: { type: boolean }
        authorization_needed: { type: boolean }
        scanned_at: { type: string, format: date-time }

    MCPAuthorizationProfile:
      type: object
      properties:
        profile_id: { type: string }
        protocol_version: { type: string }
        resource: { type: string }
        authorization_servers:
          type: array
          items: { type: string }
        scopes_supported:
          type: array
          items: { type: string }
        tool_scopes:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        required_audience: { type: string }
        stale_after: { type: string, format: date-time }
        profile_hash: { type: string }

    MCPAuthorizeCallRequest:
      type: object
      required: [server_id, tool_name]
      properties:
        server_id: { type: string }
        tool_name: { type: string }
        args_hash: { type: string }
        granted_scopes:
          type: array
          items: { type: string }
        pinned_schema_hash: { type: string }
        oauth_resource: { type: string }
        receipt_id: { type: string }

    SandboxPreflightRequest:
      type: object
      properties:
        runtime: { type: string }
        profile: { type: string }
        image_digest: { type: string }
        policy_epoch: { type: string }
        requested_grant:
          $ref: '#/components/schemas/SandboxGrant'
        expected_grant_hash: { type: string }

    SandboxPreflightResult:
      type: object
      properties:
        verdict:
          type: string
          enum: [ALLOW, DENY, ESCALATE]
        reason_code: { type: string }
        grant_id: { type: string }
        grant_hash: { type: string }
        dispatch_ready: { type: boolean }
        findings:
          type: array
          items: { type: string }
        checked_at: { type: string, format: date-time }

    AuthzSnapshot:
      type: object
      properties:
        snapshot_id: { type: string }
        model_id: { type: string }
        relationship_hash: { type: string }
        tuple_count: { type: integer }
        resolver: { type: string }
        stale: { type: boolean }
        snapshot_token: { type: string }
        checked_at: { type: string, format: date-time }
        snapshot_hash: { type: string }

    AuthzHealth:
      type: object
      properties:
        status: { type: string }
        resolver: { type: string }
        model_id: { type: string }
        relationship_hash: { type: string }
        checked_at: { type: string, format: date-time }

    ApprovalCeremony:
      type: object
      properties:
        approval_id: { type: string }
        subject: { type: string }
        action: { type: string }
        state:
          type: string
          enum: [pending, approved, denied, revoked, expired]
        requested_by: { type: string }
        approvers:
          type: array
          items: { type: string }
        quorum: { type: integer }
        timelock_until: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        break_glass: { type: boolean }
        reason: { type: string }
        receipt_id: { type: string }
        ceremony_hash: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AgentIdentityProfile:
      type: object
      properties:
        agent_id: { type: string }
        identity_type: { type: string }
        subject: { type: string }
        issuer: { type: string }
        jwks_uri: { type: string }
        spiffe_id: { type: string }
        scopes:
          type: array
          items: { type: string }
        anonymous_dev_mode: { type: boolean }
        created_at: { type: string, format: date-time }

    BudgetCeiling:
      type: object
      properties:
        budget_id: { type: string }
        subject: { type: string }
        window: { type: string }
        max_tool_calls: { type: integer }
        max_spend_minor: { type: integer, format: int64 }
        max_egress_bytes: { type: integer, format: int64 }
        max_write_ops: { type: integer }
        approval_required_after: { type: integer }
        policy_epoch: { type: string }

    CoexistenceCapabilityManifest:
      type: object
      properties:
        manifest_id: { type: string }
        authority: { type: string }
        boundary_role: { type: string }
        supported_inputs:
          type: array
          items: { type: string }
        export_surfaces:
          type: array
          items: { type: string }
        receipt_bindings:
          type: array
          items: { type: string }
        generated_at: { type: string, format: date-time }

    TelemetryOTelConfig:
      type: object
      properties:
        service_name: { type: string }
        signal_type: { type: string }
        authoritative: { type: boolean }
        span_attributes:
          type: object
          additionalProperties: { type: string }
        exported_signals:
          type: array
          items: { type: string }

    TelemetryExportRequest:
      type: object
      properties:
        format: { type: string }
        receipt_id: { type: string }
        record_hash: { type: string }
        policy_epoch: { type: string }
        verdict: { type: string }
        reason_code: { type: string }
        sandbox_grant_hash: { type: string }
        authz_snapshot_hash: { type: string }
        attributes:
          type: object
          additionalProperties: { type: string }

    TelemetryExportResult:
      type: object
      properties:
        export_id: { type: string }
        format: { type: string }
        authoritative: { type: boolean }
        attributes:
          type: object
          additionalProperties: { type: string }
        exported_at: { type: string, format: date-time }

    # ── PDP / EffectBoundary Wire Types ────────────────
    Effect:
      type: object
      description: An effect submitted for governance evaluation
      required: [effect_type, effect_id, params]
      properties:
        effect_type:
          type: string
          description: Category of the effect (file_read, api_call, exec, etc.)
        effect_id:
          type: string
          description: Unique identifier for this effect instance
        params:
          type: object
          description: Effect-specific parameters
          additionalProperties: true
        budget_id:
          type: string
          description: Optional budget to charge against

    GovernanceDecision:
      type: object
      description: PDP decision for an effect
      required: [verdict, decision_id, effect_id]
      properties:
        decision_id:
          type: string
        effect_id:
          type: string
        verdict:
          type: string
          enum: [ALLOW, DENY, ESCALATE]
        reason_code:
          type: ['string', 'null']
          description: "Null for ALLOW. Registered code from reason-codes-v1.json for DENY/ESCALATE."
        receipt:
          $ref: '#/components/schemas/Receipt'
        active_packs:
          type: array
          items: { type: string }
          description: Names of policy bundles active during evaluation

    EffectBoundary:
      type: object
      description: The boundary contract for submitting effects to the kernel
      required: [effect, principal]
      properties:
        effect:
          $ref: '#/components/schemas/Effect'
        principal:
          type: string
          description: "Agent/user identity (e.g. agent:analyst)"
        context:
          type: object
          description: Additional context (jurisdiction, industry, budget state)
          additionalProperties: true

    PDPRequest:
      type: object
      description: Request to the Policy Decision Point
      required: [boundary]
      properties:
        boundary:
          $ref: '#/components/schemas/EffectBoundary'

    PDPResponse:
      type: object
      description: Response from the Policy Decision Point
      required: [decision]
      properties:
        decision:
          $ref: '#/components/schemas/GovernanceDecision'

    PolicyBundle:
      type: object
      description: A loaded policy bundle (jurisdiction, industry, or business pack)
      required: [name, version, content_hash]
      properties:
        name:
          type: string
        version:
          type: string
        content_hash:
          type: string
          description: SHA-256 of the bundle contents
        signature:
          type: ['string', 'null']
          description: Ed25519 signature over content_hash
        pack_type:
          type: string
          enum: [jurisdiction, industry, business, custom]

  # ── Responses ───────────────────────────────────────
  responses:
    HelmError:
      description: HELM error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HelmError'
          example:
            error:
              message: "Tool not found: unknown_tool"
              type: "invalid_request"
              code: "tool_not_found"
              reason_code: "DENY_TOOL_NOT_FOUND"
