name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build and test retained surfaces
        run: |
          make build
          make test
          make test-sdk-py
          make test-sdk-ts
          make verify-fixtures

  binaries:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build release binaries
        run: make release-binaries
      - name: Build MCP bundle
        run: make mcp-pack
      - name: Generate SBOM
        run: make sbom
      - name: Stage quickstart assets
        run: |
          mkdir -p dist
          cp release.high_risk.v3.toml dist/release.high_risk.v3.toml
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            bin/
            dist/helm.mcpb
            dist/release.high_risk.v3.toml
            sbom.json

  container:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push main image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - name: Build and push slim image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.slim
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-slim

  homebrew:
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets/
      - name: Generate Homebrew formula
        run: |
          mkdir -p Formula
          ruby scripts/release/homebrew_formula.rb \
            --version "${GITHUB_REF_NAME#v}" \
            --checksums release-assets/bin/SHA256SUMS.txt \
            --repo Mindburn-Labs/helm-oss > Formula/helm.rb
      - name: Push formula to mindburn/homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not configured; skipping tap push."
            exit 0
          fi
          git config --global user.name "mindburn-release-bot"
          git config --global user.email "release@mindburn.org"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mindburn/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp Formula/helm.rb tap/Formula/helm.rb
          cd tap
          git add Formula/helm.rb
          git commit -m "Update helm formula to ${GITHUB_REF_NAME}" || exit 0
          git push origin HEAD:main

  github-release:
    runs-on: ubuntu-latest
    needs: [binaries, container]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bin/*
            dist/dist/helm.mcpb
            dist/dist/release.high_risk.v3.toml
            dist/sbom.json
