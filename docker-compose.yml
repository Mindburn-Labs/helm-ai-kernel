# ⚠️  DEVELOPMENT ONLY — Do not use these credentials in production.
# For production deployments, use a .env file or external secret manager.
# See docs/QUICKSTART.md for configuration guidance.

services:
  helm:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - serve
      - --policy
      - /etc/helm/release.high_risk.v3.toml
      - --addr
      - 0.0.0.0
      - --port
      - "8080"
      - --data-dir
      - /var/lib/helm
      - --console
      - --console-dir
      - /usr/share/helm/console
    environment:
      HELM_REGION: "us"
      HELM_ENABLE_OPENAI_PROXY: "1"
      EVIDENCE_SIGNING_KEY: "helm-evidence-dev"
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - helmdata:/var/lib/helm
    healthcheck:
      test: ["CMD", "helm", "health"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  helmdata:
