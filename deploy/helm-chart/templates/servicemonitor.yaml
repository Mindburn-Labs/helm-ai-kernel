{{- if and .Values.helm.metrics.enabled .Values.helm.metrics.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "helm-firewall.fullname" . }}
  labels:
    {{- include "helm-firewall.labels" . | nindent 4 }}
    {{- with .Values.helm.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "helm-firewall.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.helm.metrics.serviceMonitor.interval }}
      path: /metrics
{{- end }}
