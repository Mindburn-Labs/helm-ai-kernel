{{- if not (or .Values.helm.policy.configMap .Values.helm.policy.source.mountedFile.existingConfigMap .Values.helm.policy.source.mountedFile.existingSecret) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helm-ai-kernel.policyConfigMapName" . }}
  labels:
    {{- include "helm-ai-kernel.labels" . | nindent 4 }}
data:
  {{ .Values.helm.policy.fileName }}: |
    name = {{ .Values.helm.policy.name | quote }}
    profile = {{ .Values.helm.policy.profile | quote }}
    reference_pack = {{ .Values.helm.policy.referencePack | quote }}

    [server]
    bind = {{ .Values.helm.bindAddr | quote }}
    port = {{ .Values.service.port }}

    [receipts]
    store = {{ .Values.helm.storage.type | quote }}
    {{ if eq .Values.helm.storage.type "sqlite" }}
    path = {{ .Values.helm.storage.sqlite.path | quote }}
    {{ else }}
    path = {{ printf "%s/helm.db" (.Values.helm.dataDir | trimSuffix "/") | quote }}
    {{ end }}

    [receipts.signing]
    algorithm = {{ .Values.helm.signing.algorithm | quote }}
    key_path = {{ printf "%s/root.key" (.Values.helm.dataDir | trimSuffix "/") | quote }}

  {{ .Values.helm.policy.referencePackFileName }}: |
    {
      "pack_id": {{ .Values.helm.policy.referencePackID | quote }},
      "label": {{ .Values.helm.policy.referencePackLabel | quote }},
      "version": 1,
      "runtime_actions": []
    }

  helm.yaml: |
    region: {{ .Values.helm.region | quote }}
    bind_addr: {{ .Values.helm.bindAddr | quote }}
    data_dir: {{ .Values.helm.dataDir | quote }}
    signing:
      algorithm: {{ .Values.helm.signing.algorithm | quote }}
      key_path: {{ printf "%s/root.key" (.Values.helm.dataDir | trimSuffix "/") | quote }}
    storage:
      type: {{ .Values.helm.storage.type | quote }}
      {{ if eq .Values.helm.storage.type "sqlite" }}
      sqlite:
        path: {{ .Values.helm.storage.sqlite.path | quote }}
      {{ end }}
    proxy:
      enabled: {{ .Values.helm.proxy.enabled }}
      {{ if .Values.helm.proxy.enabled }}
      upstream: {{ .Values.helm.proxy.upstream | quote }}
      {{ end }}
    metrics:
      enabled: {{ .Values.helm.metrics.enabled }}
    policy:
      source:
        kind: {{ .Values.helm.policy.source.kind | quote }}
        poll_interval: {{ .Values.helm.policy.source.pollInterval | quote }}
        initial_reconcile_timeout: {{ .Values.helm.policy.source.initialReconcileTimeout | quote }}
      reload_hints:
        http_wake_endpoint: {{ .Values.helm.policy.reloadHints.httpWakeEndpoint | quote }}
      agent_safety:
        baseline_policy_enabled: {{ .Values.helm.policy.agentSafety.baseline.enabled }}
        baseline_bundle_id: {{ .Values.helm.policy.agentSafety.baseline.bundleID | quote }}
        deny_unknown_tools: {{ .Values.helm.policy.agentSafety.denyUnknownTools }}
        deny_unknown_egress: {{ .Values.helm.policy.agentSafety.denyUnknownEgress }}
        require_manifest_validation: {{ .Values.helm.policy.agentSafety.requireManifestValidation }}
        require_output_contract_validation: {{ .Values.helm.policy.agentSafety.requireOutputContractValidation }}
        require_approved_arg_binding: {{ .Values.helm.policy.agentSafety.requireApprovedArgBinding }}
        lks_memory_influence_only: {{ .Values.helm.policy.agentSafety.lksMemoryInfluenceOnly }}
        require_a2a_signatures: {{ .Values.helm.policy.agentSafety.requireA2ASignatures }}
        enforce_safedep_gates: {{ .Values.helm.policy.agentSafety.enforceSafeDepGates }}
        enforce_budget_circuit_breakers: {{ .Values.helm.policy.agentSafety.enforceBudgetCircuitBreakers }}
        fail_closed_on_missing_context: {{ .Values.helm.policy.agentSafety.failClosedOnMissingContext }}
        shadow_mode_observes_only: {{ .Values.helm.policy.agentSafety.shadowModeObservesOnly }}
{{- end }}
