name: Integration request
description: Request or scope a HELM AI Kernel integration.
title: "[Integration]: "
labels: ["integration", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Keep requests OSS-scoped and fixture-friendly. Do not include customer data, private endpoints, live credentials, or proprietary schemas.
  - type: input
    id: integration
    attributes:
      label: Integration target
      description: Name the tool, MCP server, SDK/runtime, API, or deployment platform.
      placeholder: "Local MCP stdio server"
    validations:
      required: true
  - type: input
    id: project_link
    attributes:
      label: Project link
      description: Public repository, package, or docs URL for the target.
      placeholder: "https://github.com/example/project"
    validations:
      required: true
  - type: textarea
    id: capabilities
    attributes:
      label: Tools or capabilities involved
      description: List the shell, DB, filesystem, cloud, browser, code, or other side-effecting capabilities.
      placeholder: "shell.run_command, filesystem.read_file"
    validations:
      required: true
  - type: textarea
    id: side_effect_risk
    attributes:
      label: Side-effect risk
      description: What could go wrong if the tool call executes without HELM governance?
      placeholder: "destructive filesystem writes, credential exposure, production deploy"
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow to govern
      description: Describe the action HELM should authorize, deny, escalate, record, or verify.
    validations:
      required: true
  - type: dropdown
    id: verdicts
    attributes:
      label: Expected verdict coverage
      options:
        - ALLOW only
        - DENY only
        - ESCALATE only
        - ALLOW and DENY
        - ALLOW, DENY, and ESCALATE
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Local fixture plan
      description: Explain how this can be tested with localhost services, temp directories, or sample policy data.
    validations:
      required: true
  - type: textarea
    id: policy_metadata
    attributes:
      label: Policy metadata needed
      description: Name the tool args, identity, resource, risk, or receipt fields HELM would need to decide safely.
