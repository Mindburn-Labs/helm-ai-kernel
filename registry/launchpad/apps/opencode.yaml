id: opencode
name: OpenCode
version: unverified-upstream
license:
  status: verified
  spdx: MIT
  url: https://raw.githubusercontent.com/anomalyco/opencode/v1.15.5/LICENSE
redistribution: unverified
availability: oss_candidate
install:
  strategy: signed_artifact_required
runtime:
  command: ["opencode"]
model_gateway_env: ["OPENROUTER_API_KEY"]
required_secrets: ["model_gateway"]
filesystem_policy:
  mode: scoped_workspace
  mounts: ["workspace:rw", "app_state:rw"]
  policy_ref: policies/launchpad/apps/opencode.safe.toml
network_policy:
  default: deny
  allowlist:
    - https://openrouter.ai/api/v1
mcp_policy:
  unknown_server_policy: quarantine
  unknown_tool_policy: ESCALATE
  require_schema_pin: true
healthchecks:
  - type: command
    command: "opencode --version"
risk_class: T1
budget_ceiling:
  usd_max: 0
  api_calls_max: 0
  time_ms_max: 0
evidence_requirements: ["cpi_output", "kernel_verdict", "sandbox_grant", "launch_receipt", "install_receipt", "healthcheck_receipt", "teardown_receipt", "evidence_pack", "mcp_quarantine", "artifact_digest", "cosign_signature", "syft_sbom", "grype_vulnerability_scan"]
conformance:
  license_verified: true
  artifact_verified: false
  policy_pack_present: true
  sandbox_verified: false
  healthcheck_passing: false
  e2e_passing: false
  teardown_verified: false
  receipt_verified: false
  evidence_pack_verified: false
metadata:
  upstream_repo: https://github.com/anomalyco/opencode
  upstream_ref: v1.15.5
  upstream_commit: d7a6e1daaf2271bcd0b611fbb27d4956806e475a
  blocker: "Official license file is MIT; v1.15.5 artifact signature/digest, healthcheck, sandbox e2e, receipts, and EvidencePack remain unverified until Launchpad artifact CI and live conformance complete."
