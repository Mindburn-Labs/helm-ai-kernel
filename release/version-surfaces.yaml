    {
      "id": "rust-sdk-lock",
      "path": "sdk/rust/Cargo.lock",
      "kind": "regex",
      "pattern": "(name = \"helm-sdk\"\\nversion = \")(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)(\")",
      "replacement": "\\g<1>{version}\\g<3>"
    },
    {
      "id": "typescript-sdk-manifest",
      "path": "sdk/ts/package.json",
      "kind": "json",
      "field": "version"
