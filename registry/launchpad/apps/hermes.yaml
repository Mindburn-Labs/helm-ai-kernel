id: hermes
name: Hermes
version: v2026.5.16
license:
    status: verified
    spdx: MIT
    url: https://github.com/NousResearch/hermes-agent/blob/v2026.5.16/LICENSE
redistribution: allowed_by_MIT_with_upstream_notice
availability: oss_supported
support_level: agent_live
install:
    strategy: signed_oci
    image: ghcr.io/mindburn-labs/helm-launchpad/hermes@sha256:4ec024dd8d0191fc887f04dc92c959fc865808d1526f782b5093f395fdd41652
    digest: sha256:4ec024dd8d0191fc887f04dc92c959fc865808d1526f782b5093f395fdd41652
    source: https://github.com/NousResearch/hermes-agent
    ref: v2026.5.16
runtime:
    # Direct exec of `hermes` fails with `exec /opt/hermes/.venv/bin/hermes:
    # no such file or directory` because the venv shebang in the published
    # image points at `/src/...` (build context) instead of `/opt/...` (final
    # rootfs). Wrap in `sh -c` to bypass kernel-level exec'ing of the broken
    # shebang. HOME is redirected to /tmp (tmpfs) because $HOME=/opt/hermes
    # is read-only on the rootfs and hermes wants to write `.hermes/` there.
    # The current image (sha256:4ec024dd) ships a Python Fire CLI (cli.py)
    # where the old `-z 'healthcheck ping'` is gone; use `--q ping` for the
    # canonical single-query healthcheck — gpt-4o-mini answers in <2s through
    # the launch-scoped egress proxy and exits 0.
    # NOTE: model_gateway below is catalog-backed BYO, but this promoted
    # Hermes smoke command still exercises the known-good OpenRouter path until
    # the Hermes artifact/runtime command is re-promoted with provider-specific
    # routing evidence.
    command:
        - /bin/sh
        - -c
        - HOME=/var/lib/hermes hermes --q ping --provider openrouter --model openai/gpt-4o-mini --ignore_user_config --quiet
model_gateway:
    logical_secret: model_gateway
    provider: byo
    provider_ids:
        - openrouter
    mode: logical_binding_env_projection
    raw_provider_key_projected: true
required_secrets:
    - model_gateway
filesystem_policy:
    mode: scoped_workspace
    mounts:
        - workspace:rw
        # hermes writes config / sessions / node toolchain under $HOME/.hermes.
        # /var/lib/hermes is the convention for the launch-scoped state root;
        # runtime.command sets HOME=/var/lib/hermes so the python config code
        # finds the writable .hermes directory inside this mount.
        - app_state:rw:/var/lib/hermes
    policy_ref: policies/launchpad/apps/hermes.safe.toml
    state_dir_env: HOME
network_policy:
    default: deny
mcp_policy:
    unknown_server_policy: quarantine
    unknown_tool_policy: ESCALATE
    require_schema_pin: true
mcp_manifests:
    - hermes.default
healthchecks:
    - type: command
      command: helm-launchpad-openrouter-check
risk_class: T1
budget_ceiling:
    usd_max: 0
    api_calls_max: 0
    time_ms_max: 0
framework_contract:
    f2_contract_preflight: true
    claim_level: agent_live
    live_command_kind: agent_live
    runtime_install_policy: forbidden
    baked_dependencies:
        - python
        - node
        - hermes-cli
        - launchpad-openrouter-check
    forbidden_runtime_install_patterns:
        - npm install
        - pnpm install
        - yarn install
        - pip install
        - uv pip install
        - playwright install
        - apt-get
        - apk add
        - curl | sh
        - curl -fsSL
    writable_paths:
        - env: HOME
          path: /var/lib/hermes
          purpose: home_cache_state
          required: true
    provider_host_groups:
        - openrouter
    egress_proxy:
        required: true
        image: ghcr.io/mindburn-labs/helm-launchpad/egress-proxy@sha256:395cd585d0e2345e649455953f0d7765b141440bfb2fc753a4ae944e2ba350f8
        digest: sha256:395cd585d0e2345e649455953f0d7765b141440bfb2fc753a4ae944e2ba350f8
        signature_ref: cosign://ghcr.io/mindburn-labs/helm-launchpad/egress-proxy@sha256:395cd585d0e2345e649455953f0d7765b141440bfb2fc753a4ae944e2ba350f8
        sbom_ref: artifact://sbom-egress-proxy.spdx.json
        vulnerability_scan_ref: artifact://grype-egress-proxy.json
        receipt_ref: receipts/launchpad-egress-proxy.json
    mcp_manifest_refs:
        - hermes.default
    healthcheck: helm-launchpad-openrouter-check
    evidence_profile: f2.contract.v1
    images:
        - name: hermes-production-minimal
          image: ghcr.io/mindburn-labs/helm-launchpad/hermes@sha256:4ec024dd8d0191fc887f04dc92c959fc865808d1526f782b5093f395fdd41652
          digest: sha256:4ec024dd8d0191fc887f04dc92c959fc865808d1526f782b5093f395fdd41652
          purpose: production_proof
          baked_dependencies:
              - python
              - node
              - hermes-cli
        - name: hermes-eval-full
          image: ghcr.io/mindburn-labs/helm-launchpad/hermes-eval-full@sha256:b970c2308182384377670704f6769e200eef89e18cc1a1102de9cba0d2437527
          digest: sha256:b970c2308182384377670704f6769e200eef89e18cc1a1102de9cba0d2437527
          purpose: f2_attack_matrix
          baked_dependencies:
              - python
              - hermes-cli
              - node
              - browser-tools
              - launchpad-openrouter-check
    evidence_refs:
        - contract_preflight.json
        - launch_plan.json
        - kernel_verdict.json
        - sandbox_grant.json
        - receipts/launchpad-egress-proxy.json
        - mcp_quarantine.json
        - receipts/launchpad-healthcheck.json
        - runtime_environment.json
        - 04_EXPORTS/launchpad_manifest.json
        - offline_verify.txt
evidence_requirements:
    - contract_preflight
    - cpi_output
    - kernel_verdict
    - sandbox_grant
    - egress_proxy_receipt
    - launch_receipt
    - install_receipt
    - healthcheck_receipt
    - teardown_receipt
    - evidence_pack
    - offline_verify
    - evidence_graph
    - mcp_quarantine
    - mcp_manifest
    - model_gateway_broker
    - artifact_digest
    - cosign_signature
    - syft_sbom
    - grype_vulnerability_scan
supply_chain_evidence:
    artifact_digest: sha256:4ec024dd8d0191fc887f04dc92c959fc865808d1526f782b5093f395fdd41652
    signature_tool: cosign
    signature_ref: cosign://ghcr.io/mindburn-labs/helm-launchpad/hermes@sha256:4ec024dd8d0191fc887f04dc92c959fc865808d1526f782b5093f395fdd41652
    sbom_tool: syft
    sbom_ref: artifact://sbom-hermes.spdx.json
    vulnerability_scan_tool: grype
    vulnerability_scan_ref: artifact://grype-hermes.json
promotion_evidence:
