# Default values for helm-ai-kernel

replicaCount: 1

image:
  repository: ghcr.io/mindburn-labs/helm-ai-kernel
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Whether to create a ServiceAccount
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  healthPort: 8081
  metricsPort: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: helm.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: helm-tls
  #    hosts:
  #      - helm.local

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# HELM-specific configuration.
# Legacy values root retained for one compatibility window while the chart
# identity and rendered resource names move to helm-ai-kernel.
helm:
  # Bind address used inside the pod. Kubernetes Services require 0.0.0.0.
  bindAddr: "0.0.0.0"

  # Durable runtime directory for SQLite state, receipts, artifacts, and root keys.
  dataDir: "/data"

  # Production mode refuses to auto-generate a root signing key at startup.
  production: false

  # Proxy mode: forward to upstream LLM provider
  proxy:
    enabled: true
    upstream: "https://your-upstream.example/v1"

  # Region identifier
  region: "us"

  # Demo mode (disables real connectors, uses ephemeral keys)
  demoMode: false

  # Runtime API authentication. Production rendering refuses to omit these keys
  # because protected evidence, receipt, tenant, and service-internal routes fail
  # closed when no key material is configured.
  auth:
    adminAPIKey: ""
    serviceAPIKey: ""
    existingSecret: ""
    adminAPIKeySecretKey: "HELM_ADMIN_API_KEY"
    serviceAPIKeySecretKey: "HELM_SERVICE_API_KEY"
    # Server-bound tenant/principal for tenant-scoped runtime routes. Incoming
    # tenant/principal headers must match these values and cannot select
    # another tenant or principal.
    tenantID: "default"
    principalID: "system-admin"

  # Signing key configuration
  signing:
    algorithm: "ed25519"  # or "ml-dsa-65"
    # Ed25519 root key seed as 64 lowercase hex chars (used only if existingSecret is not set)
    key: ""
    # Use an existing Kubernetes secret for the signing key
    # The secret must contain a key named "signing-key" with a 64-char hex seed.
    existingSecret: ""

  # Storage backend
  storage:
    type: "sqlite"  # or "postgres"
    sqlite:
      path: "/data/helm-ai-kernel.db"
    postgres:
      host: ""
      port: 5432
      database: "helm"
      user: "helm"
      password: ""
      sslMode: "require"
      maxOpenConns: 25
      maxIdleConns: 10
      connMaxLifetime: "30m"
      # Use an existing secret containing DATABASE_URL
      existingSecret: ""
      # Key in the existing secret that contains the database URL
      existingSecretKey: "DATABASE_URL"

  # Metrics and observability.
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false
      interval: 30s
      labels: {}

  # Runtime limiter defaults. Endpoint-class defaults are built into the
  # kernel; these values set the global, actor/resource, concurrency, and
  # low-priority shed gates.
  limits:
    global:
      rps: 60
      burst: 120
    actor:
      rps: 60
      burst: 120
    concurrency:
      max: 0
    loadShed:
      enabled: false
      lowPriorityMax: 0

  # Policy configuration
  policy:
    # Kubernetes delivery is a policy-source backend, not runtime truth.
    # Runtime reconciliation verifies and compiles an EffectivePolicySnapshot.
    source:
      kind: "mountedFile" # controlplane | crd | mountedFile
      pollInterval: "10s"
      initialReconcileTimeout: "30s"
      controlplane:
        url: ""
        auth:
          mode: "serviceAccountJWT" # serviceAccountJWT | bearerToken
          bearerToken: ""
          existingSecret: ""
          existingSecretKey: "HELM_POLICY_BEARER_TOKEN"
      crd:
        install: false
        apiGroup: "policy.helm.ai"
        resource: "HelmPolicyBundle"
        # Names of ConfigMaps/Secrets the CRD reconciler may dereference.
        # Empty lists render no ConfigMap/Secret read grants.
        allowedConfigMapNames: []
        allowedSecretNames: []
      mountedFile:
        existingConfigMap: ""
        existingSecret: ""
        mountPath: "/etc/helm-ai-kernel/policy"

    failClosed:
      requireInitialSnapshot: true
      onMissingSnapshot: "deny"
      onInvalidUpdate: "keepLastKnownGood"
      lastKnownGoodMaxAge: "10m"

    reloadHints:
      enabled: true
      httpWakeEndpoint: "/internal/policy/reconcile"
      fsnotify: false
      k8sWatch: false
      configReloaderSidecar:
        enabled: false
        image: "ghcr.io/jimmidyson/configmap-reload:v0.13.1"

    signature:
      # When true, runtime reconciliation rejects unsigned policy heads.
      required: false
      # Ed25519 public key hex used to verify canonical policy bundle bytes.
      publicKey: ""
      # Optional secret containing the public key. Public keys are not secret,
      # but existingSecret keeps production values files free of key material.
      existingSecret: ""
      existingSecretKey: "HELM_POLICY_TRUST_PUBLIC_KEY"

    agentSafety:
      baseline:
        enabled: true
        bundleID: "builtin-agent-safety-baseline"
      denyUnknownTools: true
      denyUnknownEgress: true
      requireManifestValidation: true
      requireOutputContractValidation: true
      requireApprovedArgBinding: true
      lksMemoryInfluenceOnly: true
      requireA2ASignatures: true
      enforceSafeDepGates: true
      enforceBudgetCircuitBreakers: true
      failClosedOnMissingContext: true
      shadowModeObservesOnly: true

    # Name of an existing ConfigMap containing the serve policy file.
    # Legacy alias for policy.source.mountedFile.existingConfigMap.
    configMap: ""
    # Legacy alias for policy.source.mountedFile.mountPath.
    mountPath: "/etc/helm-ai-kernel/policy"
    fileName: "serve-policy.toml"
    name: "helm-chart"
    profile: "kubernetes"
    referencePack: "./reference-pack.json"
    referencePackFileName: "reference-pack.json"
    referencePackID: "helm-chart-reference-pack"
    referencePackLabel: "HELM chart default fail-closed reference pack"

# Persistent storage for HELM dataDir and SQLite state.
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  # Existing PVC to use
  existingClaim: ""

# Liveness and readiness probes
probes:
  liveness:
    httpGet:
      path: /health
      port: health
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    httpGet:
      path: /health
      port: health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

# Optional PostgreSQL subchart (requires adding bitnami/postgresql dependency)
postgresql:
  enabled: false
  auth:
    database: helm
    username: helm-ai-kernel
    password: ""
    # existingSecret: ""

# OpenRouter credentials shared by launchpad apps (openclaw, hermes).
# The chart never accepts a raw API key in values.yaml — only a Secret
# reference. Create the Secret out-of-band (kubectl, ExternalSecrets, etc.)
# before enabling any launchpad app.
openrouter:
  apiKeySecretRef:
    name: "openrouter-key"
    key: "OPENROUTER_API_KEY"

# Launchpad apps as co-deployed Pods inside the same helm release.
# This is NOT the launchpad runtime path (kernel does not launch them via
# k8s API here) — they are pinned chart-managed workloads that mirror the
# local-container runbook on a Kubernetes substrate. See
# docs/launchpad/K8S_SMOKE.md for the conformance map between
# registry/launchpad/apps/{openclaw,hermes}.yaml and these templates.
launchpadApps:
  # Launchpad app images are published as linux/amd64 + linux/arm64 manifests.
  # Operators who need architecture pinning can set this map explicitly.
  nodeSelector: {}

  # NetworkPolicy default-deny with explicit DNS + 443 egress allowance for
  # the sidecar proxy. Enforcement requires a CNI that honors NetworkPolicy
  # (Calico, Cilium); on default minikube/kindnet the object is created but
  # not enforced — useful as a positive-control signal nonetheless.
  networkPolicy:
    enabled: true
    allowDNS: true

  # Connectivity test Pod (helm.sh/hook: test). Pinned to a small image with
  # wget that runs as nonroot.
  test:
    image: "busybox:1.36"

  openclaw:
    enabled: false
    image:
      repository: "ghcr.io/mindburn-labs/helm-launchpad/openclaw"
      digest: "sha256:3c8c7069b9b8e69f584adc7de34b42a3f2b2721a19c069af342e1cbd7cf6d9af"
      pullPolicy: "IfNotPresent"
    gatewayPort: 18789
    tmpfsSize: "256Mi"
    appStateSize: "1Gi"
    # Resources sized for the ~6.36 GiB OCI image plus 8-plugin warm-up. Trim
    # only with measurement — `gateway run` warm-up reliably exceeds the
    # 120s default in registry/launchpad/apps/openclaw.yaml.
    resources:
      limits:
        cpu: "1500m"
        memory: "4Gi"
      requests:
        cpu: "300m"
        memory: "1Gi"
    readinessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 30
      failureThreshold: 8
    livenessProbe:
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    egressSidecar:
      image:
        repository: "ghcr.io/mindburn-labs/helm-launchpad/egress-proxy"
        digest: "sha256:a997086e0f589173ae87e1575d03b9194afbb87196203226a9e62af7bc160312"
        pullPolicy: "IfNotPresent"
      port: 8080
      allowlist:
        - "https://openrouter.ai/api/v1"
      resources:
        limits:
          cpu: "200m"
          memory: "128Mi"
        requests:
          cpu: "50m"
          memory: "32Mi"

  hermes:
    enabled: false
    image:
      repository: "ghcr.io/mindburn-labs/helm-launchpad/hermes"
      digest: "sha256:2dc8aea12cc42c850ef84ef5bd27790e80818a303e3b398a0eca50b4850075d7"
      pullPolicy: "IfNotPresent"
    # job runs the proven single-query smoke path; deployment runs the
    # long-lived Hermes gateway process. Gateway mode is not live-F2-promoted
    # until separate runtime evidence lands.
    mode: "job"
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    query: "ping"
    # Full command replacement for operators who need a provider-specific or
    # custom Hermes invocation. Leave empty to use the chart-managed command
    # for the selected mode.
    commandOverride: []
    backoffLimit: 0
    activeDeadlineSeconds: 240
    ttlSecondsAfterFinished: 3600
    tmpfsSize: "128Mi"
    appStateSize: "512Mi"
    resources:
      limits:
        cpu: "500m"
        memory: "1Gi"
      requests:
        cpu: "100m"
        memory: "256Mi"
    egressSidecar:
      image:
        repository: "ghcr.io/mindburn-labs/helm-launchpad/egress-proxy"
        digest: "sha256:a997086e0f589173ae87e1575d03b9194afbb87196203226a9e62af7bc160312"
        pullPolicy: "IfNotPresent"
      port: 8080
      allowlist:
        - "https://openrouter.ai/api/v1"
      resources:
        limits:
          cpu: "200m"
          memory: "128Mi"
        requests:
          cpu: "50m"
          memory: "32Mi"
