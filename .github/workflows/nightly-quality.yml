name: Nightly Quality

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  QUALITY_STRICT: "0"

jobs:
  quality-nightly:
    name: Advisory nightly quality profile
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: dtolnay/rust-toolchain@stable
      - name: Run advisory nightly quality profile
        run: make quality-nightly
