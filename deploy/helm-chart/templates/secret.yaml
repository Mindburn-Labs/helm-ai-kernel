{{- if not .Values.helm.signing.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helm-firewall.signingSecretName" . }}
  labels:
    {{- include "helm-firewall.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.helm.signing.key }}
  signing-key: {{ .Values.helm.signing.key | b64enc | quote }}
  {{- else }}
  # Auto-generated development signing key; override with --set helm.signing.key or use existingSecret.
  signing-key: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
{{- end }}
