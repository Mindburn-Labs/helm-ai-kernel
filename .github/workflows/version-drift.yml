name: Version Drift Monitor

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  published-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - id: drift
        name: Check published registry lockstep
        continue-on-error: true
        run: |
          VERSION="$(cat VERSION)"
          python3 scripts/release/check_version_drift.py \
            --expected-version "$VERSION" \
            --write-status version-status.json \
            published \
            --surface-timeout 15
      - name: Upload version status
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: version-status
          path: version-status.json
      - name: Open or update drift issue
        if: steps.drift.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="Version drift monitor: published channels out of lockstep"
          issue_number="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            python3 - <<'PY' > issue-body.md
          import json
          import os

          with open("version-status.json", "r", encoding="utf-8") as f:
              status = json.load(f)

          expected = status.get("expected_version", "unknown")
          generated_at = status.get("generated_at", "unknown")
          registries = status.get("registry_versions", [])
          failing = [item for item in registries if item.get("status") != "pass"]
          passing = [item for item in registries if item.get("status") == "pass"]

          def value_text(value):
              if value is None:
                  return "`missing`"
              if isinstance(value, (dict, list)):
                  return f"`{json.dumps(value, sort_keys=True, separators=(',', ':'))}`"
              return f"`{value}`"

          print(f"Published version drift was detected for expected version `{expected}`.")
          print()
          print(f"Workflow run: {os.environ['RUN_URL']}")
          print(f"Generated at: `{generated_at}`")
          print()
          print("## Failing published channels")
          print()
          if failing:
              for item in failing:
                  detail = item.get("detail")
                  suffix = f" ({detail})" if detail else ""
                  print(
                      f"- `{item.get('id', 'unknown')}`: expected {value_text(item.get('expected'))}, "
                      f"actual {value_text(item.get('actual'))}{suffix}"
                  )
                  if item.get("url"):
                      print(f"  {item['url']}")
          else:
              print("- None")
          print()
          print("## Passing published channels")
          print()
          if passing:
              print(", ".join(f"`{item.get('id', 'unknown')}`" for item in passing))
          else:
              print("None")
          print()
          print("## Resolution path")
          print()
          print("- Publish or repair the failing public channels so they match `VERSION`.")
          print("- Re-run the Version Drift Monitor workflow.")
          print("- The workflow closes this issue automatically once published channels are back in lockstep.")
          print()
          print("Raw `version-status.json` remains attached to the workflow artifact; do not paste the full JSON into this issue.")
          PY
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" --body-file issue-body.md
          else
            gh issue create \
              --title "$title" \
              --body-file issue-body.md \
              --label conformance \
              --label roadmap \
              --label maintainer-task \
              --label release-blocker
          fi
      - name: Close resolved drift issue
        if: steps.drift.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="Version drift monitor: published channels out of lockstep"
          issue_number="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$issue_number" ]; then
            gh issue close "$issue_number" --comment "Published version drift is resolved for $(cat VERSION)."
          fi
