# ArtifactHub-specific annotations. Documented at
# https://artifacthub.io/docs/topics/annotations/helm/ — kept inline in
# Chart.yaml because that is the only file ArtifactHub reads for Helm
# charts (artifacthub-pkg.yml is ignored for kind=helm).
annotations:
  artifacthub.io/category: security
  artifacthub.io/license: Apache-2.0
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/signKey: |
    fingerprint: keyless (sigstore OIDC)
    url: https://github.com/Mindburn-Labs/helm-ai-kernel/blob/main/docs/VERIFICATION.md
  artifacthub.io/links: |
    - name: source
      url: https://github.com/Mindburn-Labs/helm-ai-kernel
    - name: documentation
      url: https://github.com/Mindburn-Labs/helm-ai-kernel/tree/main/docs
    - name: deployment guide
      url: https://github.com/Mindburn-Labs/helm-ai-kernel/blob/main/docs/KUBERNETES_DEPLOYMENT.md
    - name: verification guide
      url: https://github.com/Mindburn-Labs/helm-ai-kernel/blob/main/docs/VERIFICATION.md
    - name: security policy
      url: https://github.com/Mindburn-Labs/helm-ai-kernel/blob/main/SECURITY.md
    - name: support
      url: https://github.com/Mindburn-Labs/helm-ai-kernel/issues
  artifacthub.io/images: |
    - name: helm-ai-kernel
      image: ghcr.io/mindburn-labs/helm-ai-kernel:v0.5.8
      platforms:
        - linux/amd64
        - linux/arm64
    - name: helm-ai-kernel-slim
      image: ghcr.io/mindburn-labs/helm-ai-kernel:v0.5.8-slim
      platforms:
        - linux/amd64
        - linux/arm64
  artifacthub.io/changes: |
    - kind: added
      description: Publish the v0.5.8 Launchpad clean-install release metadata so ArtifactHub indexes the current kernel release.
    - kind: changed
      description: Bump the chart version, appVersion, and container image annotations to v0.5.8.
