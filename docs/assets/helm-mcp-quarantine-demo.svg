<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">HELM AI Kernel execution firewall blueprint</title>
  <desc id="desc">A light blueprint-style architecture diagram showing model proposals entering the HELM policy boundary, failing closed before tools, emitting signed receipts to ProofGraph, and releasing only authorized effects.</desc>
  <defs>
    <pattern id="minorGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0H0V16" fill="none" stroke="#edf0f2" stroke-width="1"/>
    </pattern>
    <pattern id="majorGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#dfe4e8" stroke-width="1.15"/>
    </pattern>
    <filter id="paper" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="17" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.026"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#9aa3ad" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#9ca3af"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#77cfd0"/>
    </marker>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .ink { fill: #2f3540; }
      .muted { fill: #6f7782; }
      .faint { fill: #9aa3ad; }
      .layer { fill: #f7f8f9; stroke: #8e969f; stroke-width: 1.5; }
      .layerText { fill: #303640; font-size: 17px; font-weight: 650; }
      .small { font-size: 15px; }
      .label { font-size: 18px; font-weight: 650; }
      .nodeHead { font-size: 25px; font-weight: 720; }
      .micro { font-size: 14px; font-weight: 600; letter-spacing: 0.4px; }
      .ring { fill: #fbfcfc; stroke: #9aa3ad; stroke-width: 1.4; }
      .tealStroke { stroke: #77cfd0; }
      .violetStroke { stroke: #8f87d8; }
      .pathBase { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#fbfaf8"/>
  <rect width="1600" height="900" fill="url(#minorGrid)" opacity="0.72"/>
  <rect width="1600" height="900" fill="url(#majorGrid)" opacity="0.9"/>
  <rect width="1600" height="900" fill="#fbfaf8" opacity="0.46" filter="url(#paper)"/>

  <g opacity="0.16" fill="none" stroke="#cbd0d5" stroke-width="1.6">
    <path d="M38 724C214 604 262 506 176 354C128 270 86 204 68 100C206 220 262 342 290 474C366 416 366 302 428 228C462 338 536 438 584 566C646 732 506 872 292 926"/>
    <path d="M-34 502C110 514 242 502 338 442C420 392 470 298 530 226"/>
    <path d="M126 106C184 254 282 292 316 438"/>
  </g>

  <g transform="translate(930 92)" text-anchor="middle">
    <text class="sans ink" x="0" y="0" font-size="46" font-weight="720">HELM AI Kernel</text>
    <text class="sans muted" x="0" y="38" font-size="24">Open-source execution firewall for MCP and AI agents</text>
  </g>

  <g transform="translate(958 222)" opacity="0.42">
    <circle cx="0" cy="0" r="72" fill="none" stroke="#c8cdd3" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#c8cdd3" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="35" fill="#f1f2f4" stroke="#c8cdd3" stroke-width="1.2"/>
    <path d="M-13 18C-27-4-10-19-3-42C5-20 19-15 21 4C24 24 7 34-13 18Z" fill="none" stroke="#aeb5bd" stroke-width="2"/>
    <path d="M-4 19C-15 4-4-9 4-22C6-10 16-3 15 9C14 22 7 27-4 19Z" fill="none" stroke="#aeb5bd" stroke-width="1.6"/>
  </g>

  <g transform="translate(492 284)" filter="url(#softShadow)">
    <g class="sans" text-anchor="middle">
      <path class="layer" d="M376 78L430 56C510 40 710 40 790 56L844 78L790 100C710 116 510 116 430 100Z"/>
      <text class="layerText" x="610" y="84">6. MCP / Gateway Surface</text>

      <path class="layer" d="M350 154L420 132C510 116 720 116 810 132L880 154L810 176C720 192 510 192 420 176Z"/>
      <text class="layerText" x="610" y="160">5. Tool Plane</text>

      <path class="layer" d="M326 230L404 206C506 188 724 188 826 206L904 230L826 254C724 272 506 272 404 254Z"/>
      <text class="layerText" x="610" y="236">4. Policy Boundary</text>

      <path class="layer" d="M300 308L392 278C504 258 726 258 838 278L930 308L838 338C726 358 504 358 392 338Z"/>

      <path class="layer" d="M326 402L404 366C506 344 724 344 826 366L904 402L826 438C724 460 506 460 404 438Z"/>

      <path class="layer" d="M350 496L420 454C510 430 720 430 810 454L880 496L810 538C720 562 510 562 420 538Z"/>
      <text class="layerText" x="610" y="502">1. Identity and Trust</text>
    </g>

    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M138 346H192C220 346 222 286 260 286H364" stroke="#d7dde3" stroke-width="12"/>
      <path d="M138 346H192C220 346 222 286 260 286H364" class="pathBase tealStroke" stroke-width="4" marker-end="url(#arrowTeal)"/>
      <path d="M470 286H724" stroke="#d7dde3" stroke-width="12"/>
      <path d="M470 286H724" class="pathBase tealStroke" stroke-width="4" marker-end="url(#arrowTeal)"/>
      <path d="M838 286H918C944 286 946 346 980 346H1040" stroke="#e1e5e9" stroke-width="12"/>
      <path d="M838 286H918C944 286 946 346 980 346H1040" class="pathBase" stroke="#c4cad0" stroke-width="3" marker-end="url(#arrowGray)"/>
      <path d="M430 338V378C430 406 470 414 510 414H604" stroke="#d9d6ef" stroke-width="12"/>
      <path d="M430 338V378C430 406 470 414 510 414H604" class="pathBase violetStroke" stroke-width="4"/>
      <path d="M780 338V378C780 406 740 414 650 414" stroke="#d9d6ef" stroke-width="12"/>
      <path d="M780 338V378C780 406 740 414 650 414" class="pathBase violetStroke" stroke-width="4" marker-end="url(#arrowGray)"/>
    </g>

    <g class="sans" text-anchor="middle">
      <text class="muted small" x="-22" y="333" text-anchor="start">model proposals</text>
      <path d="M126 346H70" fill="none" stroke="#b7bdc4" stroke-width="2" marker-end="url(#arrowGray)"/>

      <circle class="ring" cx="138" cy="346" r="54"/>
      <circle fill="none" stroke="#c5cad0" stroke-width="1.2" cx="138" cy="346" r="40"/>
      <text class="ink label" x="138" y="353">Agent</text>

      <circle fill="#f8fbfb" stroke="#9fe3e2" stroke-width="7" cx="430" cy="286" r="64"/>
      <circle fill="none" stroke="#74cbcb" stroke-width="2" cx="430" cy="286" r="76"/>
      <circle fill="none" stroke="#d5f4f3" stroke-width="2" cx="430" cy="286" r="86"/>
      <text class="ink nodeHead" x="430" y="277">PEP</text>
      <text class="ink small" x="430" y="300">Policy Enforcement</text>
      <text class="muted small" x="430" y="320">Point</text>

      <rect x="540" y="266" width="132" height="28" rx="14" fill="#edf8f8" stroke="#9fe3e2"/>
      <text class="muted micro" x="606" y="285">fail-closed</text>

      <circle fill="#f8fbfb" stroke="#9fe3e2" stroke-width="7" cx="780" cy="286" r="64"/>
      <circle fill="none" stroke="#74cbcb" stroke-width="2" cx="780" cy="286" r="76"/>
      <circle fill="none" stroke="#d5f4f3" stroke-width="2" cx="780" cy="286" r="86"/>
      <text class="ink nodeHead" x="780" y="277">CPI</text>
      <text class="ink small" x="780" y="300">Constraint + Proof</text>
      <text class="muted small" x="780" y="320">Interface</text>

      <circle fill="#faf9ff" stroke="#aaa5e8" stroke-width="7" cx="610" cy="414" r="68"/>
      <circle fill="none" stroke="#8079cf" stroke-width="2" cx="610" cy="414" r="80"/>
      <text class="ink label" x="610" y="407">ProofGraph</text>
      <text class="ink small" x="610" y="430">immutable receipts</text>

      <circle class="ring" cx="1040" cy="346" r="54"/>
      <circle fill="none" stroke="#c5cad0" stroke-width="1.2" cx="1040" cy="346" r="40"/>
      <text class="faint label" x="1040" y="353">Effects</text>
    </g>
  </g>

  <g class="sans muted" transform="translate(108 820)">
    <text x="0" y="0" font-size="18">DENY unknown tools before dispatch</text>
    <text x="0" y="30" font-size="18">ALLOW pinned schemas with receipts</text>
    <text x="0" y="60" font-size="18">FAIL tampered verdicts offline</text>
  </g>
</svg>
