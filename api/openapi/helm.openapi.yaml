openapi: "3.1.0"
# quantum_posture: schema documents signature-related fields; crypto behavior lives in kernel implementation.
info:
  title: HELM Kernel API
  version: "0.7.2"
  description: |
    Deterministic execution kernel for AI tool calls.
    Drop-in OpenAI proxy + cryptographic receipts + offline-verifiable evidence packs.
  license:
    name: Apache-2.0
    url: https://github.com/Mindburn-Labs/helm-ai-kernel/blob/main/LICENSE
  contact:
    name: Mindburn Labs
    url: https://mindburn.org

servers:
  - url: http://localhost:8080
    description: Local development (Docker Compose)
  - url: http://localhost:9090
    description: Standalone proxy mode

tags:
  - name: proxy
    description: OpenAI-compatible proxy endpoints
  - name: approval
    description: RFC-005 approval ceremonies
  - name: mcp
    description: Modern MCP transport (streamable HTTP / JSON-RPC)
  - name: proofgraph
    description: ProofGraph DAG access
  - name: evidence
    description: EvidencePack export and verification
  - name: conformance
    description: Conformance testing
  - name: boundary
    description: Proof-bearing execution-boundary records and checkpoints
  - name: sandbox
    description: Sandbox grant inspection and execution-boundary authority records
  - name: identity
    description: Agent identity, authorization snapshots, approvals, and budgets
  - name: telemetry
    description: Non-authoritative telemetry and coexistence manifests
  - name: system
    description: Health and version
  - name: console
    description: HELM AI Kernel Console platform state
  - name: onboarding
    description: Local OSS quickstart Console onboarding and proof export
  - name: agent
    description: Self-hosted AG-UI runtime for the HELM AI Kernel Console assistant
  - name: launchpad
    description: HELM Launchpad plan, run, repair, and teardown cockpit
  - name: demo
    description: Public HELM AI Kernel sandbox proof scenario

x-helm-reason-codes:
  description: Deterministic reason codes returned by the kernel
  enum:
    - ALLOW
    - DENY_TOOL_NOT_FOUND
    - DENY_SCHEMA_MISMATCH
    - DENY_OUTPUT_DRIFT
    - DENY_BUDGET_EXCEEDED
    - DENY_APPROVAL_REQUIRED
    - DENY_APPROVAL_TIMEOUT
    - DENY_SANDBOX_TRAP
    - DENY_GAS_EXHAUSTION
    - DENY_TIME_LIMIT
    - DENY_MEMORY_LIMIT
    - DENY_POLICY_VIOLATION
    - DENY_TRUST_KEY_REVOKED
    - DENY_IDEMPOTENCY_DUPLICATE
    - IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_REQUEST
    - GLOBAL_RATE_LIMIT_EXCEEDED
    - ENDPOINT_RATE_LIMIT_EXCEEDED
    - ACTOR_RESOURCE_RATE_LIMIT_EXCEEDED
    - CONCURRENCY_LIMIT_EXCEEDED
    - LOW_PRIORITY_LOAD_SHED
    - ERROR_INTERNAL

paths:
  # -- Public HELM AI Kernel proof demo ---------------------------
  /api/health:
    get:
      operationId: getPublicDemoHealth
      tags: [demo, system]
      summary: Read public HELM AI Kernel demo health
      description: |
        Public health endpoint for the self-hostable HELM AI Kernel proof console.
        Includes build and version metadata used by deployment smoke tests.
      responses:
        '200':
          description: Public demo service health
          content:
            application/json:
              schema:
                type: object
                required: [version, commit, helm_ai_kernel_version, status, build_time, git_sha, deployment_id]
                properties:
                  version: { type: string }
                  commit: { type: string }
                  helm_ai_kernel_version: { type: string }
                  status: { type: string }
                  build_time: { type: string }
                  git_sha: { type: string }
                  deployment_id: { type: string }

  /api/demo/run:
    post:
      operationId: runPublicDemo
      tags: [demo]
      summary: Run the Agent Tool Call Boundary sandbox scenario
      description: |
        Evaluates a sample action through the HELM AI Kernel guardian path and emits
        a signed receipt. The scenario is sandboxed and dispatches no external
        side effects.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action_id]
              properties:
                action_id:
                  type: string
                  enum:
                    - read_ticket
                    - draft_reply
                    - small_refund
                    - large_refund
                    - dangerous_shell
                    - export_customer_list
                    - modify_policy
                policy_id:
                  type: string
                  default: agent_tool_call_boundary
                args:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: HELM AI Kernel sandbox verdict and receipt
          content:
            application/json:
              schema:
                type: object
                required: [verdict, reason_code, receipt, proof_refs, verification_hint, sandbox_label, helm_ai_kernel_version]
                properties:
                  verdict: { type: string, enum: [ALLOW, DENY, ESCALATE] }
                  reason_code: { type: string }
                  receipt:
                    $ref: '#/components/schemas/Receipt'
                  proof_refs:
                    type: object
                    required: [decision_id, receipt_id, receipt_hash]
                    properties:
                      decision_id: { type: string }
                      receipt_id: { type: string }
                      receipt_hash: { type: string }
                  verification_hint: { type: string }
                  sandbox_label: { type: string }
                  helm_ai_kernel_version: { type: string }
        '400':
          $ref: '#/components/responses/HelmError'
        '500':
          $ref: '#/components/responses/HelmError'

  /api/demo/verify:
    post:
      operationId: verifyPublicDemoReceipt
      tags: [demo]
      summary: Verify a HELM AI Kernel demo receipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receipt, expected_receipt_hash]
              properties:
                receipt:
                  $ref: '#/components/schemas/Receipt'
                expected_receipt_hash:
                  type: string
                  description: Receipt hash returned in /api/demo/run proof_refs.receipt_hash.
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                required: [valid, signature_valid, hash_matches, reason, verified_fields, receipt_hash, expected_receipt_hash]
                properties:
                  valid: { type: boolean }
                  signature_valid: { type: boolean }
                  hash_matches: { type: boolean }
                  reason: { type: string }
                  verified_fields:
                    type: array
                    items: { type: string }
                  receipt_hash: { type: string }
                  expected_receipt_hash: { type: string }
        '400':
          $ref: '#/components/responses/HelmError'

  /api/demo/tamper:
    post:
      operationId: tamperPublicDemoReceipt
      tags: [demo]
      summary: Tamper with a demo receipt and verify that validation fails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receipt, expected_receipt_hash]
              properties:
                receipt:
                  $ref: '#/components/schemas/Receipt'
                expected_receipt_hash:
                  type: string
                  description: Receipt hash returned in /api/demo/run proof_refs.receipt_hash.
                mutation:
                  type: string
                  default: flip_verdict
      responses:
        '200':
          description: Tamper result
          content:
            application/json:
              schema:
                type: object
                required: [valid, signature_valid, hash_matches, reason, receipt_hash, expected_receipt_hash, original_hash, tampered_hash]
                properties:
                  valid: { type: boolean, const: false }
                  signature_valid: { type: boolean }
                  hash_matches: { type: boolean }
                  reason: { type: string }
                  receipt_hash: { type: string }
                  expected_receipt_hash: { type: string }
                  original_hash: { type: string }
                  tampered_hash: { type: string }
        '400':
          $ref: '#/components/responses/HelmError'

  # ── OpenAI Proxy ────────────────────────────────────
  /v1/chat/completions:
    post:
      operationId: chatCompletions
      tags: [proxy]
      summary: OpenAI-compatible chat completions
      description: |
        Drop-in replacement for OpenAI /v1/chat/completions.
        Tool calls are intercepted, schema-validated, and receipted.
        Response includes X-Helm-Receipt-ID, X-Helm-Output-Hash, X-Helm-Lamport-Clock headers.
        When the opt-in scoped emergency-stop fence is enabled, this
        unauthenticated route returns 503 until an authenticated adapter can
        bind tenant and workspace scope.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
            example:
              model: gpt-4
              messages:
                - role: user
                  content: "List files in /tmp"
              tools:
                - type: function
                  function:
                    name: file_read
                    parameters:
                      type: object
                      properties:
                        path:
                          type: string
      responses:
        '200':
          description: Chat completion with optional tool calls
          headers:
            X-Helm-Receipt-ID:
              schema: { type: string }
              description: Unique receipt ID for this execution
            X-Helm-Output-Hash:
              schema: { type: string }
              description: SHA-256 of the response body
            X-Helm-Lamport-Clock:
              schema: { type: integer }
              description: Causal ordering clock
            X-Helm-Idempotency-Replayed:
              schema: { type: string, enum: ["true"] }
              description: Present when this response was replayed from the idempotency cache.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '400':
          $ref: '#/components/responses/HelmError'
        '403':
          $ref: '#/components/responses/HelmError'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/HelmError'

  # ── Kernel Approval ─────────────────────────────────
  /api/v1/kernel/approve:
    post:
      operationId: approveIntent
      tags: [approval]
      summary: Submit an approval for a pending intent
      description: |
        RFC-005 approval ceremony endpoint.
        Requires intent_hash, Ed25519 signature, and public key.
        Returns an approval receipt with causal chain linkage.
      security:
        - ServiceBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
            example:
              intent_hash: "sha256:abc123..."
              signature_b64: "base64-encoded-ed25519-signature"
              public_key_b64: "base64-encoded-public-key"
      responses:
        '200':
          description: Approval receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receipt'
              example:
                receipt_id: "rec_a1b2c3"
                status: "APPROVED"
                reason_code: "ALLOW"
                lamport_clock: 42
                output_hash: "sha256:7f83b1..."
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'
        '403':
          $ref: '#/components/responses/HelmError'

  /api/v1/evaluate:
    post:
      operationId: evaluateDecision
      tags: [console]
      summary: Evaluate a governed intent and emit a receipt
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
        - $ref: '#/components/parameters/HelmWorkspaceIDHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionRequest'
      responses:
        '200':
          description: Guardian decision record
          headers:
            X-Helm-Idempotency-Replayed:
              schema: { type: string, enum: ["true"] }
              description: Present when this response was replayed from the idempotency cache.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionRecord'
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'
        '403':
          $ref: '#/components/responses/HelmError'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/HelmError'

  /api/v1/receipts:
    get:
      operationId: listReceipts
      tags: [console]
      summary: List durable receipts
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 1000 }
        - name: since
          in: query
          schema: { type: string }
        - name: agent
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Receipt list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptListResponse'
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'
        '503':
          $ref: '#/components/responses/HelmError'

        '403':
          $ref: '#/components/responses/HelmError'
  /api/v1/receipts/tail:
    get:
      operationId: tailReceipts
      tags: [console]
      summary: Tail durable receipts as server-sent events
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 1000 }
        - name: since
          in: query
          schema: { type: string }
        - name: agent
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Server-sent receipt events
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'
        '503':
          $ref: '#/components/responses/HelmError'

        '403':
          $ref: '#/components/responses/HelmError'
  /api/v1/receipts/{receipt_id}:
    get:
      operationId: getConsoleReceipt
      tags: [console]
      summary: Get a receipt by ID
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
        - name: receipt_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Receipt detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receipt'
        '404':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'

        '403':
          $ref: '#/components/responses/HelmError'

  /__helm/config.json:
    get:
      operationId: getLocalConsoleRuntimeConfig
      tags: [onboarding, console]
      summary: Read same-origin Console runtime configuration
      description: |
        Public local quickstart config served only when quickstart mode is active.
        It tells the shared Console where the same-origin API is and which local
        OSS onboarding profile to start. It does not grant authority.
      responses:
        '200':
          description: Local Console runtime config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalConsoleRuntimeConfig'
        '405':
          $ref: '#/components/responses/HelmError'

  /api/v1/local-session/exchange:
    post:
      operationId: exchangeLocalQuickstartSession
      tags: [onboarding]
      summary: Exchange one-time local bootstrap token for a short-lived session
      description: |
        Loopback-only quickstart endpoint. The bootstrap token is one-time and
        short-lived. The returned bearer token still requires tenant and
        principal headers on tenant-scoped APIs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalSessionExchangeRequest'
      responses:
        '200':
          description: Local quickstart session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalSessionExchangeResponse'
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'
        '403':
          $ref: '#/components/responses/HelmError'
        '405':
          $ref: '#/components/responses/HelmError'

  /api/v1/onboarding/state:
    get:
      operationId: getLocalOnboardingState
      tags: [onboarding]
      summary: Read backend-owned local onboarding proof state
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
      responses:
        '200':
          description: Onboarding proof state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingState'
        '401':
          $ref: '#/components/responses/HelmError'
        '403':
          $ref: '#/components/responses/HelmError'
        '405':
          $ref: '#/components/responses/HelmError'

  /api/v1/onboarding/run-step:
    post:
      operationId: runLocalOnboardingStep
      tags: [onboarding]
      summary: Run one backend-owned onboarding proof step
      description: |
        Creates signed receipts and proof artifacts in the backend. The Console
        only displays the returned state and refs.
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingRunStepRequest'
      responses:
        '200':
          description: Updated onboarding state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingState'
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'
        '403':
          $ref: '#/components/responses/HelmError'
        '405':
          $ref: '#/components/responses/HelmError'
        '500':
          $ref: '#/components/responses/HelmError'

  /api/v1/onboarding/export:
    get:
      operationId: exportLocalOnboardingEvidence
      tags: [onboarding, evidence]
      summary: Export local onboarding EvidencePack metadata
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
      responses:
        '200':
          description: EvidencePack export metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingEvidenceExport'
        '401':
          $ref: '#/components/responses/HelmError'
        '403':
          $ref: '#/components/responses/HelmError'
        '405':
          $ref: '#/components/responses/HelmError'
        '500':
          $ref: '#/components/responses/HelmError'

  /api/v1/console/bootstrap:
    get:
      operationId: getConsoleBootstrap
      tags: [console]
      summary: Read HELM AI Kernel Console bootstrap state
      security:
        - AdminBearerAuth: []
      description: |
        Consolidated read-only platform state used by the HELM AI Kernel Console shell.
        Values are derived from kernel services and local configuration.
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
      responses:
        '200':
          description: Console bootstrap state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleBootstrap'
        '401':
          $ref: '#/components/responses/HelmError'

        '403':
          $ref: '#/components/responses/HelmError'
  /v1/meta/capabilities:
    get:
      operationId: getCanonicalMetaCapabilities
      tags: [console, system]
      summary: Read canonical Console capability metadata
      description: |
        Public read-only capability discovery endpoint used by external clients
        to choose OSS Launchpad versus commercial UX states. Authorization
        decisions remain backend-enforced.
      responses:
        '200':
          description: Console capability metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleCapabilities'

  /api/v1/meta/capabilities:
    get:
      operationId: getMetaCapabilities
      tags: [console, system]
      summary: Read legacy Console capability metadata
      description: |
        Compatibility alias for local transition checkouts. New clients should use
        /v1/meta/capabilities.
      responses:
        '200':
          description: Console capability metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleCapabilities'

  /api/v1/console/diagnostics:
    get:
      operationId: getConsoleDiagnostics
      tags: [console, system]
      summary: Read redacted Console runtime and persistence diagnostics
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Redacted runtime, store, route, and access diagnostics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleDiagnostics'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/console/surfaces:
    get:
      operationId: listConsoleSurfaces
      tags: [console]
      summary: List Console surfaces and their backing source contracts
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
      responses:
        '200':
          description: Console surface catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  surfaces:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConsoleSurfaceRef'
        '401':
          $ref: '#/components/responses/HelmError'

        '403':
          $ref: '#/components/responses/HelmError'
  /api/v1/console/surfaces/{surface_id}:
    get:
      operationId: getConsoleSurface
      tags: [console]
      summary: Read a wired Console surface state
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
        - name: surface_id
          in: path
          required: true
          schema:
            type: string
            enum: [overview, agents, actions, approvals, policies, boundary, mcp, sandbox, authz, budgets, connectors, receipts, evidence, replay, conformance, proofgraph, harness, launchpad, trust, telemetry, coexistence, audit, developer, settings, diagnostics]
      responses:
        '200':
          description: Console surface state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleSurfaceState'
        '404':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'

        '403':
          $ref: '#/components/responses/HelmError'
  /api/v1/agent-ui/info:
    get:
      operationId: getAgentUIRuntimeInfo
      tags: [agent, console]
      summary: Read OSS Agent UI runtime capabilities
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
      responses:
        '200':
          description: AG-UI runtime metadata and read-only tool catalog
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required: [runtime, protocol, transport, tools]
                properties:
                  runtime: { type: string }
                  protocol: { type: string, const: ag-ui }
                  transport: { type: string, const: sse }
                  tools:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/HelmError'

        '403':
          $ref: '#/components/responses/HelmError'
  /api/v1/agent-ui/run:
    post:
      operationId: runAgentUIRuntime
      tags: [agent, console]
      summary: Run the OSS read-only Agent UI assistant
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HelmTenantIDHeader'
        - $ref: '#/components/parameters/HelmPrincipalIDHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                threadId: { type: string }
                runId: { type: string }
                workspaceId: { type: string }
                currentSurface: { type: string }
                state:
                  type: object
                  additionalProperties: true
                messages:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                    properties:
                      id: { type: string }
                      role: { type: string }
