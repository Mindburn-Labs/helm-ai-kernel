id: claude-code.external
name: Claude Code External Adapter
version: external-byo
license:
  status: proprietary_byo
redistribution: prohibited
availability: external_proprietary_adapter
support_level: external_byo_adapter
install:
  strategy: byo_tool
runtime:
  command: ["claude"]
model_gateway_env: []
required_secrets: ["vendor_account"]
filesystem_policy:
  mode: scoped_workspace
  mounts: ["workspace:rw", "app_state:rw"]
  policy_ref: policies/launchpad/apps/claude-code.external.toml
network_policy:
  default: deny
  allowlist: []
mcp_policy:
  unknown_server_policy: quarantine
  unknown_tool_policy: ESCALATE
  require_schema_pin: true
healthchecks: []
risk_class: T1
budget_ceiling:
  usd_max: 0
  api_calls_max: 0
  time_ms_max: 0
framework_contract:
  f2_contract_preflight: true
  claim_level: external_byo_adapter
  live_command_kind: workstation_adapter
  runtime_install_policy: forbidden
  baked_dependencies: ["byo_claude_cli"]
  forbidden_runtime_install_patterns: ["npm install", "pnpm install", "yarn install", "pip install", "uv pip install", "playwright install", "apt-get", "apk add", "curl | sh", "curl -fsSL"]
  writable_paths:
    - path: /var/lib/claude-code/app_state
      purpose: workstation_state_manifest
      required: true
  provider_host_groups: []
  egress_proxy:
    required: false
  mcp_manifest_refs: []
  healthcheck: "workstation_contract_manifest"
  evidence_profile: workstation.contract.v1
  evidence_refs:
    - contract_preflight.json
    - launch_plan.json
    - workstation_artifact_manifest.json
    - agent_run_receipt.json
    - offline_verify.txt
evidence_requirements:
  - contract_preflight
  - cpi_output
  - kernel_verdict
  - sandbox_grant
  - launch_receipt
  - teardown_receipt
  - evidence_pack
  - offline_verify
  - workstation_artifact_manifest
  - agent_run_receipt
metadata:
  workstation_governance_mode: selected_effect_enforceable
  workstation_policy_profile: workstation.observe_draft.v1
  workstation_adapter_strategy: manifest_first_with_cli_hook
  workstation_required_artifacts: run.manifest.json,git.diff-summary.json,validation.json
  workstation_optional_artifacts: tool-events.ndjson,policy-profile.json
  workstation_receipt_schema: workstation/agent_run_receipt.v1
  workstation_decision_receipt_schema: workstation/workstation_policy_decision_receipt.v1
  workstation_enforcement_claim: selected_effect_wrapper_only
  workstation_adapter_docs: helm-ai-kernel/examples/workstation/README.md
  workstation_adapter_script: helm-ai-kernel/examples/workstation/claude-code/run-capture.sh
  workstation_supported_certification_level: high-risk-effect-capable
conformance:
  license_verified: false
  artifact_verified: false
  policy_pack_present: true
  sandbox_verified: false
  healthcheck_passing: false
  e2e_passing: false
  teardown_verified: false
  receipt_verified: false
  evidence_pack_verified: false
