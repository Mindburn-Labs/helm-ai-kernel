name: Coverage

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  kernel-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.12"
          cache-dependency-path: "**/go.sum"
      - name: Measure core package coverage
        run: |
          set -euo pipefail
          cd core
          go test ./pkg/... -covermode=atomic -coverprofile=coverage.out
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')"
          awk -v total="$total" 'BEGIN { if (total + 0 < 40) { printf("coverage %.1f below 40.0 floor\n", total); exit 1 } }'
          go test ./pkg/pdp ./pkg/guardian ./pkg/proofgraph ./pkg/crypto/tee -covermode=atomic -coverprofile=tcb.out
          go tool cover -func=tcb.out
