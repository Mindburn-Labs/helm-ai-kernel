id: openclaw
name: OpenClaw
version: v2026.5.12
license:
    status: verified
    spdx: MIT
    url: https://github.com/openclaw/openclaw/blob/v2026.5.12/LICENSE
redistribution: allowed_by_MIT_with_upstream_notice
availability: oss_supported
support_level: agent_live
install:
    strategy: signed_oci
    image: ghcr.io/mindburn-labs/helm-launchpad/openclaw@sha256:12fd0c07be068dbf32159583160aa066152d53efa2b617351ba2cf5083f5b62e
    digest: sha256:12fd0c07be068dbf32159583160aa066152d53efa2b617351ba2cf5083f5b62e
    source: https://github.com/openclaw/openclaw
    ref: v2026.5.12
runtime:
    command:
        - openclaw
        - gateway
        - run
        - --port
        - "18789"
        - --allow-unconfigured
        - --auth
        - none
        - --bind
        - loopback
    timeout: 300s
    detached: true
    readiness_timeout: 8m
model_gateway:
    logical_secret: model_gateway
    provider: byo
    provider_ids:
        - openrouter
    mode: logical_binding_env_projection
    raw_provider_key_projected: true
model_gateway_env: []
required_secrets:
    - model_gateway
filesystem_policy:
    mode: scoped_workspace
    mounts:
        - workspace:rw
        - app_state:rw:/opt/openclaw/.openclaw
    policy_ref: policies/launchpad/apps/openclaw.safe.toml
network_policy:
    default: deny
mcp_policy:
    unknown_server_policy: quarantine
    unknown_tool_policy: ESCALATE
    require_schema_pin: true
mcp_manifests:
    - openclaw.default
healthchecks:
    - type: command
      command: helm-launchpad-openrouter-check
risk_class: T1
budget_ceiling:
    usd_max: 0
    api_calls_max: 0
    time_ms_max: 0
framework_contract:
    f2_contract_preflight: true
    claim_level: agent_live
    live_command_kind: agent_live
    runtime_install_policy: forbidden
    baked_dependencies:
        - openclaw-cli
        - gateway-runtime
        - launchpad-openrouter-check
    forbidden_runtime_install_patterns:
        - npm install
        - pnpm install
        - yarn install
        - pip install
        - uv pip install
        - playwright install
        - apt-get
        - apk add
        - curl | sh
        - curl -fsSL
    writable_paths:
        - path: /opt/openclaw/.openclaw
          purpose: app_cache_state
          required: true
    provider_host_groups:
        - openrouter
    egress_proxy:
        required: true
        image: ghcr.io/mindburn-labs/helm-launchpad/egress-proxy@sha256:83c77bd60f74f94b00b8315bbfcb71435b7314d8cf0b0093de17339231706caf
        digest: sha256:83c77bd60f74f94b00b8315bbfcb71435b7314d8cf0b0093de17339231706caf
        signature_ref: cosign://ghcr.io/mindburn-labs/helm-launchpad/egress-proxy@sha256:83c77bd60f74f94b00b8315bbfcb71435b7314d8cf0b0093de17339231706caf
        sbom_ref: artifact://sbom-egress-proxy.spdx.json
        vulnerability_scan_ref: artifact://grype-egress-proxy.json
        receipt_ref: receipts/launchpad-egress-proxy.json
    mcp_manifest_refs:
        - openclaw.default
    healthcheck: helm-launchpad-openrouter-check
    evidence_profile: f2.contract.v1
    images:
        - name: openclaw-production
          image: ghcr.io/mindburn-labs/helm-launchpad/openclaw@sha256:12fd0c07be068dbf32159583160aa066152d53efa2b617351ba2cf5083f5b62e
          digest: sha256:12fd0c07be068dbf32159583160aa066152d53efa2b617351ba2cf5083f5b62e
          purpose: production_proof
          baked_dependencies:
            - openclaw-cli
            - gateway-runtime
    evidence_refs:
        - contract_preflight.json
        - launch_plan.json
        - kernel_verdict.json
        - sandbox_grant.json
        - receipts/launchpad-egress-proxy.json
        - mcp_quarantine.json
        - receipts/launchpad-healthcheck.json
        - runtime_environment.json
        - 04_EXPORTS/launchpad_manifest.json
        - offline_verify.txt
evidence_requirements:
    - contract_preflight
    - cpi_output
    - kernel_verdict
    - sandbox_grant
    - egress_proxy_receipt
    - launch_receipt
    - install_receipt
    - healthcheck_receipt
    - teardown_receipt
    - evidence_pack
    - offline_verify
    - evidence_graph
    - mcp_quarantine
    - mcp_manifest
    - model_gateway_broker
    - artifact_digest
    - cosign_signature
    - syft_sbom
    - grype_vulnerability_scan
supply_chain_evidence:
    artifact_digest: sha256:12fd0c07be068dbf32159583160aa066152d53efa2b617351ba2cf5083f5b62e
    signature_tool: cosign
    signature_ref: cosign://ghcr.io/mindburn-labs/helm-launchpad/openclaw@sha256:12fd0c07be068dbf32159583160aa066152d53efa2b617351ba2cf5083f5b62e
    sbom_tool: syft
    sbom_ref: artifact://sbom-openclaw.spdx.json
