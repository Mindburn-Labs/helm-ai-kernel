name: Launchpad Artifacts

on:
  workflow_dispatch:
    inputs:
      run_live_conformance:
        description: Run live OpenRouter local-container conformance after artifact build
        required: false
        default: false
        type: boolean
      run_candidate_live_conformance:
        description: Also run candidate OpenCode/Kilo Code live conformance
        required: false
        default: false
        type: boolean
      include_candidate_artifacts:
        description: Also build artifact-only OpenCode/Kilo Code candidate images
        required: false
        default: false
        type: boolean
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/launchpad-artifacts.yml"
      - "registry/launchpad/apps/openclaw.yaml"
      - "registry/launchpad/apps/hermes.yaml"
      - "registry/launchpad/apps/opencode.yaml"
      - "registry/launchpad/apps/kilocode.yaml"
      - "policies/launchpad/apps/openclaw.safe.toml"
      - "policies/launchpad/apps/hermes.safe.toml"
      - "policies/launchpad/apps/opencode.safe.toml"
      - "policies/launchpad/apps/kilocode.safe.toml"
      - "core/pkg/launchpad/**"
      - "tests/launchpad/**"
      - "tools/launchpad/artifacts/**"
      - "tools/launchpad/egressproxy/**"

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_PREFIX: mindburn-labs/helm-launchpad

jobs:
  artifact-matrix:
    name: Resolve Launchpad artifact matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          set -euo pipefail
          cat > matrix.json <<'JSON'
          {
            "include": [
              {
                "app_id": "openclaw",
                "version": "v2026.5.12",
                "upstream_repo": "openclaw/openclaw",
                "upstream_ref": "v2026.5.12",
                "dockerfile": "helm/tools/launchpad/artifacts/openclaw.Dockerfile",
                "license_spdx": "MIT"
              },
              {
                "app_id": "hermes",
                "version": "v2026.5.16",
                "upstream_repo": "NousResearch/hermes-agent",
                "upstream_ref": "v2026.5.16",
                "dockerfile": "helm/tools/launchpad/artifacts/hermes.Dockerfile",
                "license_spdx": "MIT"
              }
            ]
          }
          JSON
          include_candidates=0
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            include_candidates=1
          fi
          if [[ "${{ inputs.include_candidate_artifacts }}" == "true" || "${{ inputs.run_candidate_live_conformance }}" == "true" ]]; then
            include_candidates=1
          fi
          if [[ "${include_candidates}" -eq 1 ]]; then
            jq '.include += [
              {
                "app_id": "opencode",
                "version": "v1.15.5",
                "upstream_repo": "anomalyco/opencode",
                "upstream_ref": "v1.15.5",
                "dockerfile": "helm/tools/launchpad/artifacts/opencode.Dockerfile",
                "license_spdx": "MIT"
              },
              {
                "app_id": "kilocode",
                "version": "v7.3.1",
                "upstream_repo": "Kilo-Org/kilocode",
                "upstream_ref": "v7.3.1",
                "dockerfile": "helm/tools/launchpad/artifacts/kilocode.Dockerfile",
                "license_spdx": "MIT"
              }
            ]' matrix.json > matrix-expanded.json
            mv matrix-expanded.json matrix.json
          fi
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    name: Build and sign ${{ matrix.app_id }}
    runs-on: ubuntu-latest
    needs: artifact-matrix
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.artifact-matrix.outputs.matrix) }}
    outputs:
      openclaw-digest: ${{ steps.digest.outputs.openclaw_digest }}
      hermes-digest: ${{ steps.digest.outputs.hermes_digest }}
      opencode-digest: ${{ steps.digest.outputs.opencode_digest }}
      kilocode-digest: ${{ steps.digest.outputs.kilocode_digest }}
    steps:
      - name: Checkout HELM source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: helm

      - name: Checkout pinned upstream source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ matrix.upstream_repo }}
          ref: ${{ matrix.upstream_ref }}
          path: upstream
          persist-credentials: false

      - name: Resolve pinned upstream commit
        id: upstream
        working-directory: upstream
        run: |
          set -euo pipefail
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify license marker
        working-directory: upstream
        run: |
          set -euo pipefail
          test -f LICENSE
          grep -Eiq 'MIT|Massachusetts Institute of Technology' LICENSE

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@55dc4ee22412511ee8c3142cbea40418e6cec693 # v0.17.8

      - name: Install grype
        uses: anchore/scan-action/download-grype@1638637db639e0ade3258b51db49a9a137574c3e # v6.5.1

      - name: Expose grype on PATH
        run: |
          set -euo pipefail
          GRYPE_BIN="$(find /opt/hostedtoolcache/grype -type f -name grype -perm -111 | sort | tail -n 1)"
          if [ -z "${GRYPE_BIN}" ]; then
            echo "grype binary not found after download" >&2
            exit 1
          fi
          dirname "${GRYPE_BIN}" >> "$GITHUB_PATH"
          "${GRYPE_BIN}" version

      - id: meta
        name: Compute image coordinates
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.app_id }}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${image}:${{ matrix.version }}" >> "$GITHUB_OUTPUT"

      - id: build
        name: Build and push OCI image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: upstream
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ matrix.upstream_repo }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.commit }}
            org.opencontainers.image.version=${{ matrix.version }}
            org.opencontainers.image.licenses=${{ matrix.license_spdx }}
            io.mindburn.helm.launchpad.app=${{ matrix.app_id }}
            io.mindburn.helm.launchpad.recipe=${{ matrix.dockerfile }}
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ matrix.upstream_ref }}

      - name: Sign image digest with keyless cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_REF}"

      - name: Verify cosign signature
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign verify "${IMAGE_REF}" \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/launchpad-artifacts.yml@${GITHUB_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            > "cosign-${{ matrix.app_id }}.json"

      - name: Generate syft SBOM
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          syft "${IMAGE_REF}" -o spdx-json="sbom-${{ matrix.app_id }}.spdx.json"

      - name: Run grype scan
        id: grype
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          status=completed
          if ! grype "${IMAGE_REF}" -o json --file "grype-${{ matrix.app_id }}.json"; then
            status=failed
          fi
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      - name: Write artifact manifest entry
        env:
          APP_ID: ${{ matrix.app_id }}
          VERSION: ${{ matrix.version }}
          UPSTREAM_REPO: https://github.com/${{ matrix.upstream_repo }}
          UPSTREAM_REF: ${{ matrix.upstream_ref }}
          UPSTREAM_COMMIT: ${{ steps.upstream.outputs.commit }}
          LICENSE_SPDX: ${{ matrix.license_spdx }}
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
          DIGEST: ${{ steps.build.outputs.digest }}
          GRYPE_STATUS: ${{ steps.grype.outputs.status }}
        run: |
          set -euo pipefail
          mkdir -p launchpad-artifacts
          jq -n \
            --arg app_id "${APP_ID}" \
            --arg app_version "${VERSION}" \
            --arg upstream_repo "${UPSTREAM_REPO}" \
            --arg upstream_ref "${UPSTREAM_REF}" \
            --arg upstream_commit "${UPSTREAM_COMMIT}" \
            --arg license_spdx "${LICENSE_SPDX}" \
            --arg license_ref "${UPSTREAM_REPO}/blob/${UPSTREAM_REF}/LICENSE" \
            --arg redistribution "allowed_by_${LICENSE_SPDX}_with_upstream_notice" \
            --arg image "${IMAGE_REF}" \
            --arg digest "${DIGEST}" \
            --arg signature_tool "cosign" \
            --arg signature_ref "cosign://${IMAGE_REF}" \
            --arg sbom_tool "syft" \
            --arg sbom_ref "artifact://sbom-${APP_ID}.spdx.json" \
            --arg vulnerability_scan_tool "grype" \
            --arg vulnerability_scan_ref "artifact://grype-${APP_ID}.json" \
            --arg vulnerability_scan_status "${GRYPE_STATUS}" \
            --arg provenance_ref "github-actions://${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}" \
            '{
              app_id: $app_id,
              app_version: $app_version,
              upstream_repo: $upstream_repo,
              upstream_ref: $upstream_ref,
              upstream_commit: $upstream_commit,
              license_spdx: $license_spdx,
              license_ref: $license_ref,
              redistribution: $redistribution,
              image: $image,
              digest: $digest,
              signature_tool: $signature_tool,
              signature_ref: $signature_ref,
              sbom_tool: $sbom_tool,
              sbom_ref: $sbom_ref,
              vulnerability_scan_tool: $vulnerability_scan_tool,
              vulnerability_scan_ref: $vulnerability_scan_ref,
              vulnerability_scan_status: $vulnerability_scan_status,
              provenance_ref: $provenance_ref
            }' > "launchpad-artifacts/${APP_ID}.json"

      - id: digest
        name: Expose digest output
        run: |
          case "${{ matrix.app_id }}" in
            openclaw) echo "openclaw_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT" ;;
            hermes) echo "hermes_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT" ;;
            opencode) echo "opencode_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT" ;;
            kilocode) echo "kilocode_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Upload Launchpad artifact evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launchpad-artifact-${{ matrix.app_id }}
          path: |
            launchpad-artifacts/${{ matrix.app_id }}.json
            cosign-${{ matrix.app_id }}.json
            sbom-${{ matrix.app_id }}.spdx.json
            grype-${{ matrix.app_id }}.json

  egress-proxy:
    name: Build and sign Launchpad egress proxy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout HELM source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: helm
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Install syft
        uses: anchore/sbom-action/download-syft@55dc4ee22412511ee8c3142cbea40418e6cec693 # v0.17.8
      - name: Install grype
        uses: anchore/scan-action/download-grype@1638637db639e0ade3258b51db49a9a137574c3e # v6.5.1

      - name: Expose grype on PATH
        run: |
          set -euo pipefail
          GRYPE_BIN="$(find /opt/hostedtoolcache/grype -type f -name grype -perm -111 | sort | tail -n 1)"
          if [ -z "${GRYPE_BIN}" ]; then
            echo "grype binary not found after download" >&2
            exit 1
          fi
          dirname "${GRYPE_BIN}" >> "$GITHUB_PATH"
          "${GRYPE_BIN}" version

      - id: meta
        name: Compute proxy image coordinates
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_PREFIX}/egress-proxy"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${image}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - id: build
        name: Build and push egress proxy image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: helm
          file: helm/tools/launchpad/artifacts/egress-proxy.Dockerfile
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0
            io.mindburn.helm.launchpad.component=egress-proxy
          tags: |
            ${{ steps.meta.outputs.tag }}
      - name: Sign egress proxy digest with keyless cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_REF}"
      - name: Verify egress proxy cosign signature
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign verify "${IMAGE_REF}" \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/launchpad-artifacts.yml@${GITHUB_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            > cosign-egress-proxy.json
      - name: Generate egress proxy SBOM and vulnerability report
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          syft "${IMAGE_REF}" -o spdx-json=sbom-egress-proxy.spdx.json
          status=completed
          if ! grype "${IMAGE_REF}" -o json --file grype-egress-proxy.json; then
            status=failed
          fi
          jq -n \
            --arg image "${IMAGE_REF}" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            --arg signature_ref "cosign://${IMAGE_REF}" \
            --arg sbom_ref "artifact://sbom-egress-proxy.spdx.json" \
            --arg vulnerability_scan_ref "artifact://grype-egress-proxy.json" \
            --arg vulnerability_scan_status "${status}" \
            --arg provenance_ref "github-actions://${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}" \
            '{
              component: "egress-proxy",
              image: $image,
              digest: $digest,
              signature_tool: "cosign",
              signature_ref: $signature_ref,
              sbom_tool: "syft",
              sbom_ref: $sbom_ref,
              vulnerability_scan_tool: "grype",
              vulnerability_scan_ref: $vulnerability_scan_ref,
              vulnerability_scan_status: $vulnerability_scan_status,
              provenance_ref: $provenance_ref
            }' > launchpad-egress-proxy.json
      - name: Upload egress proxy evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launchpad-egress-proxy
          path: |
            launchpad-egress-proxy.json
            cosign-egress-proxy.json
            sbom-egress-proxy.spdx.json
            grype-egress-proxy.json

  aggregate:
    name: Aggregate Launchpad artifact manifest
    runs-on: ubuntu-latest
    needs: [build, egress-proxy]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: launchpad-artifact-*
          path: launchpad-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: launchpad-egress-proxy
          path: launchpad-artifacts
      - name: Write manifest
        run: |
          set -euo pipefail
          find launchpad-artifacts -maxdepth 4 -type f -print | sort
          egress_manifest="$(find launchpad-artifacts -type f -name launchpad-egress-proxy.json -print -quit)"
          test -f "${egress_manifest}"
          manifests=()
          for app in openclaw hermes; do
            manifest="$(find launchpad-artifacts -type f -name "${app}.json" -print -quit)"
            test -f "${manifest}"
            manifests+=("${manifest}")
          done
          for app in opencode kilocode; do
            manifest="$(find launchpad-artifacts -type f -name "${app}.json" -print -quit)"
            if [[ -n "${manifest}" ]]; then
              manifests+=("${manifest}")
            fi
          done
          jq -s \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg github_run_id "${GITHUB_RUN_ID}" \
            --arg github_run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --slurpfile egress_proxy "${egress_manifest}" \
            '{
              schema_version: "helm.launchpad.artifacts.v1",
              generated_at: $generated_at,
              github_run_id: $github_run_id,
              github_run_attempt: $github_run_attempt,
              egress_proxy: $egress_proxy[0],
              artifacts: .
            }' "${manifests[@]}" > launchpad-artifact-manifest.json
          jq . launchpad-artifact-manifest.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launchpad-artifact-manifest
          path: launchpad-artifact-manifest.json

  live-conformance:
    name: Live OpenRouter local-container conformance
    runs-on: ubuntu-latest
    needs: aggregate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_conformance }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: "**/go.sum"
      - name: Log in to GHCR for conformance pulls
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: launchpad-artifact-manifest
          path: /tmp/launchpad
      - name: Resolve signed egress proxy image
        run: |
          set -euo pipefail
          proxy_image="$(jq -r '.egress_proxy.image // empty' /tmp/launchpad/launchpad-artifact-manifest.json)"
          test -n "${proxy_image}"
          echo "HELM_LAUNCHPAD_EGRESS_PROXY_IMAGE=${proxy_image}" >> "$GITHUB_ENV"
      - name: Run gated live conformance
        env:
          HELM_LAUNCHPAD_LIVE_E2E: "1"
          HELM_LAUNCHPAD_LIVE_APPS: ${{ inputs.run_candidate_live_conformance && 'openclaw,hermes,opencode,kilocode' || 'openclaw,hermes' }}
          HELM_LAUNCHPAD_ARTIFACT_MANIFEST: /tmp/launchpad/launchpad-artifact-manifest.json
          HELM_LAUNCHPAD_LIVE_EVIDENCE_DIR: /tmp/launchpad-live-evidence
          HELM_LAUNCHPAD_LOCAL_CONTAINER_TIMEOUT: 8m
          HELM_LAUNCHPAD_CI_OPENROUTER_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_OPENROUTER_API_KEY }}
        run: go test ./tests/launchpad/... -run TestLiveOpenRouterLocalContainerConformance -count=1 -timeout 30m -v
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() }}
        with:
          name: launchpad-live-evidence
          path: /tmp/launchpad-live-evidence
          include-hidden-files: true
      - name: Write merged promotion manifest
        env:
          LIVE_APPS: ${{ inputs.run_candidate_live_conformance && 'openclaw,hermes,opencode,kilocode' || 'openclaw,hermes' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/launchpad-promotion
          jq \
            --arg github_run_id "${GITHUB_RUN_ID}" \
            --arg github_run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg live_apps "${LIVE_APPS}" \
            '($live_apps | split(",") | map(gsub("^\\s+|\\s+$"; ""))) as $liveApps
            | .artifacts |= map(
              .app_id as $appID
              | (. + {
                artifact_verification_ref: ("github-actions://" + $github_run_id + "/" + $github_run_attempt + "/artifact-verification/" + $appID)
              })
              + (if ($liveApps | index($appID)) then {
                live_e2e_run_id: ("github-actions://" + $github_run_id + "/" + $github_run_attempt + "/live-e2e/" + $appID),
                evidence_pack_ref: ("github-actions://" + $github_run_id + "/" + $github_run_attempt + "/evidencepack/" + $appID),
                teardown_receipt_ref: ("github-actions://" + $github_run_id + "/" + $github_run_attempt + "/teardown/" + $appID),
                promotion_status: "live_conformance_passed"
              } else {
                promotion_status: "artifact_only_no_live_conformance"
              } end)
            )' \
            /tmp/launchpad/launchpad-artifact-manifest.json > /tmp/launchpad-promotion/launchpad-promotion-manifest.json
          jq . /tmp/launchpad-promotion/launchpad-promotion-manifest.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launchpad-promotion-manifest
          path: /tmp/launchpad-promotion/launchpad-promotion-manifest.json
