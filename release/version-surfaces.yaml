    {
      "id": "root-version",
      "path": "VERSION",
      "kind": "exact",
      "expected": "{version}"
    },
    {
      "id": "helm-chart-version",
      "path": "deploy/helm-chart/Chart.yaml",
      "kind": "regex",
      "pattern": "^version: (?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)$",
      "replacement": "version: {version}"
    },
    {
      "id": "helm-chart-app-version",
      "path": "deploy/helm-chart/Chart.yaml",
      "kind": "regex",
      "pattern": "^appVersion: \"v(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)\"$",
      "replacement": "appVersion: \"v{version}\""
    },
    {
      "id": "helm-chart-image-tags",
      "path": "deploy/helm-chart/Chart.yaml",
      "kind": "regex",
      "pattern": "(ghcr\\.io/mindburn-labs/helm-ai-kernel:)v(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)(?P<suffix>-slim)?",
      "replacement": "\\g<1>v{version}\\g<suffix>"
