syntax = "proto3";

package contracts;

option go_package = "./pkg/interlock/api";

import "google/protobuf/timestamp.proto";

enum Verdict {
  VERDICT_UNSPECIFIED = 0;
  VERDICT_ALLOW = 1;
  VERDICT_DENY = 2;
}

message DecisionRecord {
  string proposal_id = 1;
  string step_id = 2;
  string phenotype_hash = 3;
  string state_cursor = 4;
  string env_fingerprint = 5;
  Verdict verdict = 6;
  string reason = 7;
  google.protobuf.Timestamp timestamp = 8;
  bytes signature = 9;
  string decision_hash = 10; // Canonical hash of the fields (excluding signature/decision_hash)
  double trajectory_risk_score = 11;
  string session_centroid_hash = 12;
  int32 risk_accumulation_window = 13;
  // Product request identity (X-Helm-Correlation-ID) this decision was made
  // for — the stable join key across lifecycle events, receipts, and
  // evidence. Optional; outside the decision signature until HELM-303.
  string correlation_id = 14;
  bytes threat_scan = 15; // JSON-encoded typed ThreatScanRef covered by the decision signature
}
