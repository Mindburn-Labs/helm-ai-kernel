name: Python Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish. Must match VERSION.
        required: true
        type: string
      dry_run:
        description: Build without publishing.
        required: false
        default: false
        type: boolean

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Version checks
        working-directory: sdk/python
        run: |
          FILE_VERSION=$(cat ../../VERSION)
          REQUESTED="${{ github.event.inputs.version }}"
          PACKAGE_VERSION=$(python - <<'PY'
          from pathlib import Path
          import tomllib
          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )
          test "$REQUESTED" = "$FILE_VERSION"
          test "$PACKAGE_VERSION" = "$FILE_VERSION"
      - name: Build and validate
        working-directory: sdk/python
        run: |
          python -m pip install --require-hashes -r ../../.github/python-build-requirements.txt
          python -m build
          twine check dist/*
      - name: Publish
        if: github.event.inputs.dry_run != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: sdk/python/dist/
