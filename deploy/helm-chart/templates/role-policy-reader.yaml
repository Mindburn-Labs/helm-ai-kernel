{{- if eq .Values.helm.policy.source.kind "crd" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "helm-firewall.fullname" . }}-policy-reader
  labels:
    {{- include "helm-firewall.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - {{ .Values.helm.policy.source.crd.apiGroup | quote }}
    resources:
      - helmpolicybundles
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
    verbs:
      - get
{{- end }}
