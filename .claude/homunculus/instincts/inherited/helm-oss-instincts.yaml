# Helm Oss Workflow Multi Package Dependency Upgrade

## Action

Follow the multi-package-dependency-upgrade workflow:
1. Identify outdated dependencies across all packages.
2. Update package.json and package-lock.json files for each affected package.
3. Regenerate lockfiles as needed.
4. Commit all updated files together with a detailed changelog in the commit message.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: */package.json, */package-lock.json, */**/package.json

