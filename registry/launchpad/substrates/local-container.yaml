id: local-container
name: Local Container
kind: local-container
availability: supported
default_dry_run: false
policy_pack: policies/launchpad/substrates/local-container.safe.toml
provisioner: docker
supports_teardown: true
requires_approval: false
capabilities:
  isolation_strength: container_baseline
  network_enforcement: launch_owned_egress_proxy
  secret_mode: logical_binding_env_projection
  receipt_support: required
  teardown_proof: required
  status: ga
  lifecycle: ["plan", "preflight", "launch", "healthcheck", "execute", "evidence_export", "reconcile", "delete", "post_delete_verify"]
isolation:
  mode: docker-default
  supported_modes:
    - docker-default
    - docker-rootless-userns
    - docker-eci
    - gvisor
    - kata-firecracker
    - dedicated-vm
  hardened_modes:
    - docker-rootless-userns
    - docker-eci
    - gvisor
    - kata-firecracker
    - dedicated-vm
  hostile_agent_grade: false
network:
  default: deny
  allowlist: []
filesystem:
  mode: deny_by_default
  mounts:
    - workspace:rw
metadata:
  status: "GA baseline substrate for trusted developer workloads; hostile-code claims require a stronger microVM or hosted sandbox substrate."
