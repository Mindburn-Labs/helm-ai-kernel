{{- if and (eq .Values.helm.policy.source.kind "crd") .Values.helm.policy.source.crd.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: helmpolicybundles.{{ .Values.helm.policy.source.crd.apiGroup }}
  labels:
    {{- include "helm-firewall.labels" . | nindent 4 }}
spec:
  group: {{ .Values.helm.policy.source.crd.apiGroup }}
  scope: Namespaced
  names:
    plural: helmpolicybundles
    singular: helmpolicybundle
    kind: HelmPolicyBundle
    shortNames:
      - hpb
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - tenantId
                - workspaceId
                - policyEpoch
                - bundleRef
                - expectedPolicyHash
              properties:
                tenantId:
                  type: string
                workspaceId:
                  type: string
                policyEpoch:
                  type: integer
                  format: int64
                  minimum: 1
                bundleRef:
                  type: object
                  required:
                    - kind
                    - name
                  properties:
                    kind:
                      type: string
                      enum:
                        - configMap
                        - secret
                        - objectStore
                    name:
                      type: string
                    key:
                      type: string
                expectedPolicyHash:
                  type: string
                  pattern: "^sha256:[0-9a-fA-F]{64}$"
                proofRef:
                  type: string
            status:
              type: object
              properties:
                observedPolicyHash:
                  type: string
                installed:
                  type: boolean
                reason:
                  type: string
      subresources:
        status: {}
{{- end }}
