{{- if not .Values.helm.signing.existingSecret -}}
{{- $secretName := include "helm-firewall.signingSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingKey := "" -}}
{{- if and $existing (hasKey $existing.data "signing-key") -}}
{{- $existingKey = index $existing.data "signing-key" -}}
{{- end -}}
{{- if and .Values.helm.signing.key (not (regexMatch "^[0-9a-fA-F]{64}$" .Values.helm.signing.key)) -}}
{{- fail "helm.signing.key must be a 64-character hex Ed25519 seed" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "helm-firewall.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.helm.signing.key }}
  signing-key: {{ .Values.helm.signing.key | lower | b64enc | quote }}
  {{- else if $existingKey }}
  signing-key: {{ $existingKey | quote }}
  {{- else if .Values.helm.production }}
  {{- fail "helm.production=true requires helm.signing.key or helm.signing.existingSecret; refusing to generate a production signing key" }}
  {{- else }}
  # Auto-generated development root key; lookup preserves it on Helm upgrades.
  signing-key: {{ randAlphaNum 64 | sha256sum | b64enc | quote }}
  {{- end }}
{{ end }}
{{- if and (not .Values.helm.auth.existingSecret) (not .Values.helm.auth.adminAPIKey) .Values.helm.production -}}
{{- fail "helm.production=true requires helm.auth.adminAPIKey or helm.auth.existingSecret; protected runtime APIs fail closed without admin auth" -}}
{{- end -}}
{{- if and (not .Values.helm.auth.existingSecret) (not .Values.helm.auth.serviceAPIKey) .Values.helm.production -}}
{{- fail "helm.production=true requires helm.auth.serviceAPIKey or helm.auth.existingSecret; service-internal runtime APIs fail closed without service auth" -}}
{{- end -}}
{{ if and (not .Values.helm.auth.existingSecret) (or .Values.helm.auth.adminAPIKey .Values.helm.auth.serviceAPIKey) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helm-firewall.authSecretName" . }}
  labels:
    {{- include "helm-firewall.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.helm.auth.adminAPIKey }}
  {{ .Values.helm.auth.adminAPIKeySecretKey }}: {{ .Values.helm.auth.adminAPIKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.helm.auth.serviceAPIKey }}
  {{ .Values.helm.auth.serviceAPIKeySecretKey }}: {{ .Values.helm.auth.serviceAPIKey | b64enc | quote }}
  {{- end }}
{{- end }}
{{ if and (eq .Values.helm.policy.source.kind "controlplane") (eq .Values.helm.policy.source.controlplane.auth.mode "bearerToken") (not .Values.helm.policy.source.controlplane.auth.existingSecret) .Values.helm.policy.source.controlplane.auth.bearerToken }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-policy-controlplane" (include "helm-firewall.fullname" .) }}
  labels:
    {{- include "helm-firewall.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.helm.policy.source.controlplane.auth.existingSecretKey }}: {{ .Values.helm.policy.source.controlplane.auth.bearerToken | b64enc | quote }}
{{- end }}
