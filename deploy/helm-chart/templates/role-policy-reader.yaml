{{- if eq .Values.helm.policy.source.kind "crd" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "helm-ai-kernel.fullname" . }}-policy-reader
  labels:
    {{- include "helm-ai-kernel.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - {{ .Values.helm.policy.source.crd.apiGroup | quote }}
    resources:
      - helmpolicybundles
    verbs:
      - get
      - list
      - watch
  {{- if .Values.helm.policy.source.crd.allowedConfigMapNames }}
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      {{- range .Values.helm.policy.source.crd.allowedConfigMapNames }}
      - {{ . | quote }}
      {{- end }}
    verbs:
      - get
  {{- end }}
  {{- if .Values.helm.policy.source.crd.allowedSecretNames }}
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      {{- range .Values.helm.policy.source.crd.allowedSecretNames }}
      - {{ . | quote }}
      {{- end }}
    verbs:
      - get
  {{- end }}
{{- end }}
