<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">HELM AI Kernel social preview</title>
  <desc id="desc">Social preview for HELM AI Kernel, the open-source execution firewall for MCP and AI agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07090d"/>
      <stop offset="0.52" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#243044" stroke-width="1" opacity="0.36"/>
    </pattern>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#38bdf8"/>
    </marker>
    <style>
      .sans { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .label { font-size: 18px; font-weight: 750; letter-spacing: 1.6px; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.75"/>
  <circle cx="1120" cy="96" r="190" fill="#164e63" opacity="0.16"/>
  <circle cx="102" cy="562" r="210" fill="#7f1d1d" opacity="0.14"/>

  <g transform="translate(78 70)">
    <rect x="0" y="0" width="8" height="118" fill="#ef4444"/>
    <rect x="14" y="0" width="8" height="118" fill="#f59e0b"/>
    <rect x="28" y="0" width="8" height="118" fill="#22c55e"/>
    <text x="58" y="24" class="sans label" fill="#38bdf8">HELM AI Kernel</text>
    <text x="58" y="94" class="sans" fill="#f8fafc" font-size="62" font-weight="820">Execution firewall</text>
    <text x="58" y="164" class="sans" fill="#f8fafc" font-size="62" font-weight="820">for MCP and AI agents</text>
    <text x="60" y="222" class="sans" fill="#cbd5e1" font-size="30">Quarantine tools. Sign receipts. Verify offline.</text>

    <g transform="translate(60 282)">
      <rect x="0" y="0" width="190" height="60" rx="16" fill="#2a1215" stroke="#ef4444"/>
      <text x="24" y="38" class="mono" fill="#fecaca" font-size="23">DENY unknown</text>
      <rect x="214" y="0" width="182" height="60" rx="16" fill="#0f2418" stroke="#22c55e"/>
      <text x="238" y="38" class="mono" fill="#bbf7d0" font-size="23">ALLOW pinned</text>
      <rect x="420" y="0" width="162" height="60" rx="16" fill="#261c10" stroke="#f59e0b"/>
      <text x="444" y="38" class="mono" fill="#fde68a" font-size="23">FAIL tamper</text>
    </g>
  </g>

  <g transform="translate(788 306)" filter="url(#shadow)">
    <rect x="0" y="0" width="382" height="212" rx="24" fill="#0e1624" stroke="#334155"/>
    <text x="34" y="56" class="sans label" fill="#94a3b8">Proof path</text>
    <text x="34" y="104" class="mono" fill="#f8fafc" font-size="24">tool call</text>
    <path d="M182 95H322" stroke="#38bdf8" stroke-width="3.5" marker-end="url(#arrow)"/>
    <text x="34" y="150" class="mono" fill="#f87171" font-size="24">DENY before dispatch</text>
    <text x="34" y="196" class="mono" fill="#22c55e" font-size="24">signed receipt OK</text>
    <rect x="328" y="70" width="32" height="112" rx="16" fill="#172033" stroke="#38bdf8"/>
  </g>

  <text x="80" y="584" class="sans" fill="#94a3b8" font-size="24">github.com/Mindburn-Labs/helm-ai-kernel</text>
</svg>
