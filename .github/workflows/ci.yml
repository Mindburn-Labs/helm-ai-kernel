name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  quality-pr:
    name: Quality PR profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install presentation hygiene dependency
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep
          rg --version
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.12"
          cache-dependency-path: "**/go.sum"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ github.token }}
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          github_token: ${{ github.token }}
      - name: Install oasdiff (contract breaking-change gate — HELM-151)
        run: |
          set -euo pipefail
          # Prebuilt binary — oasdiff's module needs Go >= 1.26 and CI pins
          # GOTOOLCHAIN=local on Go 1.25, so `go install` cannot build it.
          ver=1.23.0
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/oasdiff/oasdiff/releases/download/v${ver}/oasdiff_${ver}_linux_amd64.tar.gz" \
            | tar -xz -C "$tmp"
          mkdir -p "$HOME/.local/bin"
          install -m 0755 "$tmp/oasdiff" "$HOME/.local/bin/oasdiff"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/oasdiff" --version
      - name: Run Make-first PR quality profile
        env:
          # `contract:breaking-approved` label downgrades a contract break to a
          # visible warning (HELM-151 GATE 1 override).
          CONTRACT_BREAKING_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'contract:breaking-approved') && '1' || '0' }}
        run: make quality-pr

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install presentation hygiene dependency
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep
          rg --version
      - name: Presentation hygiene
        run: make verify-presentation
      - name: Check for unfinished markers in retained public files
        run: |
          set -euo pipefail
          MARKER_A='TO''DO'
          MARKER_B='FIX''ME'
          MARKER_C='WI''P'
          MARKER_D='coming ''soon'
          PATTERN="${MARKER_A}|${MARKER_B}|${MARKER_C}|${MARKER_D}"
          set +e
          rg -n --hidden -S "$PATTERN" \
            README.md docs .github core sdk deploy tests scripts \
            --glob '!**/node_modules/**' \
            --glob '!**/dist/**' \
            --glob '!**/build/**' \
            --glob '!**/target/**' \
            --glob '!sdk/python/helm_sdk/types_gen.py' \
            --glob '!sdk/python/helm_sdk/generated/**' \
            --glob '!scripts/check_documentation_*.py' \
            --glob '!scripts/sdk/gen.sh' \
            --glob '!core/pkg/buildguard/verify.go' \
            --glob '!core/pkg/crypto/canonical_hardening_test.go'
          marker_status=$?
          set -e
          case "$marker_status" in
            0)
              echo "unfinished marker check failed" >&2
              exit 1
              ;;
            1)
              ;;
            *)
              echo "unfinished marker search failed (rg exited $marker_status)" >&2
              exit "$marker_status"
              ;;
          esac

  kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.12"
          cache-dependency-path: "**/go.sum"
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ github.token }}
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          github_token: ${{ github.token }}
      - name: Lint
        run: make lint
      - name: ProofGraph signature write guard
        run: bash scripts/ci/check_proofgraph_signature_writes.sh
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Independent Go module tests
        run: bash scripts/ci/go_module_tests.sh
      - name: Command tests
        run: go test ./core/cmd/helm-ai-kernel -count=1
      - name: Launchpad promotion drift
        run: make launchpad-promotion-check
      - name: Fetch main ref for proto compatibility checks
        run: |
          if [ "$(git symbolic-ref --short -q HEAD || true)" = "main" ]; then
            echo "On main; local refs/heads/main is already HEAD — nothing to fetch."
          else
            git fetch origin main:refs/heads/main --force
          fi
      - name: Proto lint
        run: make proto-lint
      - name: Proto breaking
        run: make proto-breaking
      - name: Verify fixtures
        run: make verify-fixtures
      - name: TEE collateral fixtures
        run: make tee-collateral-verify
      - name: Release TEE mock attestation guard
        run: bash scripts/ci/check_release_no_mock_tee.sh
      - name: Boundary registry drift
        run: make verify-boundary
      - name: Crucible
        run: make crucible
      - name: Benchmark report
        run: make bench-report

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Test Python SDK
        run: make test-sdk-py

  ts-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - name: Test TypeScript SDK
        run: make test-sdk-ts

  rust-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Test Rust SDK
        run: make test-sdk-rust

  java-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Test Java SDK
        run: make test-sdk-java

  sdk-drift:
    name: SDK regenerate-and-diff gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.12"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Manifest unit tests
        run: make test-sdk-manifest
      - name: Regenerate SDKs and fail on drift
        run: make sdk-gen-check

  contract-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.12"
          cache-dependency-path: "**/go.sum"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: "34.1"
          repo-token: ${{ github.token }}
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          github_token: ${{ github.token }}
      - name: Fetch main ref for proto compatibility checks
        run: |
          if [ "$(git symbolic-ref --short -q HEAD || true)" = "main" ]; then
            echo "On main; local refs/heads/main is already HEAD — nothing to fetch."
          else
            git fetch origin main:refs/heads/main --force
          fi
      - name: Install codegen tools
        run: |
          python -m pip install --require-hashes -r .github/codegen-requirements.txt
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.0
      - name: Verify generated contracts
        run: make codegen-check
      - name: Verify OpenAPI SDK contract drift
        run: make sdk-openapi-check
      - name: Verify protobuf compatibility
        run: make proto-lint proto-breaking

  deployment-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.12"
          cache-dependency-path: "**/go.sum"
      - name: Docker, Compose, and chart smoke
        run: |
          make docker-smoke
          make compose-smoke
          make helm-chart-smoke

  kind-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.12"
          cache-dependency-path: "**/go.sum"
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: helm-ai-kernel-smoke
      - name: kind install smoke
        run: make kind-smoke

  release-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.12"
          cache-dependency-path: "**/go.sum"
      - name: Reproducibility, SBOM, and VEX smoke
        run: make release-smoke
