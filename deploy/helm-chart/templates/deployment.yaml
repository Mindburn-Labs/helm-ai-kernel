{{/* quantum_posture: chart wiring supplies a raw Ed25519 command-key keyring;
      it does not claim hybrid or post-quantum command signing. */}}
{{- if not (or (eq .Values.helm.policy.source.kind "controlplane") (eq .Values.helm.policy.source.kind "crd") (eq .Values.helm.policy.source.kind "mountedFile")) -}}
{{- fail "helm.policy.source.kind must be one of controlplane, crd, mountedFile" -}}
{{- end -}}
{{- if and .Values.helm.production (eq .Values.helm.policy.source.kind "controlplane") (not .Values.helm.policy.source.controlplane.url) -}}
{{- fail "helm.production=true with helm.policy.source.kind=controlplane requires helm.policy.source.controlplane.url" -}}
{{- end -}}
{{- if and .Values.helm.production (eq .Values.helm.policy.source.kind "controlplane") (eq .Values.helm.policy.source.controlplane.auth.mode "bearerToken") (not (or .Values.helm.policy.source.controlplane.auth.bearerToken .Values.helm.policy.source.controlplane.auth.existingSecret)) -}}
{{- fail "helm.production=true with controlplane bearerToken auth requires helm.policy.source.controlplane.auth.bearerToken or existingSecret" -}}
{{- end -}}
{{- if and .Values.helm.policy.signature.publicKey (not (regexMatch "^[0-9a-fA-F]{64}$" .Values.helm.policy.signature.publicKey)) -}}
{{- fail "helm.policy.signature.publicKey must be a 64-character hex Ed25519 public key" -}}
{{- end -}}
{{- if and .Values.helm.policy.signature.required (not (or .Values.helm.policy.signature.publicKey .Values.helm.policy.signature.existingSecret)) -}}
{{- fail "helm.policy.signature.required=true requires helm.policy.signature.publicKey or helm.policy.signature.existingSecret" -}}
{{- end -}}
{{- if and .Values.helm.production (eq .Values.helm.policy.source.kind "controlplane") (not .Values.helm.policy.signature.required) -}}
{{- fail "helm.production=true with helm.policy.source.kind=controlplane requires helm.policy.signature.required=true" -}}
{{- end -}}
{{- if and .Values.helm.production (not .Values.helm.policy.agentSafety.baseline.enabled) -}}
{{- fail "helm.production=true requires helm.policy.agentSafety.baseline.enabled=true" -}}
{{- end -}}
{{- if and .Values.helm.production (or (not .Values.helm.policy.agentSafety.denyUnknownTools) (not .Values.helm.policy.agentSafety.denyUnknownEgress) (not .Values.helm.policy.agentSafety.requireManifestValidation) (not .Values.helm.policy.agentSafety.requireOutputContractValidation) (not .Values.helm.policy.agentSafety.requireApprovedArgBinding) (not .Values.helm.policy.agentSafety.lksMemoryInfluenceOnly) (not .Values.helm.policy.agentSafety.requireA2ASignatures) (not .Values.helm.policy.agentSafety.enforceSafeDepGates) (not .Values.helm.policy.agentSafety.enforceBudgetCircuitBreakers) (not .Values.helm.policy.agentSafety.failClosedOnMissingContext)) -}}
{{- fail "helm.production=true requires all helm.policy.agentSafety fail-closed guards enabled" -}}
{{- end -}}
{{- if and .Values.helm.production (eq .Values.helm.storage.type "postgres") (not .Values.helm.storage.postgres.existingSecret) -}}
{{- fail "helm.production=true with helm.storage.type=postgres requires helm.storage.postgres.existingSecret; inline database credentials are not rendered into Deployments" -}}
{{- end -}}
{{- if and .Values.helm.production (eq .Values.helm.storage.type "postgres") .Values.postgresql.enabled -}}
{{- fail "helm.production=true with helm.storage.type=postgres does not support the bundled postgresql subchart; provide an external TLS DATABASE_URL via helm.storage.postgres.existingSecret" -}}
{{- end -}}
{{- if and .Values.helm.production (eq .Values.helm.storage.type "postgres") (not (or (eq .Values.helm.storage.postgres.sslMode "require") (eq .Values.helm.storage.postgres.sslMode "verify-ca") (eq .Values.helm.storage.postgres.sslMode "verify-full"))) -}}
{{- fail "helm.production=true with helm.storage.type=postgres requires helm.storage.postgres.sslMode=require, verify-ca, or verify-full" -}}
{{- end -}}
{{- if and .Values.helm.production (not .Values.helm.auth.tenantID) -}}
{{- fail "helm.production=true requires helm.auth.tenantID so tenant-scoped runtime routes are server-bound" -}}
{{- end -}}
{{- if and .Values.helm.production (not .Values.helm.auth.principalID) -}}
{{- fail "helm.production=true requires helm.auth.principalID so tenant-scoped runtime routes are server-bound" -}}
{{- end -}}
{{- if and .Values.helm.emergencyStop.enabled (not .Values.helm.auth.workspaceID) -}}
{{- fail "helm.emergencyStop.enabled=true requires helm.auth.workspaceID so scoped dispatches are server-bound" -}}
{{- end -}}
{{- if and .Values.helm.emergencyStop.enabled (not .Values.helm.emergencyStop.audience) -}}
{{- fail "helm.emergencyStop.enabled=true requires helm.emergencyStop.audience" -}}
{{- end -}}
{{- if and .Values.helm.emergencyStop.enabled (not (or .Values.helm.emergencyStop.commandPublicKeys .Values.helm.emergencyStop.existingSecret)) -}}
{{- fail "helm.emergencyStop.enabled=true requires helm.emergencyStop.commandPublicKeys or helm.emergencyStop.existingSecret" -}}
{{- end -}}
{{- if not (regexMatch "^.+@sha256:[0-9a-f]{64}$" .Values.runtimeInit.image) -}}
{{- fail "runtimeInit.image must be pinned by immutable sha256 digest" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm-ai-kernel.fullname" . }}
  labels:
    {{- include "helm-ai-kernel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "helm-ai-kernel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "helm-ai-kernel.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "helm-ai-kernel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: prepare-authority-state
          image: {{ .Values.runtimeInit.image | quote }}
          imagePullPolicy: {{ .Values.runtimeInit.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
          command:
            - /bin/sh
            - -ec
          args:
            - |
              set -eu
              umask 077
              data_dir="$HELM_AUTHORITY_DATA_DIR"
              root_key="$data_dir/root.key"
              source_key="/var/run/helm-signing-key/root.key"
              runtime_uid="$HELM_AUTHORITY_RUNTIME_UID"
              runtime_gid="$HELM_AUTHORITY_RUNTIME_GID"

              if [ ! -r "$source_key" ]; then
                echo "authority signing Secret is not readable" >&2
                exit 1
              fi

              mkdir -p "$data_dir"
              chown "$runtime_uid:$runtime_gid" "$data_dir"
              chmod 0700 "$data_dir"

              if [ -L "$root_key" ]; then
                echo "refusing symlinked durable authority root key" >&2
                exit 1
              fi
              if [ -e "$root_key" ] && [ ! -f "$root_key" ]; then
                echo "durable authority root key is not a regular file" >&2
                exit 1
              fi

              if [ -f "$root_key" ]; then
                if ! cmp -s "$source_key" "$root_key"; then
                  echo "durable authority root key differs from signing Secret; refusing silent rotation" >&2
                  exit 1
                fi
                chown "$runtime_uid:$runtime_gid" "$root_key"
                chmod 0600 "$root_key"
              else
                tmp_key="$data_dir/.root.key.init.$$"
                rm -f "$tmp_key"
                cp "$source_key" "$tmp_key"
                chown "$runtime_uid:$runtime_gid" "$tmp_key"
                chmod 0600 "$tmp_key"
                mv -f "$tmp_key" "$root_key"
              fi
          env:
            - name: HELM_AUTHORITY_DATA_DIR
              value: {{ .Values.helm.dataDir | quote }}
            - name: HELM_AUTHORITY_RUNTIME_UID
              value: {{ required "podSecurityContext.runAsUser is required for authority-state initialization" .Values.podSecurityContext.runAsUser | quote }}
            - name: HELM_AUTHORITY_RUNTIME_GID
              value: {{ required "podSecurityContext.runAsGroup is required for authority-state initialization" .Values.podSecurityContext.runAsGroup | quote }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.helm.dataDir | quote }}
            - name: signing-key
              mountPath: /var/run/helm-signing-key
              readOnly: true
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "helm-ai-kernel.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --policy
            - {{ include "helm-ai-kernel.policyPath" . | quote }}
            - --addr
            - {{ .Values.helm.bindAddr | quote }}
            - --port
            - {{ .Values.service.port | quote }}
            - --data-dir
            - {{ .Values.helm.dataDir | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
            {{- if .Values.helm.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
            {{- end }}
          env:
            - name: HELM_DATA_DIR
              value: {{ .Values.helm.dataDir | quote }}
            - name: HELM_HEALTH_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: HELM_METRICS_ENABLED
              value: {{ ternary "1" "0" .Values.helm.metrics.enabled | quote }}
            - name: HELM_METRICS_PORT
              value: {{ .Values.service.metricsPort | quote }}
            - name: HELM_LIMIT_GLOBAL_RPS
              value: {{ .Values.helm.limits.global.rps | quote }}
            - name: HELM_LIMIT_GLOBAL_BURST
              value: {{ .Values.helm.limits.global.burst | quote }}
            - name: HELM_LIMIT_ACTOR_RPS
              value: {{ .Values.helm.limits.actor.rps | quote }}
            - name: HELM_LIMIT_ACTOR_BURST
              value: {{ .Values.helm.limits.actor.burst | quote }}
            - name: HELM_CONCURRENCY_MAX
              value: {{ .Values.helm.limits.concurrency.max | quote }}
            - name: HELM_LOAD_SHED_ENABLED
              value: {{ ternary "1" "0" .Values.helm.limits.loadShed.enabled | quote }}
            - name: HELM_LOAD_SHED_LOW_PRIORITY_MAX
              value: {{ .Values.helm.limits.loadShed.lowPriorityMax | quote }}
            - name: HELM_POLICY_SOURCE_KIND
              value: {{ .Values.helm.policy.source.kind | quote }}
            - name: HELM_POLICY_POLL_INTERVAL
              value: {{ .Values.helm.policy.source.pollInterval | quote }}
            - name: HELM_POLICY_INITIAL_RECONCILE_TIMEOUT
              value: {{ .Values.helm.policy.source.initialReconcileTimeout | quote }}
            - name: HELM_POLICY_RELOAD_ENDPOINT
              value: {{ .Values.helm.policy.reloadHints.httpWakeEndpoint | quote }}
            - name: HELM_POLICY_SIGNATURE_REQUIRED
              value: {{ ternary "1" "0" .Values.helm.policy.signature.required | quote }}
            - name: HELM_AGENT_SAFETY_BASELINE_ENABLED
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.baseline.enabled | quote }}
            - name: HELM_AGENT_SAFETY_BASELINE_BUNDLE_ID
              value: {{ .Values.helm.policy.agentSafety.baseline.bundleID | quote }}
            - name: HELM_AGENT_SAFETY_DENY_UNKNOWN_TOOLS
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.denyUnknownTools | quote }}
            - name: HELM_AGENT_SAFETY_DENY_UNKNOWN_EGRESS
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.denyUnknownEgress | quote }}
            - name: HELM_AGENT_SAFETY_REQUIRE_MANIFEST_VALIDATION
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.requireManifestValidation | quote }}
            - name: HELM_AGENT_SAFETY_REQUIRE_OUTPUT_CONTRACT_VALIDATION
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.requireOutputContractValidation | quote }}
            - name: HELM_AGENT_SAFETY_REQUIRE_APPROVED_ARG_BINDING
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.requireApprovedArgBinding | quote }}
            - name: HELM_AGENT_SAFETY_LKS_INFLUENCE_ONLY
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.lksMemoryInfluenceOnly | quote }}
            - name: HELM_AGENT_SAFETY_REQUIRE_A2A_SIGNATURES
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.requireA2ASignatures | quote }}
            - name: HELM_AGENT_SAFETY_ENFORCE_SAFEDEP_GATES
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.enforceSafeDepGates | quote }}
            - name: HELM_AGENT_SAFETY_ENFORCE_BUDGET_CIRCUIT_BREAKERS
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.enforceBudgetCircuitBreakers | quote }}
            - name: HELM_AGENT_SAFETY_FAIL_CLOSED_ON_MISSING_CONTEXT
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.failClosedOnMissingContext | quote }}
            - name: HELM_AGENT_SAFETY_SHADOW_MODE_OBSERVES_ONLY
              value: {{ ternary "1" "0" .Values.helm.policy.agentSafety.shadowModeObservesOnly | quote }}
            {{- if or .Values.helm.policy.signature.publicKey .Values.helm.policy.signature.existingSecret }}
            - name: HELM_POLICY_TRUST_PUBLIC_KEY
              {{- if .Values.helm.policy.signature.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.helm.policy.signature.existingSecret }}
                  key: {{ .Values.helm.policy.signature.existingSecretKey }}
              {{- else }}
              value: {{ .Values.helm.policy.signature.publicKey | quote }}
              {{- end }}
            {{- end }}
            {{- if eq .Values.helm.policy.source.kind "controlplane" }}
            - name: HELM_POLICY_CONTROLPLANE_URL
              value: {{ .Values.helm.policy.source.controlplane.url | quote }}
            - name: HELM_POLICY_CONTROLPLANE_AUTH_MODE
              value: {{ .Values.helm.policy.source.controlplane.auth.mode | quote }}
            {{- if or .Values.helm.policy.source.controlplane.auth.bearerToken .Values.helm.policy.source.controlplane.auth.existingSecret }}
            - name: HELM_POLICY_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-policy-controlplane" (include "helm-ai-kernel.fullname" .)) .Values.helm.policy.source.controlplane.auth.existingSecret }}
                  key: {{ .Values.helm.policy.source.controlplane.auth.existingSecretKey }}
            {{- end }}
            {{- end }}
            {{- if eq .Values.helm.policy.source.kind "crd" }}
            - name: HELM_POLICY_CRD_API_GROUP
              value: {{ .Values.helm.policy.source.crd.apiGroup | quote }}
            - name: HELM_POLICY_CRD_RESOURCE
              value: {{ .Values.helm.policy.source.crd.resource | quote }}
            {{- end }}
            - name: HELM_PRODUCTION
              value: {{ ternary "1" "0" .Values.helm.production | quote }}
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: HELM_REGION
              value: {{ .Values.helm.region | quote }}
            {{- if .Values.helm.proxy.enabled }}
            - name: HELM_ENABLE_OPENAI_PROXY
              value: "1"
            - name: HELM_UPSTREAM_URL
              value: {{ .Values.helm.proxy.upstream | quote }}
            {{- end }}
            {{- if .Values.helm.demoMode }}
            - name: HELM_DEMO_MODE
              value: "1"
            {{- end }}
            - name: HELM_SIGNING_ALGORITHM
              value: {{ .Values.helm.signing.algorithm | quote }}
            - name: EVIDENCE_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm-ai-kernel.signingSecretName" . }}
                  key: signing-key
            {{- if or .Values.helm.auth.existingSecret .Values.helm.auth.adminAPIKey }}
            - name: HELM_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm-ai-kernel.authSecretName" . }}
                  key: {{ .Values.helm.auth.adminAPIKeySecretKey }}
            {{- end }}
            {{- if or .Values.helm.auth.existingSecret .Values.helm.auth.serviceAPIKey }}
            - name: HELM_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm-ai-kernel.authSecretName" . }}
                  key: {{ .Values.helm.auth.serviceAPIKeySecretKey }}
            {{- end }}
            - name: HELM_RUNTIME_TENANT_ID
              value: {{ .Values.helm.auth.tenantID | quote }}
            - name: HELM_RUNTIME_PRINCIPAL_ID
              value: {{ .Values.helm.auth.principalID | quote }}
            - name: HELM_RUNTIME_WORKSPACE_ID
              value: {{ .Values.helm.auth.workspaceID | quote }}
            - name: HELM_EMERGENCY_STOP_FENCE_ENABLED
              value: {{ ternary "1" "0" .Values.helm.emergencyStop.enabled | quote }}
            {{- if .Values.helm.emergencyStop.enabled }}
            - name: HELM_EMERGENCY_STOP_COMMAND_AUDIENCE
              value: {{ required "helm.emergencyStop.audience is required when the scoped emergency-stop fence is enabled" .Values.helm.emergencyStop.audience | quote }}
            - name: HELM_EMERGENCY_STOP_COMMAND_PUBLIC_KEYS
              {{- if .Values.helm.emergencyStop.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.helm.emergencyStop.existingSecret }}
                  key: {{ .Values.helm.emergencyStop.commandPublicKeysSecretKey }}
              {{- else }}
              value: {{ required "helm.emergencyStop.commandPublicKeys or helm.emergencyStop.existingSecret is required when the scoped emergency-stop fence is enabled" .Values.helm.emergencyStop.commandPublicKeys | quote }}
              {{- end }}
            {{- end }}
            {{- if eq .Values.helm.storage.type "postgres" }}
            - name: HELM_DB_MAX_OPEN_CONNS
              value: {{ .Values.helm.storage.postgres.maxOpenConns | quote }}
            - name: HELM_DB_MAX_IDLE_CONNS
              value: {{ .Values.helm.storage.postgres.maxIdleConns | quote }}
            - name: HELM_DB_CONN_MAX_LIFETIME
              value: {{ .Values.helm.storage.postgres.connMaxLifetime | quote }}
            {{- if .Values.helm.storage.postgres.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.helm.storage.postgres.existingSecret }}
                  key: {{ .Values.helm.storage.postgres.existingSecretKey }}
            {{- else if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "helm-ai-kernel.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?sslmode={{ .Values.helm.storage.postgres.sslMode }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm-ai-kernel.fullname" . }}-postgresql
                  key: password
            {{- else }}
            - name: DATABASE_URL
              value: {{ include "helm-ai-kernel.databaseURL" . | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.helm.dataDir }}
            - name: policy
              mountPath: {{ include "helm-ai-kernel.policyMountPath" . }}
              readOnly: true
            - name: tmp
              mountPath: /tmp
        {{- if and .Values.helm.policy.reloadHints.enabled .Values.helm.policy.reloadHints.configReloaderSidecar.enabled }}
        - name: config-reloader
          image: {{ .Values.helm.policy.reloadHints.configReloaderSidecar.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - --volume-dir={{ include "helm-ai-kernel.policyMountPath" . }}
            - --webhook-url=http://127.0.0.1:{{ .Values.service.port }}{{ .Values.helm.policy.reloadHints.httpWakeEndpoint }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: policy
              mountPath: {{ include "helm-ai-kernel.policyMountPath" . }}
              readOnly: true
        {{- end }}
      volumes:
        - name: data
          {{ if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "helm-ai-kernel.pvcName" . }}
          {{ else }}
          emptyDir: {}
          {{ end }}
        - name: signing-key
          secret:
            secretName: {{ include "helm-ai-kernel.signingSecretName" . }}
            defaultMode: 256
            items:
              - key: signing-key
                path: root.key
        - name: policy
          {{- if .Values.helm.policy.source.mountedFile.existingSecret }}
          secret:
            secretName: {{ include "helm-ai-kernel.policySecretName" . }}
          {{- else }}
          configMap:
            name: {{ include "helm-ai-kernel.policyConfigMapName" . }}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
