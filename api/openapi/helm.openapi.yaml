          additionalProperties: true
        budget_id:
          type: string
          description: Optional budget to charge against

    GovernanceDecision:
      type: object
      description: PDP decision for an effect
      required: [verdict, decision_id, effect_id]
      properties:
        decision_id:
          type: string
        effect_id:
          type: string
        verdict:
          type: string
          enum: [ALLOW, DENY, ESCALATE]
        reason_code:
          type: ['string', 'null']
          description: "Null for ALLOW. Registered code from reason-codes-v1.json for DENY/ESCALATE."
        receipt:
          $ref: '#/components/schemas/Receipt'
        active_packs:
          type: array
          items: { type: string }
          description: Names of policy bundles active during evaluation

    EffectBoundary:
      type: object
      description: The boundary contract for submitting effects to the kernel
      required: [effect, principal]
      properties:
        effect:
          $ref: '#/components/schemas/Effect'
        principal:
          type: string
          description: "Agent/user identity (e.g. agent:analyst)"
        context:
          type: object
          description: Additional context (jurisdiction, industry, budget state)
          additionalProperties: true

    PDPRequest:
      type: object
      description: Request to the Policy Decision Point
      required: [boundary]
      properties:
        boundary:
          $ref: '#/components/schemas/EffectBoundary'

    PDPResponse:
      type: object
      description: Response from the Policy Decision Point
      required: [decision]
      properties:
        decision:
          $ref: '#/components/schemas/GovernanceDecision'

    PolicyBundle:
      type: object
      description: A loaded policy bundle (jurisdiction, industry, or business pack)
      required: [name, version, content_hash]
      properties:
        name:
          type: string
        version:
          type: string
        content_hash:
          type: string
          description: SHA-256 of the bundle contents
        signature:
          type: ['string', 'null']
          description: Ed25519 signature over content_hash
        pack_type:
          type: string
          enum: [jurisdiction, industry, business, custom]

  # ── Responses ───────────────────────────────────────
  responses:
    HelmError:
      description: HELM error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HelmError'
          example:
            error:
              message: "Tool not found: unknown_tool"
              type: "invalid_request"
              code: "tool_not_found"
              reason_code: "DENY_TOOL_NOT_FOUND"
    IdempotencyConflict:
      description: Idempotency key was reused with a different request fingerprint
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/HelmError'
          example:
            type: "https://helm.mindburn.run/errors/409"
            title: "Idempotency key conflict"
            status: 409
            detail: "IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_REQUEST"
    TooManyRequests:
      description: Request rejected by a rate limiter
      headers:
        Retry-After:
          schema: { type: string }
          description: Suggested retry delay in seconds.
        X-Helm-Limiter-Reason:
          schema:
            type: string
            enum: [GLOBAL_RATE_LIMIT_EXCEEDED, ENDPOINT_RATE_LIMIT_EXCEEDED, ACTOR_RESOURCE_RATE_LIMIT_EXCEEDED]
          description: Deterministic limiter reason code.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/HelmError'
    ServiceUnavailable:
      description: Request rejected by concurrency or load-shed guard
      headers:
        Retry-After:
          schema: { type: string }
          description: Suggested retry delay in seconds.
        X-Helm-Limiter-Reason:
          schema:
            type: string
            enum: [CONCURRENCY_LIMIT_EXCEEDED, LOW_PRIORITY_LOAD_SHED]
          description: Deterministic limiter reason code.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/HelmError'
