name: npm Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish. Must match VERSION.
        required: true
        type: string
      dry_run:
        description: Build and pack without publishing.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - path: sdk/ts
            name: "@mindburn/helm"
            version_policy: root
            test_command: "npm test -- --run"
            smoke_command: ""
          - path: packages/design-system-core
            name: "@helm/design-system-core"
            version_policy: package
            test_command: "npm test"
            smoke_command: "npm run smoke"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - name: Version checks
        working-directory: ${{ matrix.package.path }}
        run: |
          FILE_VERSION=$(cat ../../VERSION 2>/dev/null || cat ../VERSION)
          REQUESTED="${{ github.event.inputs.version }}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ matrix.package.version_policy }}" = "root" ]; then
            test "$REQUESTED" = "$FILE_VERSION"
          fi
          test "$PACKAGE_VERSION" = "$REQUESTED"
      - name: Install, test, and build
        working-directory: ${{ matrix.package.path }}
        run: |
          npm ci
          if npm run | grep -q ' typecheck'; then npm run typecheck; fi
          TEST_COMMAND='${{ matrix.package.test_command }}'
          if [ -n "$TEST_COMMAND" ]; then eval "$TEST_COMMAND"; fi
          if npm run | grep -q ' build'; then npm run build; fi
          SMOKE_COMMAND='${{ matrix.package.smoke_command }}'
          if [ -n "$SMOKE_COMMAND" ]; then eval "$SMOKE_COMMAND"; fi
          npm pack --dry-run
      - name: Publish
        if: github.event.inputs.dry_run != 'true'
        working-directory: ${{ matrix.package.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
