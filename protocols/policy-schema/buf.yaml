version: v2
modules:
  - path: v1
    name: buf.build/helm/policy
lint:
  use:
    - STANDARD
    - COMMENTS
  except:
    - COMMENT_FIELD
    - COMMENT_ENUM
    - COMMENT_ENUM_VALUE
    - COMMENT_MESSAGE
    - COMMENT_ONEOF
    - DIRECTORY_SAME_PACKAGE
    - ENUM_VALUE_PREFIX
    - IMPORT_USED
    - PACKAGE_DIRECTORY_MATCH
    - PACKAGE_SAME_DIRECTORY
    - PACKAGE_VERSION_SUFFIX
  enum_zero_value_suffix: _UNSPECIFIED
breaking:
  use:
    - WIRE
    - WIRE_JSON
  # Enforce additive-only in v1/ — no field removals, no renames
  # experimental/ is excluded from breaking checks
  except: []
