name: TLA Specs

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  model-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Download TLC
        id: tlc
        env:
          TLA_TOOLS_VERSION: v1.8.0
          TLA_TOOLS_SHA256: 237332bdcc79a35c7d26efa7b82c77c85c2744591c5598673a8a45085ff2a4fb
        run: echo "jar=$(bash scripts/tla/download-tools.sh)" >> "$GITHUB_OUTPUT"
      - name: Guardian pipeline spec
        run: java -cp "${{ steps.tlc.outputs.jar }}" tlc2.TLC -deadlock -config proofs/guardian.cfg proofs/GuardianPipeline.tla
      - name: Safe Deprecation Mode spec
        run: java -cp "${{ steps.tlc.outputs.jar }}" tlc2.TLC -deadlock -config proofs/safe_deprecation.cfg proofs/SafeDeprecationMode.tla
      - name: Protocol kernel spec
        run: java -cp "${{ steps.tlc.outputs.jar }}" tlc2.TLC -deadlock -config protocols/specs/tla/HelmKernel.cfg protocols/specs/tla/HelmKernel.tla
