# ArtifactHub package metadata for the helm-ai-kernel chart.
# Lives alongside Chart.yaml so `helm package` ships it inside the chart .tgz;
# ArtifactHub reads it from the OCI artifact on every scan and uses it to
# populate the chart page (display name, changelog, container images, links).
# Schema reference: https://artifacthub.io/docs/topics/repositories/helm-charts/
version: 0.5.3
appVersion: v0.5.3
name: helm-ai-kernel
displayName: HELM AI Kernel
createdAt: "2026-05-19T00:00:00Z"
description: |
  Fail-closed AI execution firewall with cryptographic governance proofs.

  The HELM AI Kernel is a Go execution boundary for autonomous agents and
  LLM-driven workflows. Every tool call, network egress, and data access
  passes through a Policy Enforcement Point that emits ed25519-signed
  receipts and feeds an append-only ProofGraph; an exportable EvidencePack
  captures policy version, lamport-ordered receipts, and the runtime
  posture for downstream auditors.
license: Apache-2.0
homeURL: https://github.com/Mindburn-Labs/helm-ai-kernel
keywords:
  - ai
  - governance
  - firewall
  - agent
  - security
  - compliance
  - policy
  - audit
  - proofgraph
  - evidence-pack
  - kubernetes
