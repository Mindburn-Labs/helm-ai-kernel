name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write   # Cosign keyless OIDC
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          version: "34.1"
      - name: Install codegen tools
        run: |
          python -m pip install --require-hashes -r .github/requirements/codegen.txt
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.0
      - name: Build and test retained surfaces
        run: |
          make build
          make lint
          make test
          go test ./core/cmd/helm -count=1
          make test-sdk-go-standalone
          make test-sdk-py
          make test-sdk-ts
          make test-sdk-rust
          make test-sdk-java
          make test-design-system
          make test-console
          make verify-fixtures
          make docs-coverage
          make docs-truth
          make codegen-check
          make verify-boundary
          make bench-report

  deployment-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Docker, Compose, and chart smoke
        run: |
          make docker-smoke
          make compose-smoke
          make helm-chart-smoke

  kind-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: helm/kind-action@v1
        with:
          cluster_name: helm-oss-smoke
      - name: kind install smoke
        run: make kind-smoke

  release-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
      - name: Reproducibility, SBOM, and VEX smoke
        run: make release-smoke

  binaries:
    runs-on: ubuntu-latest
    needs: [validate, deployment-smoke, kind-smoke, release-smoke]
    outputs:
      binary-digest: ${{ steps.checksums.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
      - name: Build reproducible release binaries
        run: make release-binaries-reproducible
      - name: Build MCP bundle
        run: make mcp-pack
      - name: Generate SBOM
        run: make sbom
      - name: Generate VEX
        run: make vex
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            bin/helm-*
            bin/SHA256SUMS.txt
            dist/helm.mcpb
            sbom.json
            release/vex/*.openvex.json
      - name: Stage quickstart assets
        run: |
          mkdir -p dist
          cp release.high_risk.v3.toml dist/release.high_risk.v3.toml
      - id: checksums
        name: Aggregate digest set
        run: |
          cd bin && shasum -a 256 helm-* > SHA256SUMS.txt
          echo "digest=$(shasum -a 256 SHA256SUMS.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            bin/
            dist/helm.mcpb
            dist/release.high_risk.v3.toml
            sbom.json
            release/vex/

  cosign-binaries:
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Cosign keyless-sign every artifact
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cd dist
          for f in bin/helm-* bin/SHA256SUMS.txt dist/helm.mcpb sbom.json release/vex/v*.openvex.json; do
            [ -f "$f" ] || continue
            echo "::group::Signing $f"
            cosign sign-blob --yes --bundle "${f}.cosign.bundle" "$f"
            echo "::endgroup::"
          done
      - name: Verify cosign bundles
        run: bash scripts/release/verify_cosign.sh dist
      - uses: actions/upload-artifact@v4
        with:
          name: cosign-bundles
          path: dist/**/*.cosign.bundle

  reproducibility-check:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
      - name: First reproducible build
        run: |
          make release-binaries-reproducible
          mkdir -p /tmp/build1
          cp -r bin/helm-* bin/SHA256SUMS.txt /tmp/build1/
          shasum -a 256 /tmp/build1/helm-* | sed 's#.*/##' > /tmp/build1.sha256
      - name: Clean and second reproducible build
        run: |
          rm -f bin/helm-* bin/SHA256SUMS.txt
          make release-binaries-reproducible
          shasum -a 256 bin/helm-* | sed 's#.*/##' > /tmp/build2.sha256
      - name: Diff hashes (must be identical)
        run: |
          diff /tmp/build1.sha256 /tmp/build2.sha256 \
            || (echo "::error::Reproducibility check failed — binaries differ between builds" && exit 1)
          echo "Reproducible build confirmed"

  container:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      slim-digest: ${{ steps.push-slim.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: push
        name: Build and push main image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - id: push-slim
        name: Build and push slim image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.slim
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-slim

  cosign-container:
    runs-on: ubuntu-latest
    needs: container
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: sigstore/cosign-installer@v3
      - name: Sign main image keyless
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.container.outputs.image-digest }}"
      - name: Sign slim image keyless
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.container.outputs.slim-digest }}"

  benchmark-pin:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
      - name: Run benchmark report
        run: make bench-report
      - name: Pin per-release benchmark snapshot
        env:
          GIT_AUTHOR_NAME: helm-release-bot
          GIT_AUTHOR_EMAIL: release@mindburn.org
          GIT_COMMITTER_NAME: helm-release-bot
          GIT_COMMITTER_EMAIL: release@mindburn.org
        run: bash scripts/release/pin_benchmarks.sh "${GITHUB_REF_NAME}"

  homebrew:
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets/
      - name: Generate Homebrew formula
        run: |
          mkdir -p Formula
          ruby scripts/release/homebrew_formula.rb \
            --version "${GITHUB_REF_NAME#v}" \
            --checksums release-assets/bin/SHA256SUMS.txt \
            --repo Mindburn-Labs/helm-oss > Formula/helm.rb
      - name: Push formula to mindburn/homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not configured; skipping tap push."
            exit 0
          fi
          git config --global user.name "mindburn-release-bot"
          git config --global user.email "release@mindburn.org"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mindburn/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp Formula/helm.rb tap/Formula/helm.rb
          cd tap
          git add Formula/helm.rb
          git commit -m "Update helm formula to ${GITHUB_REF_NAME}" || exit 0
          git push origin HEAD:main

  github-release:
    runs-on: ubuntu-latest
    needs: [binaries, container, cosign-binaries, cosign-container, reproducibility-check, benchmark-pin, deployment-smoke, kind-smoke, release-smoke]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: cosign-bundles
          path: cosign/
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bin/*
            dist/dist/helm.mcpb
            dist/dist/release.high_risk.v3.toml
            dist/sbom.json
            dist/release/vex/*.openvex.json
            cosign/**/*.cosign.bundle
