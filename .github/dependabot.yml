version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /core
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /sdk/go
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /tests/conformance
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /sdk/python
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /sdk/ts
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /packages/mindburn-helm-cli
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /sdk/rust
    schedule:
      interval: weekly

  - package-ecosystem: maven
    directory: /sdk/java
    schedule:
      interval: weekly
