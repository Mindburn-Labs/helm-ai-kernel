name: Release

on:
  push:
    tags: ["v*"]

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: mindburn-labs/helm-ai-kernel

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: "**/go.sum"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: "34.1"
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
      - name: Fetch main ref for proto compatibility checks
        run: git fetch origin main:refs/heads/main
      - name: Install codegen tools
        run: |
          python -m pip install --require-hashes -r .github/codegen-requirements.txt
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.0
      - name: Build and test retained surfaces
        run: make quality-release

  deployment-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: "**/go.sum"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - name: Docker, Compose, and chart smoke
        run: |
          make docker-smoke
          make compose-smoke
          make helm-chart-smoke

  kind-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: "**/go.sum"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: helm-ai-kernel-smoke
      - name: kind install smoke
        run: make kind-smoke

  release-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: "**/go.sum"
      - name: Reproducibility, SBOM, and VEX smoke
        run: make release-smoke

  binaries:
    runs-on: ubuntu-latest
    needs: [validate, deployment-smoke, kind-smoke, release-smoke]
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    outputs:
      binary-digest: ${{ steps.checksums.outputs.digest }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: "**/go.sum"
      - name: Build and stage release assets
        run: make release-assets
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/release-assets/*
      - id: checksums
        name: Aggregate digest set
        run: |
          echo "digest=$(shasum -a 256 dist/release-assets/SHA256SUMS.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets
          path: dist/release-assets/

  cosign-binaries:
    runs-on: ubuntu-latest
    needs: binaries
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-assets
          path: release-assets/
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Cosign keyless-sign every artifact
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cd release-assets
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in
              *.cosign.bundle) continue ;;
            esac
            echo "::group::Signing $f"
            cosign sign-blob --yes --bundle "${f}.cosign.bundle" "$f"
            echo "::endgroup::"
          done
      - name: Verify cosign bundles
        run: bash scripts/release/verify_cosign.sh release-assets
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cosign-bundles
          path: release-assets/*.cosign.bundle

  reproducibility-check:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: "**/go.sum"
      - name: First reproducible build
        run: |
          make release-binaries-reproducible
          mkdir -p /tmp/build1
          cp -r bin/helm-ai-kernel-* bin/SHA256SUMS.txt /tmp/build1/
          shasum -a 256 /tmp/build1/helm-* | sed 's#.*/##' > /tmp/build1.sha256
      - name: Clean and second reproducible build
        run: |
          rm -f bin/helm-ai-kernel-* bin/SHA256SUMS.txt
          make release-binaries-reproducible
          shasum -a 256 bin/helm-ai-kernel-* | sed 's#.*/##' > /tmp/build2.sha256
      - name: Diff hashes (must be identical)
        run: |
          diff /tmp/build1.sha256 /tmp/build2.sha256 \
            || (echo "::error::Reproducibility check failed — binaries differ between builds" && exit 1)
          echo "Reproducible build confirmed"

  container:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write
      packages: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      slim-digest: ${{ steps.push-slim.outputs.digest }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - name: Build console assets for main image
        run: make build-console
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - id: build-meta
        name: Compute build metadata
        run: |
          # Strip the leading "v" from a tag ref so main.version stays semver.
          ref="${GITHUB_REF_NAME}"
          if [[ "${ref}" =~ ^v[0-9] ]]; then ref="${ref#v}"; fi
          {
            echo "version=${ref}"
            echo "commit=$(git rev-parse --short=12 HEAD)"
            echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "${GITHUB_OUTPUT}"
      - id: push
        name: Build and push main image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=${{ steps.build-meta.outputs.version }}
            BUILD_COMMIT=${{ steps.build-meta.outputs.commit }}
            BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - id: push-slim
        name: Build and push slim image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.slim
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=${{ steps.build-meta.outputs.version }}
            BUILD_COMMIT=${{ steps.build-meta.outputs.commit }}
            BUILD_TIME=${{ steps.build-meta.outputs.build_time }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-slim

  cosign-container:
    runs-on: ubuntu-latest
    needs: container
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign main image keyless
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.container.outputs.image-digest }}"
      - name: Sign slim image keyless
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.container.outputs.slim-digest }}"

  benchmark-pin:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: "**/go.sum"
      - name: Run benchmark report
        run: make bench-report
      - name: Pin per-release benchmark snapshot
        run: bash scripts/release/pin_benchmarks.sh "${GITHUB_REF_NAME}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-snapshot
          path: benchmarks/results/v*.json

  homebrew:
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-assets
          path: release-assets/
      - name: Stage Homebrew formula
        run: |
          mkdir -p Formula
          cp release-assets/helm-ai-kernel.rb Formula/helm-ai-kernel.rb
      - name: Push formula to mindburnlabs/homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not configured; skipping tap push."
            exit 0
          fi
          git config --global user.name "mindburn-release-bot"
          git config --global user.email "release@mindburn.org"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mindburnlabs/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp Formula/helm-ai-kernel.rb tap/Formula/helm-ai-kernel.rb
          cd tap
          git add Formula/helm-ai-kernel.rb
          git commit -m "Update helm-ai-kernel formula to ${GITHUB_REF_NAME}" || exit 0
          git push origin HEAD:main

  chart:
    runs-on: ubuntu-latest
    needs: [validate, deployment-smoke, kind-smoke, container, cosign-container]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4.3.1
        with:
          version: v3.15.4
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Package chart
        run: |
          mkdir -p dist/chart
          helm package deploy/helm-chart -d dist/chart
      - name: Push chart to ghcr.io
        run: |
          helm push dist/chart/helm-ai-kernel-*.tgz oci://ghcr.io/mindburn-labs/charts

  artifacthub-repo:
    runs-on: ubuntu-latest
    needs: chart
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: oras-project/setup-oras@8d34698a59f5ffe24821f0b48ab62a3de8b64b20 # v1.2.3
        with:
          version: 1.2.0
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Publish artifacthub-repo.yml as OCI artifact
        # ArtifactHub reads repository-level metadata (Verified Publisher UID,
        # owners) from an OCI artifact tagged :artifacthub.io that sits in the
        # same namespace as the chart, not from the file in the Git repo.
        # See https://artifacthub.io/docs/topics/repositories/helm-charts/
        run: |
          oras push \
            ghcr.io/mindburn-labs/charts/helm-ai-kernel:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

  github-release:
    runs-on: ubuntu-latest
    needs: [binaries, container, cosign-binaries, cosign-container, reproducibility-check, benchmark-pin, homebrew, chart, deployment-smoke, kind-smoke, release-smoke]
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-assets
          path: dist/
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cosign-bundles
          path: cosign/
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: benchmark-snapshot
          path: benchmarks-release/
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*
            cosign/**/*.cosign.bundle
            benchmarks-release/*.json
