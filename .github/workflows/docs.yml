name: Documentation Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs:
    name: Coverage and truth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run docs gates
        run: make docs-coverage docs-truth
