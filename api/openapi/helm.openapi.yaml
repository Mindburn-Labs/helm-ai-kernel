          $ref: '#/components/responses/HelmError'
        '403':
          $ref: '#/components/responses/HelmError'

  # ── Identity, Authorization, Approvals ─────────────
  /api/v1/identity/agents:
    get:
      operationId: listAgentIdentities
      tags: [identity]
      summary: List non-human identity profiles known to the boundary
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Agent identity profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentIdentityProfile'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/authz/health:
    get:
      operationId: getAuthzHealth
      tags: [identity]
      summary: Read ReBAC/PDP health
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Authorization health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzHealth'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/authz/check:
    post:
      operationId: checkAuthz
      tags: [identity]
      summary: Evaluate authorization and seal a relationship snapshot
      security:
        - AdminBearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Authorization snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzSnapshot'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/authz/snapshots:
    get:
      operationId: listAuthzSnapshots
      tags: [identity]
      summary: List sealed authorization snapshots
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Authorization snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuthzSnapshot'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/authz/snapshots/{snapshot_id}:
    get:
      operationId: getAuthzSnapshot
      tags: [identity]
      summary: Get a sealed authorization snapshot
      security:
        - AdminBearerAuth: []
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Authorization snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzSnapshot'
        '401':
          $ref: '#/components/responses/HelmError'
        '404':
          $ref: '#/components/responses/HelmError'

  /api/v1/approvals:
    get:
      operationId: listApprovalCeremonies
      tags: [identity]
      summary: List approval ceremonies
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Approval ceremonies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApprovalCeremony'
        '401':
          $ref: '#/components/responses/HelmError'
    post:
      operationId: createApprovalCeremony
      tags: [identity]
      summary: Create an approval ceremony
      security:
        - AdminBearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalCeremony'
      responses:
        '201':
          description: Approval ceremony
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalCeremony'
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/approvals/{approval_id}/webauthn/challenge:
    post:
      operationId: createApprovalWebAuthnChallenge
      tags: [identity]
      summary: Create a passkey/WebAuthn approval challenge
      security:
        - AdminBearerAuth: []
      parameters:
        - name: approval_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                method: { type: string, default: passkey }
                ttl_ms: { type: integer }
      responses:
        '201':
          description: Approval WebAuthn challenge
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/approvals/{approval_id}/webauthn/assert:
    post:
      operationId: assertApprovalWebAuthnChallenge
      tags: [identity]
      summary: Assert a passkey/WebAuthn approval challenge
      security:
        - AdminBearerAuth: []
      parameters:
        - name: approval_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [challenge_id, actor, assertion]
              properties:
                challenge_id: { type: string }
                actor: { type: string }
                assertion: { type: string }
                receipt_id: { type: string }
                reason: { type: string }
      responses:
        '200':
          description: Approval ceremony
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalCeremony'
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/approvals/{approval_id}/{action}:
    post:
      operationId: transitionApprovalCeremony
      tags: [identity]
      summary: Approve, deny, or revoke an approval ceremony
      security:
        - AdminBearerAuth: []
      parameters:
        - name: approval_id
          in: path
          required: true
          schema: { type: string }
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [approve, deny, revoke]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                actor: { type: string }
                receipt_id: { type: string }
                reason: { type: string }
      responses:
        '200':
          description: Approval ceremony
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalCeremony'
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/budgets:
    get:
      operationId: listBudgetCeilings
      tags: [identity]
      summary: List budget and velocity ceilings
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Budget ceilings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BudgetCeiling'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/budgets/{budget_id}:
    put:
      operationId: putBudgetCeiling
      tags: [identity]
      summary: Create or replace a budget ceiling
      security:
        - AdminBearerAuth: []
      parameters:
        - name: budget_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetCeiling'
      responses:
        '200':
          description: Budget ceiling
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetCeiling'
        '400':
          $ref: '#/components/responses/HelmError'
        '401':
          $ref: '#/components/responses/HelmError'

  # ── Telemetry and Coexistence ──────────────────────
  /api/v1/coexistence/capabilities:
    get:
      operationId: getCoexistenceCapabilities
      tags: [telemetry]
      summary: Read scanner/gateway coexistence capability manifest
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Coexistence capability manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoexistenceCapabilityManifest'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/telemetry/otel/config:
    get:
      operationId: getTelemetryOTelConfig
      tags: [telemetry]
      summary: Read non-authoritative OTel GenAI export configuration
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: OTel export configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryOTelConfig'
        '401':
          $ref: '#/components/responses/HelmError'

  /api/v1/telemetry/export:
    post:
      operationId: exportTelemetry
      tags: [telemetry]
      summary: Export a non-authoritative telemetry event
      security:
        - AdminBearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryExportRequest'
      responses:
        '202':
          description: Telemetry export result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryExportResult'
        '401':
          $ref: '#/components/responses/HelmError'

  # ── System ──────────────────────────────────────────
  /healthz:
    get:
      operationId: healthCheck
      tags: [system]
      summary: Health check
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  version: { type: string, example: "0.1.0" }

  /version:
    get:
      operationId: getVersion
      tags: [system]
      summary: Version information
      responses:
        '200':
          description: Version details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'
              example:
                version: "0.1.0"
                commit: "abc123"
                build_time: "2026-02-15T00:00:00Z"
                go_version: "go1.24.0"

components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HELM_ADMIN_API_KEY
      description: |
        Self-hosted OSS admin bearer key. Set HELM_ADMIN_API_KEY on the server
        and send Authorization: Bearer <key> for protected runtime APIs.

  # ── Schemas ─────────────────────────────────────────
  schemas:
    HelmError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type, code, reason_code]
          properties:
            message:
              type: string
              description: Human-readable error message
            type:
              type: string
              enum: [invalid_request, authentication_error, permission_denied, not_found, internal_error]
            code:
              type: string
              description: Machine-readable error code
            reason_code:
              type: string
              description: HELM-specific reason code
              enum:
                - DENY_TOOL_NOT_FOUND
                - DENY_SCHEMA_MISMATCH
                - DENY_OUTPUT_DRIFT
                - DENY_BUDGET_EXCEEDED
                - DENY_APPROVAL_REQUIRED
                - DENY_APPROVAL_TIMEOUT
                - DENY_SANDBOX_TRAP
                - DENY_GAS_EXHAUSTION
                - DENY_TIME_LIMIT
                - DENY_MEMORY_LIMIT
                - DENY_POLICY_VIOLATION
                - DENY_TRUST_KEY_REVOKED
                - DENY_IDEMPOTENCY_DUPLICATE
                - ERROR_INTERNAL
            details:
              type: object
              description: Additional error context
              additionalProperties: true

    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant, tool]
              content:
                type: string
              tool_call_id:
                type: string
        tools:
          type: array
          items:
            type: object
            properties:
              type: { type: string, enum: [function] }
              function:
                type: object
                properties:
                  name: { type: string }
                  description: { type: string }
                  parameters: { type: object }
        temperature:
          type: number
        max_tokens:
          type: integer
        stream:
          type: boolean
          default: false

    ChatCompletionResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string, default: "chat.completion" }
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              message:
                type: object
                properties:
                  role: { type: string }
                  content:
                    type: ['string', 'null']
                  tool_calls:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        type: { type: string }
                        function:
                          type: object
                          properties:
                            name: { type: string }
                            arguments: { type: string }
              finish_reason: { type: string }
        usage:
          type: object
          properties:
            prompt_tokens: { type: integer }
            completion_tokens: { type: integer }
            total_tokens: { type: integer }

    ApprovalRequest:
      type: object
      required: [intent_hash, signature_b64, public_key_b64]
      properties:
        intent_hash:
          type: string
          description: SHA-256 hash of the intent to approve
        signature_b64:
          type: string
          description: Base64-encoded Ed25519 signature
        public_key_b64:
          type: string
          description: Base64-encoded Ed25519 public key
        challenge_response:
          type: string
          description: Optional challenge/response for ceremony

    AddTrustKeyRequest:
      type: object
      required: [tenant_id, key_id, public_key]
      properties:
        tenant_id: { type: string }
        key_id: { type: string }
        public_key:
          type: string
          description: Hex-encoded Ed25519 public key

    RevokeTrustKeyRequest:
      type: object
      required: [tenant_id, key_id]
      properties:
        tenant_id: { type: string }
        key_id: { type: string }

    Receipt:
      type: object
      properties:
        receipt_id: { type: string }
        decision_id: { type: string }
        effect_id: { type: string }
        status: { type: string }
        reason_code: { type: string }
        output_hash: { type: string }
        blob_hash: { type: string }
        prev_hash: { type: string }
        lamport_clock: { type: integer }
        signature: { type: string }
        timestamp: { type: string, format: date-time }
        principal: { type: string }
        executor_id: { type: string }
        args_hash: { type: string }
        metadata:
          type: object
          additionalProperties: true

    ReceiptListResponse:
      type: object
      properties:
        receipts:
          type: array
          items:
            $ref: '#/components/schemas/Receipt'
        count: { type: integer }
        next_cursor: { type: string }
        has_more: { type: boolean }

    DecisionRequest:
      type: object
      required: [action, resource]
      properties:
        principal: { type: string }
        action: { type: string }
        resource: { type: string }
        context:
          type: object
          additionalProperties: true

    DecisionRecord:
      type: object
      properties:
        id: { type: string }
        action: { type: string }
        resource: { type: string }
        verdict: { type: string }
        reason: { type: string }
        policy_version: { type: string }
        policy_decision_hash: { type: string }
        signature: { type: string }

    ConsoleBootstrap:
      type: object
      required: [version, workspace, health, counts, receipts, conformance, mcp]
      properties:
        version:
          $ref: '#/components/schemas/VersionInfo'
        workspace:
          type: object
          required: [organization, project, environment, mode]
          properties:
            organization: { type: string }
            project: { type: string }
            environment: { type: string }
            mode: { type: string }
        health:
          type: object
          required: [kernel, policy, store, conformance]
          properties:
            kernel: { type: string }
            policy: { type: string }
            store: { type: string }
            conformance: { type: string }
        counts:
          type: object
          required: [receipts, pending_approvals, open_incidents, mcp_tools]
          properties:
            receipts: { type: integer }
            pending_approvals: { type: integer }
            open_incidents: { type: integer }
            mcp_tools: { type: integer }
        receipts:
          type: array
          items:
            $ref: '#/components/schemas/Receipt'
        conformance:
          type: object
          required: [level, status]
          properties:
            level: { type: string }
            status: { type: string }
            report_id: { type: string }
        mcp:
          type: object
          required: [authorization, scopes]
          properties:
            authorization: { type: string }
            scopes:
              type: array
              items: { type: string }

    ConsoleSurfaceRef:
      type: object
      required: [id, source]
      properties:
        id: { type: string }
        source: { type: string }

    ConsoleSurfaceState:
      type: object
      required: [id, status, source, generated_at]
      properties:
        id: { type: string }
        status: { type: string }
        source: { type: string }
        generated_at: { type: string, format: date-time }
        summary:
          type: object
          additionalProperties: true
        records:
          type: array
          items:
            type: object
            additionalProperties: true

    Session:
      type: object
      properties:
        session_id: { type: string }
        created_at: { type: string, format: date-time }
        receipt_count: { type: integer }
        last_lamport_clock: { type: integer }

    MCPRemoteDiscovery:
      type: object
      properties:
        server_name: { type: string }
        version: { type: string }
        capabilities_url: { type: string }
        execute_url: { type: string }
        mcp_endpoint: { type: string }
        supported_protocol_versions:
          type: array
          items: { type: string }
        auth_mode: { type: string }
        governance: { type: string }

    MCPJSONRPCRequest:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          description: Request identifier. Omit for notifications.
          oneOf:
            - type: string
            - type: integer
        method: { type: string }
        params:
          type: object
          additionalProperties: true

    MCPJSONRPCError:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }

    MCPJSONRPCResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: integer
        result:
          type: object
          additionalProperties: true
        error:
          $ref: '#/components/schemas/MCPJSONRPCError'

    MCPProtectedResourceMetadata:
      type: object
      properties:
        resource: { type: string }
        authorization_servers:
          type: array
          items: { type: string }
        scopes_supported:
          type: array
          items: { type: string }
        bearer_methods_supported:
          type: array
          items: { type: string }
        resource_documentation: { type: string }

    A2AAgentCard:
      type: object
      required: [agent_id, name, endpoint, supported_versions, skills, created_at, updated_at]
      properties:
        agent_id: { type: string }
        name: { type: string }
        description: { type: string }
        endpoint: { type: string }
        provider:
          type: object
          properties:
            organization: { type: string }
            url: { type: string }
        supported_versions:
          type: array
          items: { type: string }
        skills:
          type: array
          items:
            type: object
            required: [id, name]
            properties:
              id: { type: string }
              name: { type: string }
              description: { type: string }
              examples:
                type: array
                items: { type: string }
              input_modes:
                type: array
                items: { type: string }
              output_modes:
                type: array
                items: { type: string }
        auth_methods:
          type: array
          items: { type: string }
        features:
          type: array
          items: { type: string }
        defaultInputModes:
          type: array
          items: { type: string }
        defaultOutputModes:
          type: array
          items: { type: string }
        capabilities:
          type: object
          properties:
            streaming: { type: boolean }
            pushNotifications: { type: boolean }
            stateTransitionHistory: { type: boolean }
        signature: { type: string }
        content_hash: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    MCPRegistryDiscoverRequest:
      type: object
      required: [server_id]
      properties:
        server_id: { type: string }
        name: { type: string }
        transport: { type: string }
        endpoint: { type: string }
        tool_names:
          type: array
          items: { type: string }
        risk:
          type: string
          enum: [unknown, low, medium, high, critical]
          default: unknown
        reason: { type: string }

    MCPRegistryApprovalRequest:
      type: object
      required: [server_id, approver_id, approval_receipt_id]
      properties:
        server_id: { type: string }
        approver_id: { type: string }
        approval_receipt_id: { type: string }
        reason: { type: string }

    MCPQuarantineRecord:
      type: object
      required: [server_id, risk, state, discovered_at]
      properties:
        server_id: { type: string }
        name: { type: string }
        transport: { type: string }
        endpoint: { type: string }
        tool_names:
          type: array
          items: { type: string }
        risk:
          type: string
          enum: [unknown, low, medium, high, critical]
        state:
          type: string
          enum: [discovered, quarantined, approved, revoked, expired]
        discovered_at: { type: string, format: date-time }
        approved_at: { type: string, format: date-time }
        approved_by: { type: string }
        approval_receipt_id: { type: string }
        revoked_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        reason: { type: string }

    ExportRequest:
      type: object
      properties:
        session_id:
          type: string
          description: Session to export (omit for all)
        format:
          type: string
          enum: [tar.gz]
          default: tar.gz

    VerificationResult:
      type: object
      properties:
        verdict:
          type: string
          enum: [PASS, FAIL]
        checks:
          type: object
          properties:
            signatures: { type: string, enum: [PASS, FAIL] }
            causal_chain: { type: string, enum: [PASS, FAIL] }
            policy_compliance: { type: string, enum: [PASS, FAIL] }
        roots:
          type: object
          properties:
            manifest_root_hash: { type: string }
            merkle_root: { type: string }
            entry_count: { type: integer }
        errors:
          type: array
          items: { type: string }

    EvidenceEnvelopeExportRequest:
      type: object
      required: [manifest_id, envelope, native_evidence_hash]
      properties:
        manifest_id:
          type: string
        envelope:
          type: string
          enum: [dsse, jws, in-toto, slsa, sigstore, scitt, cose]
        native_evidence_hash:
          type: string
          description: HELM-native EvidencePack root hash.
        subject:
          type: string
        experimental:
          type: boolean
          default: false
          description: Must be true for experimental SCITT or COSE exports.

    EvidenceEnvelopeManifest:
      type: object
      required: [manifest_id, envelope, native_evidence_hash, native_authority, created_at]
      properties:
        manifest_id: { type: string }
        envelope:
          type: string
          enum: [dsse, jws, in-toto, slsa, sigstore, scitt, cose]
        native_evidence_hash: { type: string }
        native_authority:
          type: boolean
          const: true
        subject: { type: string }
        statement_hash: { type: string }
        experimental: { type: boolean }
        created_at: { type: string, format: date-time }
        manifest_hash: { type: string }

    ConformanceRequest:
      type: object
      required: [level]
      properties:
        level:
          type: string
          enum: [L1, L2]
        profile:
          type: string
          default: full

    ConformanceResult:
      type: object
      properties:
        report_id: { type: string }
        level: { type: string }
        verdict: { type: string, enum: [PASS, FAIL] }
        gates: { type: integer }
        failed: { type: integer }
        details:
          type: object
          additionalProperties: { type: string }

    NegativeBoundaryVector:
      type: object
      required: [id, category, trigger, expected_verdict, expected_reason_code, must_emit_receipt, must_not_dispatch]
      properties:
        id: { type: string }
        category: { type: string }
        trigger: { type: string }
        expected_verdict:
          type: string
          enum: [ALLOW, DENY, ESCALATE]
        expected_reason_code: { type: string }
        must_emit_receipt: { type: boolean }
        must_not_dispatch: { type: boolean }
        must_bind_evidence:
          type: array
          items: { type: string }

    VersionInfo:
      type: object
      properties:
        version: { type: string }
        commit: { type: string }
        build_time: { type: string }
        go_version: { type: string }

    MCPToolRef:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        server_id: { type: string }
