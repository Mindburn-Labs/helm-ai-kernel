name: Apalache TLA+ Model Check

on:
  pull_request:
    paths:
      - 'proofs/**'
      - 'core/pkg/guardian/**'
      - 'core/pkg/proofgraph/**'
      - 'core/pkg/identity/**'
      - 'core/pkg/kernel/**'
      - '.github/workflows/apalache.yml'
  push:
    branches: [main]
    paths:
      - 'proofs/**'
  schedule:
    # Nightly full run for bounded-model-check completeness
    - cron: '27 3 * * *'
  workflow_dispatch:

env:
  APALACHE_VERSION: '0.50.2'

jobs:
  apalache:
    name: Apalache ${{ matrix.spec }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        spec:
          - GuardianPipeline
          - DelegationModel
          - ProofGraphConsistency
          - TenantIsolation
          - TrustPropagation
          - CSNFDeterminism

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Apalache
        id: cache-apalache
        uses: actions/cache@v4
        with:
          path: /opt/apalache
          key: apalache-${{ env.APALACHE_VERSION }}

      - name: Install Apalache
        if: steps.cache-apalache.outputs.cache-hit != 'true'
        run: |
          curl -L -o apalache.tgz \
            https://github.com/apalache-mc/apalache/releases/download/v${APALACHE_VERSION}/apalache.tgz
          mkdir -p /opt/apalache
          tar -xzf apalache.tgz -C /opt/apalache --strip-components=1

      - name: Add Apalache to PATH
        run: echo "/opt/apalache/bin" >> "$GITHUB_PATH"

      - name: Verify Apalache installed
        run: apalache-mc version

      - name: Model-check ${{ matrix.spec }}
        working-directory: proofs
        run: |
          set -euo pipefail
          SPEC_FILE="${{ matrix.spec }}.tla"
          if [ ! -f "$SPEC_FILE" ]; then
            echo "::error::Spec file $SPEC_FILE not found"
            exit 1
          fi

          # For short PR runs, bound states; nightly uses deeper search
          if [ "${{ github.event_name }}" = "schedule" ]; then
            LENGTH_LIMIT=30
          else
            LENGTH_LIMIT=10
          fi

          echo "Checking $SPEC_FILE (length=$LENGTH_LIMIT)"
          apalache-mc check \
            --length="$LENGTH_LIMIT" \
            --algo=incremental \
            --smt-encoding=arrays \
            --init=Init \
            --next=Next \
            --inv=TypeOK \
            "$SPEC_FILE"

      - name: Upload counterexample on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: apalache-counterexample-${{ matrix.spec }}
          path: proofs/_apalache-out/
          if-no-files-found: ignore

  summary:
    name: Apalache Summary
    runs-on: ubuntu-latest
    needs: apalache
    if: always()
    steps:
      - name: Report status
        run: |
          if [ "${{ needs.apalache.result }}" = "success" ]; then
            echo "All 6 TLA+ specs model-check green."
          else
            echo "::error::Apalache model-check failed. Do not merge until fixed or invariant is updated."
            exit 1
          fi
