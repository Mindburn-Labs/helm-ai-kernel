id: opencode
name: OpenCode
version: unverified-upstream
license:
  status: verified
  spdx: MIT
  url: https://raw.githubusercontent.com/sst/opencode/dev/LICENSE
redistribution: unverified
availability: oss_candidate
install:
  strategy: signed_artifact_required
runtime:
  command: ["opencode"]
model_gateway_env: ["OPENROUTER_API_KEY"]
required_secrets: ["model_gateway"]
filesystem_policy:
  mode: scoped_workspace
  mounts: ["workspace:rw", "app_state:rw"]
  policy_ref: policies/launchpad/apps/opencode.safe.toml
network_policy:
  default: deny
  allowlist: []
mcp_policy:
  unknown_server_policy: quarantine
  unknown_tool_policy: ESCALATE
  require_schema_pin: true
healthchecks:
  - type: command
    command: "opencode --version"
risk_class: T1
budget_ceiling:
  usd_max: 0
  api_calls_max: 0
  time_ms_max: 0
evidence_requirements: ["cpi_output", "kernel_verdict", "sandbox_grant", "launch_receipt", "teardown_receipt", "evidence_pack"]
conformance:
  license_verified: true
  artifact_verified: false
  policy_pack_present: true
  sandbox_verified: false
  healthcheck_passing: false
  e2e_passing: false
  teardown_verified: false
  receipt_verified: false
  evidence_pack_verified: false
metadata:
  upstream_repo: https://github.com/sst/opencode
  blocker: "Official license file is MIT; release artifact signature/digest, healthcheck, sandbox e2e, receipts, and EvidencePack remain unverified."
