# ⚠️  DEVELOPMENT ONLY — Do not use these credentials in production.
# For production deployments, use a .env file or external secret manager.
# See docs/QUICKSTART.md for configuration guidance.

services:
  helm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: "${HELM_BUILD_VERSION:-dev}"
        BUILD_COMMIT: "${HELM_BUILD_COMMIT:-unknown}"
        BUILD_TIME: "${HELM_BUILD_TIME:-unknown}"
    command:
      - serve
      - --policy
      - /etc/helm-ai-kernel/release.high_risk.v3.toml
      - --addr
      - 0.0.0.0
      - --port
      - "8080"
      - --data-dir
      - /var/lib/helm-ai-kernel
    environment:
      HELM_REGION: "us"
      HELM_ENABLE_OPENAI_PROXY: "1"
      HELM_ADMIN_API_KEY: "${HELM_ADMIN_API_KEY:-helm-admin-dev}"
      HELM_SERVICE_API_KEY: "${HELM_SERVICE_API_KEY:-helm-service-dev}"
      HELM_RUNTIME_TENANT_ID: "${HELM_RUNTIME_TENANT_ID:-default}"
      HELM_RUNTIME_PRINCIPAL_ID: "${HELM_RUNTIME_PRINCIPAL_ID:-system-admin}"
      HELM_HEALTH_PORT: "8081"
      EVIDENCE_SIGNING_KEY: "${EVIDENCE_SIGNING_KEY:-helm-evidence-dev}"
    ports:
      - "127.0.0.1:${HELM_SMOKE_API_PORT:-8080}:8080"
      - "127.0.0.1:${HELM_SMOKE_HEALTH_PORT:-8081}:8081"
    volumes:
      - ${HELM_SMOKE_DATA_DIR:-helmdata}:/var/lib/helm-ai-kernel
    healthcheck:
      test: ["CMD", "helm-ai-kernel", "health"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  helmdata:
