{{- if not (or (eq .Values.helm.policy.source.kind "controlplane") (eq .Values.helm.policy.source.kind "crd") (eq .Values.helm.policy.source.kind "mountedFile")) -}}
{{- fail "helm.policy.source.kind must be one of controlplane, crd, mountedFile" -}}
{{- end -}}
{{- if and .Values.helm.production (eq .Values.helm.policy.source.kind "controlplane") (not .Values.helm.policy.source.controlplane.url) -}}
{{- fail "helm.production=true with helm.policy.source.kind=controlplane requires helm.policy.source.controlplane.url" -}}
{{- end -}}
{{- if and .Values.helm.production (eq .Values.helm.policy.source.kind "controlplane") (eq .Values.helm.policy.source.controlplane.auth.mode "bearerToken") (not (or .Values.helm.policy.source.controlplane.auth.bearerToken .Values.helm.policy.source.controlplane.auth.existingSecret)) -}}
{{- fail "helm.production=true with controlplane bearerToken auth requires helm.policy.source.controlplane.auth.bearerToken or existingSecret" -}}
{{- end -}}
{{- if and .Values.helm.policy.signature.publicKey (not (regexMatch "^[0-9a-fA-F]{64}$" .Values.helm.policy.signature.publicKey)) -}}
{{- fail "helm.policy.signature.publicKey must be a 64-character hex Ed25519 public key" -}}
{{- end -}}
{{- if and .Values.helm.policy.signature.required (not (or .Values.helm.policy.signature.publicKey .Values.helm.policy.signature.existingSecret)) -}}
{{- fail "helm.policy.signature.required=true requires helm.policy.signature.publicKey or helm.policy.signature.existingSecret" -}}
{{- end -}}
{{- if and .Values.helm.production (eq .Values.helm.policy.source.kind "controlplane") (not .Values.helm.policy.signature.required) -}}
{{- fail "helm.production=true with helm.policy.source.kind=controlplane requires helm.policy.signature.required=true" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm-ai-kernel.fullname" . }}
  labels:
    {{- include "helm-ai-kernel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "helm-ai-kernel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "helm-ai-kernel.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "helm-ai-kernel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "helm-ai-kernel.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --policy
            - {{ include "helm-ai-kernel.policyPath" . | quote }}
            - --addr
            - {{ .Values.helm.bindAddr | quote }}
            - --port
            - {{ .Values.service.port | quote }}
            - --data-dir
            - {{ .Values.helm.dataDir | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
            {{- if .Values.helm.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
            {{- end }}
          env:
            - name: HELM_HEALTH_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: HELM_POLICY_SOURCE_KIND
              value: {{ .Values.helm.policy.source.kind | quote }}
            - name: HELM_POLICY_POLL_INTERVAL
              value: {{ .Values.helm.policy.source.pollInterval | quote }}
            - name: HELM_POLICY_INITIAL_RECONCILE_TIMEOUT
              value: {{ .Values.helm.policy.source.initialReconcileTimeout | quote }}
            - name: HELM_POLICY_RELOAD_ENDPOINT
              value: {{ .Values.helm.policy.reloadHints.httpWakeEndpoint | quote }}
            - name: HELM_POLICY_SIGNATURE_REQUIRED
              value: {{ ternary "1" "0" .Values.helm.policy.signature.required | quote }}
            {{- if or .Values.helm.policy.signature.publicKey .Values.helm.policy.signature.existingSecret }}
            - name: HELM_POLICY_TRUST_PUBLIC_KEY
              {{- if .Values.helm.policy.signature.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.helm.policy.signature.existingSecret }}
                  key: {{ .Values.helm.policy.signature.existingSecretKey }}
              {{- else }}
              value: {{ .Values.helm.policy.signature.publicKey | quote }}
              {{- end }}
            {{- end }}
            {{- if eq .Values.helm.policy.source.kind "controlplane" }}
            - name: HELM_POLICY_CONTROLPLANE_URL
              value: {{ .Values.helm.policy.source.controlplane.url | quote }}
            - name: HELM_POLICY_CONTROLPLANE_AUTH_MODE
              value: {{ .Values.helm.policy.source.controlplane.auth.mode | quote }}
            {{- if or .Values.helm.policy.source.controlplane.auth.bearerToken .Values.helm.policy.source.controlplane.auth.existingSecret }}
            - name: HELM_POLICY_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-policy-controlplane" (include "helm-ai-kernel.fullname" .)) .Values.helm.policy.source.controlplane.auth.existingSecret }}
                  key: {{ .Values.helm.policy.source.controlplane.auth.existingSecretKey }}
            {{- end }}
            {{- end }}
            {{- if eq .Values.helm.policy.source.kind "crd" }}
            - name: HELM_POLICY_CRD_API_GROUP
              value: {{ .Values.helm.policy.source.crd.apiGroup | quote }}
            - name: HELM_POLICY_CRD_RESOURCE
              value: {{ .Values.helm.policy.source.crd.resource | quote }}
            {{- end }}
            - name: HELM_PRODUCTION
              value: {{ ternary "1" "0" .Values.helm.production | quote }}
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: HELM_REGION
              value: {{ .Values.helm.region | quote }}
            {{- if .Values.helm.proxy.enabled }}
            - name: HELM_ENABLE_OPENAI_PROXY
              value: "1"
            - name: HELM_UPSTREAM_URL
              value: {{ .Values.helm.proxy.upstream | quote }}
            {{- end }}
            {{- if .Values.helm.demoMode }}
            - name: HELM_DEMO_MODE
              value: "1"
            {{- end }}
            - name: HELM_SIGNING_ALGORITHM
              value: {{ .Values.helm.signing.algorithm | quote }}
            - name: EVIDENCE_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm-ai-kernel.signingSecretName" . }}
                  key: signing-key
            {{- if or .Values.helm.auth.existingSecret .Values.helm.auth.adminAPIKey }}
            - name: HELM_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm-ai-kernel.authSecretName" . }}
                  key: {{ .Values.helm.auth.adminAPIKeySecretKey }}
            {{- end }}
            {{- if or .Values.helm.auth.existingSecret .Values.helm.auth.serviceAPIKey }}
            - name: HELM_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm-ai-kernel.authSecretName" . }}
                  key: {{ .Values.helm.auth.serviceAPIKeySecretKey }}
            {{- end }}
            {{- if eq .Values.helm.storage.type "postgres" }}
            {{- if .Values.helm.storage.postgres.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.helm.storage.postgres.existingSecret }}
                  key: {{ .Values.helm.storage.postgres.existingSecretKey }}
            {{- else if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "helm-ai-kernel.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?sslmode=disable"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm-ai-kernel.fullname" . }}-postgresql
                  key: password
            {{- else }}
            - name: DATABASE_URL
              value: {{ include "helm-ai-kernel.databaseURL" . | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.helm.dataDir }}
            - name: signing-key
              mountPath: {{ printf "%s/root.key" (.Values.helm.dataDir | trimSuffix "/") }}
              subPath: root.key
              readOnly: true
            - name: policy
              mountPath: {{ include "helm-ai-kernel.policyMountPath" . }}
              readOnly: true
            - name: tmp
              mountPath: /tmp
        {{- if and .Values.helm.policy.reloadHints.enabled .Values.helm.policy.reloadHints.configReloaderSidecar.enabled }}
        - name: config-reloader
          image: {{ .Values.helm.policy.reloadHints.configReloaderSidecar.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - --volume-dir={{ include "helm-ai-kernel.policyMountPath" . }}
            - --webhook-url=http://127.0.0.1:{{ .Values.service.port }}{{ .Values.helm.policy.reloadHints.httpWakeEndpoint }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: policy
              mountPath: {{ include "helm-ai-kernel.policyMountPath" . }}
              readOnly: true
        {{- end }}
      volumes:
        - name: data
          {{ if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "helm-ai-kernel.pvcName" . }}
          {{ else }}
          emptyDir: {}
          {{ end }}
        - name: signing-key
          secret:
            secretName: {{ include "helm-ai-kernel.signingSecretName" . }}
            items:
              - key: signing-key
                path: root.key
        - name: policy
          {{- if .Values.helm.policy.source.mountedFile.existingSecret }}
          secret:
            secretName: {{ include "helm-ai-kernel.policySecretName" . }}
          {{- else }}
          configMap:
            name: {{ include "helm-ai-kernel.policyConfigMapName" . }}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
