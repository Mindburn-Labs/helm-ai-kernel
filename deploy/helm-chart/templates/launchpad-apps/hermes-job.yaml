{{- if .Values.launchpadApps.hermes.enabled -}}
{{- $app := "hermes" -}}
{{- $cfg := .Values.launchpadApps.hermes -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "helm-ai-kernel.launchpadApp.fullname" (dict "ctx" . "app" $app) }}
  labels:
    {{- include "helm-ai-kernel.launchpadApp.labels" (dict "ctx" . "app" $app) | nindent 4 }}
  annotations:
    helm.ai/upstream-source: "https://github.com/NousResearch/hermes-agent"
    helm.ai/registry-ref: "registry/launchpad/apps/hermes.yaml"
    # Recreate the Job on every helm upgrade — Jobs are immutable in spec, and
    # smoke iterations need a fresh attempt. The hook lifecycle keeps `helm test`
    # output predictable while the Job itself stays a first-class resource.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: {{ $cfg.backoffLimit }}
  activeDeadlineSeconds: {{ $cfg.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ $cfg.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "helm-ai-kernel.launchpadApp.labels" (dict "ctx" . "app" $app) | nindent 8 }}
    spec:
      restartPolicy: Never
      nodeSelector:
        {{- toYaml .Values.launchpadApps.nodeSelector | nindent 8 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      # Hermes is short-lived (single ping). The egress sidecar must exit too,
      # otherwise the Pod stays Running forever waiting for the sidecar. The
      # workload runs as a normal container and we kill the sidecar via the
      # sidecar's own readiness gate plus `shareProcessNamespace` so a SIGTERM
      # propagates to both containers when the workload exits.
      shareProcessNamespace: true
      containers:
        - name: {{ $app }}
          image: {{ include "helm-ai-kernel.launchpadApp.image" (dict "image" $cfg.image) | quote }}
          imagePullPolicy: {{ $cfg.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            {{- toYaml $cfg.command | nindent 12 }}
          env:
            - name: HOME
              value: /var/lib/hermes
            - name: HTTP_PROXY
              value: {{ printf "http://127.0.0.1:%d" (int $cfg.egressSidecar.port) | quote }}
            - name: HTTPS_PROXY
              value: {{ printf "http://127.0.0.1:%d" (int $cfg.egressSidecar.port) | quote }}
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.svc,.cluster.local"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openrouter.apiKeySecretRef.name | quote }}
                  key: {{ .Values.openrouter.apiKeySecretRef.key | quote }}
          # Once the hermes command exits, the workload container terminates.
          # We then send SIGTERM to the sidecar via a postStop hook so the Pod
          # can transition out of Running into Succeeded/Failed cleanly.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "pkill -TERM -f egress-proxy || true"
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-state
              mountPath: /var/lib/hermes
        {{- include "helm-ai-kernel.launchpadApp.egressSidecar" (dict "sidecar" $cfg.egressSidecar) | nindent 8 }}
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: {{ $cfg.tmpfsSize | default "128Mi" }}
        - name: app-state
          emptyDir:
            sizeLimit: {{ $cfg.appStateSize }}
{{- end }}
