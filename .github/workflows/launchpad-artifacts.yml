name: Launchpad Artifacts

on:
  workflow_dispatch:
    inputs:
      run_live_conformance:
        description: Run live BYO model-provider local-container conformance after artifact build
        required: false
        default: false
        type: boolean
      run_candidate_live_conformance:
        description: Deprecated no-op; OpenCode/Kilo Code are in the supported live set
        required: false
        default: false
        type: boolean
      include_candidate_artifacts:
        description: Deprecated no-op; all four supported app artifacts are always built
        required: false
        default: false
        type: boolean
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/launchpad-artifacts.yml"
      - "policies/launchpad/apps/openclaw.safe.toml"
      - "policies/launchpad/apps/hermes.safe.toml"
      - "policies/launchpad/apps/opencode.safe.toml"
      - "policies/launchpad/apps/kilocode.safe.toml"
      - "core/pkg/launchpad/**"
      - "tests/launchpad/**"
      - "tools/launchpad/artifacts/**"
      - "tools/launchpad/egressproxy/**"

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_PREFIX: mindburn-labs/helm-launchpad

jobs:
  artifact-matrix:
    name: Resolve Launchpad artifact matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: |
          set -euo pipefail
          cat > matrix.json <<'JSON'
          {
            "include": [
              {
                "app_id": "openclaw",
                "version": "v2026.5.12",
                "upstream_repo": "openclaw/openclaw",
                "upstream_ref": "v2026.5.12",
                "dockerfile": "helm/tools/launchpad/artifacts/openclaw.Dockerfile",
                "license_spdx": "MIT"
              },
              {
                "app_id": "hermes",
                "version": "v2026.5.16",
                "upstream_repo": "NousResearch/hermes-agent",
                "upstream_ref": "v2026.5.16",
                "dockerfile": "helm/tools/launchpad/artifacts/hermes.Dockerfile",
                "license_spdx": "MIT"
              },
              {
                "app_id": "opencode",
                "version": "v1.15.5",
                "upstream_repo": "anomalyco/opencode",
                "upstream_ref": "v1.15.5",
                "dockerfile": "helm/tools/launchpad/artifacts/opencode.Dockerfile",
                "license_spdx": "MIT"
              },
              {
                "app_id": "kilocode",
                "version": "v7.3.1",
                "upstream_repo": "Kilo-Org/kilocode",
                "upstream_ref": "v7.3.1",
                "dockerfile": "helm/tools/launchpad/artifacts/kilocode.Dockerfile",
                "license_spdx": "MIT"
              }
            ]
          }
          JSON
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    name: Build and sign ${{ matrix.app_id }}
    runs-on: ubuntu-latest
    needs: artifact-matrix
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.artifact-matrix.outputs.matrix) }}
    outputs:
      openclaw-digest: ${{ steps.digest.outputs.openclaw_digest }}
      hermes-digest: ${{ steps.digest.outputs.hermes_digest }}
      opencode-digest: ${{ steps.digest.outputs.opencode_digest }}
      kilocode-digest: ${{ steps.digest.outputs.kilocode_digest }}
    steps:
      - name: Checkout HELM source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: helm

      - name: Checkout pinned upstream source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: ${{ matrix.upstream_repo }}
          ref: ${{ matrix.upstream_ref }}
          path: upstream
          persist-credentials: false

      - name: Resolve pinned upstream commit
        id: upstream
        working-directory: upstream
        run: |
          set -euo pipefail
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute pinned upstream source tree hash
        id: source-tree
        working-directory: upstream
        run: |
          set -euo pipefail
          # Hash the Git index metadata instead of filesystem paths. Some upstream
          # repos contain gitlinks or dangling symlinks, which `sha256sum <path>`
          # cannot read even though the committed tree is valid.
          source_tree_sha256="$(
            git ls-files -s -z |
              LC_ALL=C sort -z |
              sha256sum |
              awk '{print "sha256:" $1}'
          )"
          echo "sha256=${source_tree_sha256}" >> "$GITHUB_OUTPUT"

      - name: Verify license marker
        working-directory: upstream
        run: |
          set -euo pipefail
          test -f LICENSE
          grep -Eiq 'MIT|Massachusetts Institute of Technology' LICENSE

      - name: Stage HELM Launchpad helper scripts
        run: |
          set -euo pipefail
          cp helm/tools/launchpad/artifacts/model-gateway-check.sh upstream/.helm-launchpad-model-gateway-check.sh

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Free hosted runner disk before artifact build
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift || true
          sudo apt-get clean || true
          docker buildx prune --force --all || true
          docker builder prune --force --all || true
          docker system prune --force || true
          df -h

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@55dc4ee22412511ee8c3142cbea40418e6cec693 # v0.17.8

      - name: Install grype
        uses: anchore/scan-action/download-grype@1638637db639e0ade3258b51db49a9a137574c3e # v6.5.1

      - name: Expose grype on PATH
        run: |
          set -euo pipefail
          GRYPE_BIN="$(find /opt/hostedtoolcache/grype -type f -name grype -perm -111 | sort | tail -n 1)"
          if [ -z "${GRYPE_BIN}" ]; then
            echo "grype binary not found after download" >&2
            exit 1
          fi
          dirname "${GRYPE_BIN}" >> "$GITHUB_PATH"
          "${GRYPE_BIN}" version

      - id: meta
        name: Compute image coordinates
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.app_id }}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${image}:${{ matrix.version }}" >> "$GITHUB_OUTPUT"

      - id: build
        name: Build and push OCI image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: upstream
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ matrix.upstream_repo }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.commit }}
            org.opencontainers.image.version=${{ matrix.version }}
            org.opencontainers.image.licenses=${{ matrix.license_spdx }}
            io.mindburn.helm.launchpad.app=${{ matrix.app_id }}
            io.mindburn.helm.launchpad.recipe=${{ matrix.dockerfile }}
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ matrix.upstream_ref }}

      - name: Sign image digest with keyless cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_REF}"

      - name: Verify cosign signature
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign verify "${IMAGE_REF}" \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/launchpad-artifacts.yml@${GITHUB_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            > "cosign-${{ matrix.app_id }}.json"

      - name: Free Docker build cache before image evidence scans
        run: |
          set -euo pipefail
          docker buildx prune --force --all || true
          docker builder prune --force --all || true
          docker system prune --force || true
          docker system df

      - name: Generate syft SBOM
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
          SYFT_CHECK_FOR_APP_UPDATE: "false"
          SYFT_SCOPE: squashed
        run: |
          set -euo pipefail
          timeout 20m syft "${IMAGE_REF}" -o spdx-json="sbom-${{ matrix.app_id }}.spdx.json"

      - name: Run grype scan
        id: grype
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
          GRYPE_CHECK_FOR_APP_UPDATE: "false"
        run: |
          set -euo pipefail
          status=completed
          if ! timeout 20m grype "${IMAGE_REF}" -o json --file "grype-${{ matrix.app_id }}.json"; then
            status=failed
          fi
          echo "status=${status}" >> "$GITHUB_OUTPUT"

      - name: Write artifact manifest entry
        env:
          APP_ID: ${{ matrix.app_id }}
          VERSION: ${{ matrix.version }}
          UPSTREAM_REPO: https://github.com/${{ matrix.upstream_repo }}
          UPSTREAM_REF: ${{ matrix.upstream_ref }}
          UPSTREAM_COMMIT: ${{ steps.upstream.outputs.commit }}
          SOURCE_TREE_SHA256: ${{ steps.source-tree.outputs.sha256 }}
          LICENSE_SPDX: ${{ matrix.license_spdx }}
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
          SUBJECT_NAME: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
          GRYPE_STATUS: ${{ steps.grype.outputs.status }}
        run: |
          set -euo pipefail
          mkdir -p launchpad-artifacts
          jq -n \
            --arg app_id "${APP_ID}" \
            --arg app_version "${VERSION}" \
            --arg upstream_repo "${UPSTREAM_REPO}" \
            --arg upstream_ref "${UPSTREAM_REF}" \
            --arg upstream_commit "${UPSTREAM_COMMIT}" \
            --arg source_sha "${UPSTREAM_COMMIT}" \
            --arg source_tree_sha256 "${SOURCE_TREE_SHA256}" \
            --arg workflow_ref "${GITHUB_REPOSITORY}/.github/workflows/launchpad-artifacts.yml@${GITHUB_REF}" \
            --arg subject_name "${SUBJECT_NAME}" \
            --arg subject_digest "${DIGEST}" \
            --arg license_spdx "${LICENSE_SPDX}" \
            --arg license_ref "${UPSTREAM_REPO}/blob/${UPSTREAM_REF}/LICENSE" \
            --arg redistribution "allowed_by_${LICENSE_SPDX}_with_upstream_notice" \
            --arg image "${IMAGE_REF}" \
            --arg digest "${DIGEST}" \
            --arg signature_tool "cosign" \
            --arg signature_ref "cosign://${IMAGE_REF}" \
            --arg sbom_tool "syft" \
            --arg sbom_ref "artifact://sbom-${APP_ID}.spdx.json" \
            --arg vulnerability_scan_tool "grype" \
            --arg vulnerability_scan_ref "artifact://grype-${APP_ID}.json" \
            --arg vulnerability_scan_status "${GRYPE_STATUS}" \
            --arg provenance_ref "github-actions://${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}" \
            '{
              app_id: $app_id,
              app_version: $app_version,
              upstream_repo: $upstream_repo,
              upstream_ref: $upstream_ref,
              upstream_commit: $upstream_commit,
              source_sha: $source_sha,
              source_tree_sha256: $source_tree_sha256,
              workflow_ref: $workflow_ref,
              subject_name: $subject_name,
              subject_digest: $subject_digest,
              license_spdx: $license_spdx,
              license_ref: $license_ref,
              redistribution: $redistribution,
              image: $image,
              digest: $digest,
              signature_tool: $signature_tool,
              signature_ref: $signature_ref,
              sbom_tool: $sbom_tool,
              sbom_ref: $sbom_ref,
              vulnerability_scan_tool: $vulnerability_scan_tool,
              vulnerability_scan_ref: $vulnerability_scan_ref,
              vulnerability_scan_status: $vulnerability_scan_status,
              provenance_ref: $provenance_ref
            }' > "launchpad-artifacts/${APP_ID}.json"

      - id: digest
        name: Expose digest output
        run: |
          case "${{ matrix.app_id }}" in
            openclaw) echo "openclaw_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT" ;;
            hermes) echo "hermes_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT" ;;
            opencode) echo "opencode_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT" ;;
            kilocode) echo "kilocode_digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Upload Launchpad artifact evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launchpad-artifact-${{ matrix.app_id }}
          path: |
            launchpad-artifacts/${{ matrix.app_id }}.json
            cosign-${{ matrix.app_id }}.json
            sbom-${{ matrix.app_id }}.spdx.json
            grype-${{ matrix.app_id }}.json

  egress-proxy:
    name: Build and sign Launchpad egress proxy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout HELM source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: helm
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Free hosted runner disk before egress proxy build
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift || true
          sudo apt-get clean || true
          docker buildx prune --force --all || true
          docker builder prune --force --all || true
          docker system prune --force || true
          df -h
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Install syft
        uses: anchore/sbom-action/download-syft@55dc4ee22412511ee8c3142cbea40418e6cec693 # v0.17.8
      - name: Install grype
        uses: anchore/scan-action/download-grype@1638637db639e0ade3258b51db49a9a137574c3e # v6.5.1

      - name: Expose grype on PATH
        run: |
          set -euo pipefail
          GRYPE_BIN="$(find /opt/hostedtoolcache/grype -type f -name grype -perm -111 | sort | tail -n 1)"
          if [ -z "${GRYPE_BIN}" ]; then
            echo "grype binary not found after download" >&2
            exit 1
          fi
          dirname "${GRYPE_BIN}" >> "$GITHUB_PATH"
          "${GRYPE_BIN}" version

      - id: meta
        name: Compute proxy image coordinates
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_PREFIX}/egress-proxy"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${image}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Compute egress proxy source tree hash
        id: source-tree
        run: |
          set -euo pipefail
          source_tree_sha256="$(
            cd helm
            git ls-files -z tools/launchpad/egressproxy tools/launchpad/artifacts/egress-proxy.Dockerfile |
              sort -z |
              xargs -0 sha256sum |
              sha256sum |
              awk '{print "sha256:" $1}'
          )"
          echo "sha256=${source_tree_sha256}" >> "$GITHUB_OUTPUT"
      - id: build
        name: Build and push egress proxy image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: helm
          file: helm/tools/launchpad/artifacts/egress-proxy.Dockerfile
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0
            io.mindburn.helm.launchpad.component=egress-proxy
          tags: |
            ${{ steps.meta.outputs.tag }}
      - name: Sign egress proxy digest with keyless cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_REF}"
      - name: Verify egress proxy cosign signature
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign verify "${IMAGE_REF}" \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/launchpad-artifacts.yml@${GITHUB_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            > cosign-egress-proxy.json
      - name: Free Docker build cache before egress proxy evidence scans
        run: |
          set -euo pipefail
          docker buildx prune --force --all || true
          docker builder prune --force --all || true
          docker system prune --force || true
          docker system df
      - name: Generate egress proxy SBOM and vulnerability report
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
          SYFT_CHECK_FOR_APP_UPDATE: "false"
          SYFT_SCOPE: squashed
          GRYPE_CHECK_FOR_APP_UPDATE: "false"
        run: |
          set -euo pipefail
          timeout 20m syft "${IMAGE_REF}" -o spdx-json=sbom-egress-proxy.spdx.json
          status=completed
          if ! timeout 20m grype "${IMAGE_REF}" -o json --file grype-egress-proxy.json; then
            status=failed
          fi
          jq -n \
            --arg source_sha "${GITHUB_SHA}" \
            --arg source_tree_sha256 "${{ steps.source-tree.outputs.sha256 }}" \
            --arg workflow_ref "${GITHUB_REPOSITORY}/.github/workflows/launchpad-artifacts.yml@${GITHUB_REF}" \
            --arg subject_name "${{ steps.meta.outputs.image }}" \
            --arg subject_digest "${{ steps.build.outputs.digest }}" \
            --arg image "${IMAGE_REF}" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            --arg signature_ref "cosign://${IMAGE_REF}" \
            --arg sbom_ref "artifact://sbom-egress-proxy.spdx.json" \
            --arg vulnerability_scan_ref "artifact://grype-egress-proxy.json" \
            --arg vulnerability_scan_status "${status}" \
            --arg provenance_ref "github-actions://${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}" \
            '{
              component: "egress-proxy",
              source_sha: $source_sha,
              source_tree_sha256: $source_tree_sha256,
              workflow_ref: $workflow_ref,
              subject_name: $subject_name,
              subject_digest: $subject_digest,
              image: $image,
              digest: $digest,
              signature_tool: "cosign",
              signature_ref: $signature_ref,
              sbom_tool: "syft",
              sbom_ref: $sbom_ref,
              vulnerability_scan_tool: "grype",
              vulnerability_scan_ref: $vulnerability_scan_ref,
              vulnerability_scan_status: $vulnerability_scan_status,
              provenance_ref: $provenance_ref
            }' > launchpad-egress-proxy.json
      - name: Upload egress proxy evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launchpad-egress-proxy
          path: |
            launchpad-egress-proxy.json
            cosign-egress-proxy.json
            sbom-egress-proxy.spdx.json
            grype-egress-proxy.json

  aggregate:
    name: Aggregate Launchpad artifact manifest
    runs-on: ubuntu-latest
    needs: [build, egress-proxy]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: launchpad-artifact-*
          path: launchpad-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: launchpad-egress-proxy
          path: launchpad-artifacts
      - name: Write manifest
        run: |
          set -euo pipefail
          find launchpad-artifacts -maxdepth 4 -type f -print | sort
          egress_manifest="$(find launchpad-artifacts -type f -name launchpad-egress-proxy.json -print -quit)"
          test -f "${egress_manifest}"
          manifests=()
          for app in openclaw hermes; do
            manifest="$(find launchpad-artifacts -type f -name "${app}.json" -print -quit)"
            test -f "${manifest}"
            manifests+=("${manifest}")
          done
          for app in opencode kilocode; do
            manifest="$(find launchpad-artifacts -type f -name "${app}.json" -print -quit)"
            if [[ -n "${manifest}" ]]; then
              manifests+=("${manifest}")
            fi
          done
          source_tree_sha256="$(
            find launchpad-artifacts -type f -name '*.json' -print0 |
              sort -z |
              xargs -0 sha256sum |
              sha256sum |
              awk '{print "sha256:" $1}'
          )"
          jq -s \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg github_run_id "${GITHUB_RUN_ID}" \
            --arg github_run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg source_sha "${GITHUB_SHA}" \
            --arg source_tree_sha256 "${source_tree_sha256}" \
            --arg workflow_ref "${GITHUB_REPOSITORY}/.github/workflows/launchpad-artifacts.yml@${GITHUB_REF}" \
            --slurpfile egress_proxy "${egress_manifest}" \
            '{
              schema_version: "helm.launchpad.artifacts.v1",
              generated_at: $generated_at,
              github_run_id: $github_run_id,
              github_run_attempt: $github_run_attempt,
              source_sha: $source_sha,
              source_tree_sha256: $source_tree_sha256,
              workflow_ref: $workflow_ref,
              egress_proxy: $egress_proxy[0],
              artifacts: .
            }' "${manifests[@]}" > launchpad-artifact-manifest.json
          jq . launchpad-artifact-manifest.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launchpad-artifact-manifest
          path: launchpad-artifact-manifest.json

  live-conformance:
    name: Live BYO model-provider local-container conformance
    runs-on: ubuntu-latest
    needs: aggregate
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_live_conformance)) }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: "**/go.sum"
      - name: Log in to GHCR for conformance pulls
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: launchpad-artifact-manifest
          path: /tmp/launchpad
      - name: Resolve signed egress proxy image
        run: |
          set -euo pipefail
          proxy_image="$(jq -r '.egress_proxy.image // empty' /tmp/launchpad/launchpad-artifact-manifest.json)"
          test -n "${proxy_image}"
          echo "HELM_LAUNCHPAD_EGRESS_PROXY_IMAGE=${proxy_image}" >> "$GITHUB_ENV"
      - name: Run gated live conformance
        env:
          HELM_LAUNCHPAD_LIVE_E2E: "1"
          HELM_LAUNCHPAD_LIVE_APPS: openclaw,hermes
          HELM_LAUNCHPAD_ARTIFACT_MANIFEST: /tmp/launchpad/launchpad-artifact-manifest.json
          HELM_LAUNCHPAD_LIVE_EVIDENCE_DIR: /tmp/launchpad-live-evidence
          HELM_LAUNCHPAD_LOCAL_CONTAINER_TIMEOUT: 8m
          HELM_LAUNCHPAD_CI_MODEL_PROVIDER_SECRET_JSON: ${{ secrets.HELM_LAUNCHPAD_CI_MODEL_PROVIDER_SECRET_JSON }}
          HELM_LAUNCHPAD_CI_OPENROUTER_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_OPENROUTER_API_KEY }}
          ALEPH_ALPHA_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_ALEPH_ALPHA_API_KEY || secrets.ALEPH_ALPHA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_ANTHROPIC_API_KEY || secrets.ANTHROPIC_API_KEY }}
          ARK_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_ARK_API_KEY || secrets.ARK_API_KEY }}
          BAICHUAN_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_BAICHUAN_API_KEY || secrets.BAICHUAN_API_KEY }}
          BIGMODEL_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_BIGMODEL_API_KEY || secrets.BIGMODEL_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_CEREBRAS_API_KEY || secrets.CEREBRAS_API_KEY }}
          COHERE_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_COHERE_API_KEY || secrets.COHERE_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_DASHSCOPE_API_KEY || secrets.DASHSCOPE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_DEEPSEEK_API_KEY || secrets.DEEPSEEK_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_FIREWORKS_API_KEY || secrets.FIREWORKS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_GEMINI_API_KEY || secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_GOOGLE_API_KEY || secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_GROQ_API_KEY || secrets.GROQ_API_KEY }}
          HUNYUAN_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_HUNYUAN_API_KEY || secrets.HUNYUAN_API_KEY }}
          IFLYTEK_SPARK_API_PASSWORD: ${{ secrets.HELM_LAUNCHPAD_CI_IFLYTEK_SPARK_API_PASSWORD || secrets.IFLYTEK_SPARK_API_PASSWORD }}
          LINGYIWANWU_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_LINGYIWANWU_API_KEY || secrets.LINGYIWANWU_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_MINIMAX_API_KEY || secrets.MINIMAX_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_MISTRAL_API_KEY || secrets.MISTRAL_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_MOONSHOT_API_KEY || secrets.MOONSHOT_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_NVIDIA_API_KEY || secrets.NVIDIA_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_NVIDIA_NIM_API_KEY || secrets.NVIDIA_NIM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_OPENAI_API_KEY || secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_OPENROUTER_API_KEY || secrets.OPENROUTER_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_PERPLEXITY_API_KEY || secrets.PERPLEXITY_API_KEY }}
          QIANFAN_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_QIANFAN_API_KEY || secrets.QIANFAN_API_KEY }}
          STEP_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_STEP_API_KEY || secrets.STEP_API_KEY }}
          STEPFUN_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_STEPFUN_API_KEY || secrets.STEPFUN_API_KEY }}
          TENCENT_HUNYUAN_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_TENCENT_HUNYUAN_API_KEY || secrets.TENCENT_HUNYUAN_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_TOGETHER_API_KEY || secrets.TOGETHER_API_KEY }}
          VOLCENGINE_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_VOLCENGINE_API_KEY || secrets.VOLCENGINE_API_KEY }}
          XFYUN_SPARK_API_PASSWORD: ${{ secrets.HELM_LAUNCHPAD_CI_XFYUN_SPARK_API_PASSWORD || secrets.XFYUN_SPARK_API_PASSWORD }}
          XAI_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_XAI_API_KEY || secrets.XAI_API_KEY }}
          YI_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_YI_API_KEY || secrets.YI_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.HELM_LAUNCHPAD_CI_ZHIPU_API_KEY || secrets.ZHIPU_API_KEY }}
        run: go test ./tests/launchpad/... -run TestLiveModelProviderLocalContainerConformance -count=1 -timeout 30m -v
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() }}
        with:
          name: launchpad-live-evidence
          path: /tmp/launchpad-live-evidence
          include-hidden-files: true
      - name: Write merged promotion manifest
        env:
          LIVE_APPS: openclaw,hermes
        run: |
          set -euo pipefail
          mkdir -p /tmp/launchpad-promotion
          jq \
            --arg github_run_id "${GITHUB_RUN_ID}" \
            --arg github_run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg live_apps "${LIVE_APPS}" \
            '($live_apps | split(",") | map(gsub("^\\s+|\\s+$"; ""))) as $liveApps
            | .artifacts |= map(
              .app_id as $appID
              | (. + {
                artifact_verification_ref: ("github-actions://" + $github_run_id + "/" + $github_run_attempt + "/artifact-verification/" + $appID)
              })
              + (if ($liveApps | index($appID)) then {
                live_e2e_run_id: ("github-actions://" + $github_run_id + "/" + $github_run_attempt + "/live-e2e/" + $appID),
                evidence_pack_ref: ("github-actions://" + $github_run_id + "/" + $github_run_attempt + "/evidencepack/" + $appID),
                teardown_receipt_ref: ("github-actions://" + $github_run_id + "/" + $github_run_attempt + "/teardown/" + $appID),
                promotion_status: "live_conformance_passed"
              } else {
                promotion_status: "artifact_only_no_live_conformance"
              } end)
            )' \
            /tmp/launchpad/launchpad-artifact-manifest.json > /tmp/launchpad-promotion/launchpad-promotion-manifest.json
          jq . /tmp/launchpad-promotion/launchpad-promotion-manifest.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: launchpad-promotion-manifest
          path: /tmp/launchpad-promotion/launchpad-promotion-manifest.json

  promotion-pr:
    name: Open Launchpad promotion PR
    runs-on: ubuntu-latest
    needs: live-conformance
    if: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: "**/go.sum"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: launchpad-promotion-manifest
          path: /tmp/launchpad-promotion
      - name: Promote verified images and open a reference update PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          manifest=/tmp/launchpad-promotion/launchpad-promotion-manifest.json
          result=/tmp/launchpad-promotion-result.json
          go run ./core/cmd/helm-ai-kernel launch promote \
            --manifest "${manifest}" \
            --apps openclaw,hermes \
            --write \
            --sync-derived \
            --check \
            --json | tee "${result}"

          changed_paths=(
            registry/launchpad/apps/openclaw.yaml
            registry/launchpad/apps/hermes.yaml
            registry/launchpad/image-lock.json
            deploy/helm-chart/values.yaml
          )
          if git diff --quiet -- "${changed_paths[@]}"; then
            echo "Launchpad promoted refs already current — no PR needed."
            exit 0
          fi

          manifest_hash="$(jq -r '.manifest_hash' "${result}")"
          source_sha="$(jq -r '.source_sha // "n/a"' "${manifest}")"
          source_tree_sha256="$(jq -r '.source_tree_sha256 // "n/a"' "${manifest}")"
          workflow_ref="$(jq -r '.workflow_ref // "n/a"' "${manifest}")"
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          {
            echo "| component | image | digest | cosign | sbom | provenance |"
            echo "| --- | --- | --- | --- | --- | --- |"
            jq -r '.artifacts[]
              | select(.app_id == "openclaw" or .app_id == "hermes")
              | "| \(.app_id) | `\(.image)` | `\(.digest)` | `\(.signature_ref)` | `\(.sbom_ref)` | `\(.provenance_ref)` |"' "${manifest}"
            jq -r '.egress_proxy
              | "| egress-proxy | `\(.image)` | `\(.digest)` | `\(.signature_ref)` | `\(.sbom_ref)` | `\(.provenance_ref)` |"' "${manifest}"
          } > /tmp/launchpad-digest-table.md

          cat > /tmp/launchpad-promotion-pr.md <<EOF
          Automated Launchpad promotion from a verified CI manifest.

          Source SHA: \`${source_sha}\`
          Source tree SHA256: \`${source_tree_sha256}\`
          Workflow ref: \`${workflow_ref}\`
          Workflow run: ${run_url}
          Promotion manifest hash: \`${manifest_hash}\`

          ## Image refs
          EOF
          cat /tmp/launchpad-digest-table.md >> /tmp/launchpad-promotion-pr.md
          cat >> /tmp/launchpad-promotion-pr.md <<'EOF'

          ## Validation
          - `go run ./core/cmd/helm-ai-kernel launch promote --manifest <manifest> --apps openclaw,hermes --write --sync-derived --check --json`
          - `make launchpad-promotion-check`
          - `go test ./tests/launchpad/... -run TestLiveModelProviderLocalContainerConformance -count=1 -timeout 30m -v`

          Promotion commits update committed AppSpec evidence plus generated refs only. They intentionally do not retrigger the producer image build workflow.
          EOF

          branch="automation/launchpad-promotion-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add "${changed_paths[@]}"
          git commit -m "ci(launchpad): promote signed launchpad image refs"
          git push origin "${branch}"
          gh pr create \
            --title "ci(launchpad): promote signed launchpad image refs" \
            --body-file /tmp/launchpad-promotion-pr.md \
            --base main \
            --head "${branch}"
